<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connection">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<title>Youth Connection</title>
<style>
:root{
  --accent:#2563eb;--accent-dark:#1d4ed8;--accent-light:#dbeafe;
  --navy:#12233b;
  --danger:#ef4444;--danger-light:#fee2e2;--warn:#f59e0b;--warn-light:#fef3c7;
  --success:#10b981;--success-light:#d1fae5;
  --ink:#1f2937;--ink-mid:#647488;--ink-faint:#94a3b8;
  --paper:#f4f7fc;--paper-card:#ffffff;--paper-dark:#e8edf4;
  --line:#e8edf4;--chip:#eef4ff;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(18,35,59,.10),0 2px 4px rgba(0,0,0,.05);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
@media(min-width:768px){html{font-size:17px}}
@media(min-width:1280px){html{font-size:18px}}
body{font-family:var(--font);color:var(--ink);background:var(--paper);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Header */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,#1a3a6b 100%);color:#fff;padding:var(--safe-t) 16px 0;height:calc(56px + var(--safe-t));box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(18,35,59,.25)}
.hdr h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr-meta{display:flex;align-items:center;gap:10px}
.role-badge{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;text-transform:uppercase;white-space:nowrap}
.btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;flex-shrink:0}
.btn-icon:hover{background:rgba(255,255,255,.25)}
@media(min-width:768px){.hdr{padding:0 28px;height:64px}.hdr h1{font-size:20px}}

/* SVG icons */
.ic-n,.ic-s,.ic-lg{display:inline-block;vertical-align:middle;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ic-n{width:22px;height:22px}
.ic-s{width:16px;height:16px}
.ic-lg{width:32px;height:32px}

/* Desktop nav */
.desk-nav{display:none}
@media(min-width:768px){.desk-nav{display:flex;gap:4px}}
.desk-nav a{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s}
.desk-nav a.on,.desk-nav a:hover{background:rgba(255,255,255,.2);color:#fff}
.desk-nav .ic-n{width:16px;height:16px}

/* Bottom nav */
.bot-nav{display:flex;background:var(--paper-card);border-top:1px solid var(--line);padding:6px 0 calc(6px + var(--safe-b));position:sticky;bottom:0;z-index:100;box-shadow:0 -2px 8px rgba(18,35,59,.06)}
.bot-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;padding:4px 2px;cursor:pointer;transition:color .15s}
.bot-nav a.on{color:var(--accent)}
.bot-nav a .ic-n{transition:color .15s}
@media(min-width:768px){.bot-nav{display:none}}

/* Page */
.pg{flex:1;padding:14px 16px;max-width:680px;margin:0 auto;width:100%;overflow-x:hidden}
@media(min-width:768px){.pg{padding:20px 24px;max-width:1000px}}

/* Cards */
.card{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700}
.card-sub{font-size:12px;color:var(--ink-mid);margin-top:2px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--paper-card);border-radius:var(--radius-sm);box-shadow:var(--shadow);border:1px solid var(--line);padding:14px;text-align:center}
.stat-v{font-size:30px;font-weight:800;color:var(--navy);line-height:1}
.stat-l{font-size:10px;font-weight:700;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--paper-dark);color:var(--ink)}.btn-secondary:hover{background:#d1d5db}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:6px}
.btn-ghost{background:transparent;color:var(--ink-mid);padding:6px 8px}.btn-ghost:hover{background:var(--paper-dark);color:var(--ink)}
.btn-full{width:100%}

/* Forms */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--ink-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fi,.fs,.ft{width:100%;padding:11px 14px;border:1.5px solid var(--paper-dark);border-radius:var(--radius-sm);font-size:15px;color:var(--ink);background:var(--paper-card);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.help-text{font-size:12px;color:var(--ink-faint);margin-top:4px}

/* List items */
.li{background:var(--paper-card);border-radius:var(--radius);border:1px solid var(--line);padding:13px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:box-shadow .15s,transform .12s}
.li:hover{box-shadow:var(--shadow-md)}.li:active{transform:scale(.985)}
.li-body{flex:1;min-width:0}
.li-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--ink-mid);margin-top:2px}
.li-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;line-height:1.5;white-space:nowrap}
.c-accent{background:var(--accent-light);color:var(--accent-dark)}
.c-neutral{background:var(--paper-dark);color:var(--ink-mid)}
.c-success{background:var(--success-light);color:#065f46}
.c-warn{background:var(--warn-light);color:#92400e}
.c-danger{background:var(--danger-light);color:#991b1b}
.quad-g79{background:#fce7f3;color:#9d174d}
.quad-b79{background:#dbeafe;color:#1e40af}
.quad-g1012{background:#f3e8ff;color:#6d28d9}
.quad-b1012{background:#d1fae5;color:#065f46}
.risk-stopped{color:#7f1d1d;background:#fee2e2}
.risk-atrisk{color:#92400e;background:#fef3c7}
.risk-declining{color:#1e3a5f;background:#dbeafe}
.risk-watch{color:#365314;background:#d9f99d}
.risk-regular{color:#065f46;background:#d1fae5}
.risk-new{color:#4c1d95;background:#ede9fe}

/* Leader chips */
.lc{display:inline-flex;align-items:center;gap:3px;padding:3px 10px 3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent-dark);font-size:12px;font-weight:600;border:1px solid rgba(37,99,235,.2);margin:2px}
.lc .rm{padding:0 2px;cursor:pointer;opacity:.6;font-size:14px;line-height:1}.lc .rm:hover{opacity:1;color:var(--danger)}

/* Progress */
.pb{height:6px;background:var(--paper-dark);border-radius:3px;overflow:hidden;margin-top:5px}
.pb-f{height:100%;border-radius:3px;transition:width .3s}
.fill-g{background:var(--success)}.fill-a{background:var(--warn)}.fill-r{background:var(--danger)}

/* Page headers */
.ph{margin-bottom:16px}
.ph-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.ph-sub{font-size:14px;color:var(--ink-mid);margin-top:4px}

/* Section headers */
.sh{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--paper-dark)}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(--ink-mid)}
.empty-icon{width:48px;height:48px;margin:0 auto 12px;opacity:.35;display:block;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-title{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;color:var(--ink-faint);margin-top:6px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(8,14,25,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.mo{align-items:center;padding:24px}}
.mo-box{background:var(--paper-card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:94vh;overflow-y:auto;padding:18px 18px max(18px,env(safe-area-inset-bottom));animation:rise .2s}
@media(min-width:768px){.mo-box{border-radius:var(--radius)}}
.mo-handle{width:40px;height:4px;background:var(--paper-dark);border-radius:2px;margin:0 auto 16px}
.mo-title{font-size:18px;font-weight:800;margin-bottom:16px}

/* Filters */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.fc{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--paper-dark);background:var(--paper-card);color:var(--ink-mid);cursor:pointer;transition:all .15s}
.fc.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Search */
.sbar{position:relative;margin-bottom:12px}
.sbar input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--paper-dark);border-radius:var(--radius-sm);font-size:15px;background:var(--paper-card);outline:none;transition:border-color .15s}
.sbar input:focus{border-color:var(--accent)}
.sbar .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint);pointer-events:none}

/* Alerts */
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.al-err{background:var(--danger-light);color:#991b1b}
.al-ok{background:var(--success-light);color:#065f46}
.al-info{background:var(--accent-light);color:var(--accent-dark)}
.al-warn{background:var(--warn-light);color:#92400e}

/* Login */
.login-pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 100%)}
.login-card{background:#fff;border-radius:var(--radius);padding:28px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .icon{display:flex;justify-content:center;margin-bottom:8px;color:var(--navy)}
.login-logo h1{font-size:22px;font-weight:800}
.login-logo p{font-size:13px;color:var(--ink-mid);margin-top:4px}

/* Spinner */
.spin{width:20px;height:20px;border:2.5px solid var(--paper-dark);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{display:flex;justify-content:center;padding:40px}

/* Toast */
#toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;pointer-events:none;opacity:0;transition:all .22s;z-index:300;white-space:nowrap;max-width:92vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:24px}}

/* Desktop table */
@media(min-width:768px){
  .dt{width:100%;border-collapse:collapse;font-size:14px}
  .dt th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--paper-dark);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:700}
  .dt td{padding:10px 12px;border-bottom:1px solid var(--paper-dark);vertical-align:middle}
  .dt tr:hover td{background:var(--paper)}
}

/* Responsive */
.mob{display:block}.desk{display:none}
@media(min-width:768px){.mob{display:none}.desk{display:block}}

/* Quad overview cards */
.qcard{background:var(--paper-card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.qcard.g79{border-color:#ec4899}.qcard.b79{border-color:#3b82f6}
.qcard.g1012{border-color:#8b5cf6}.qcard.b1012{border-color:#10b981}

/* Student detail */
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--paper-dark);font-size:14px}
.detail-lbl{color:var(--ink-mid);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.detail-val{font-weight:600}

/* Tab bar */
.tbbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.tbbar::-webkit-scrollbar{display:none}
.tbbtn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink-mid);background:var(--paper-card);border:1.5px solid var(--paper-dark);cursor:pointer}
.tbbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Audit timeline */
.audit-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--paper-dark)}
.audit-entry:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.audit-body{flex:1;min-width:0}
.audit-who{font-size:12px;color:var(--ink-mid);margin-top:2px}
.audit-detail{font-size:13px;color:var(--ink-mid);margin-top:3px}

/* Destructive section */
.destructive-section{border:2px solid var(--danger);border-radius:var(--radius-sm);padding:14px;margin-top:10px}
.destructive-header{color:#991b1b;font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Lock banner */
.lock-banner{background:var(--warn-light);border:1.5px solid var(--warn);color:#92400e;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ── SCALE-READY CONNECTION CARDS ── */
.connect-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:540px){.connect-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.connect-grid{grid-template-columns:repeat(3,1fr)}}
.connect-leader{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;position:relative;transition:box-shadow .15s;min-width:0;overflow:hidden}
.connect-leader:hover{box-shadow:var(--shadow-md)}
.connect-leader-name{font-size:16px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.connect-leader-meta{font-size:12px;color:var(--ink-mid);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.connect-count-bar{height:8px;background:var(--paper-dark);border-radius:4px;overflow:hidden;margin-bottom:6px}
.connect-count-fill{height:100%;border-radius:4px;transition:width .3s}
.connect-count-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-mid);margin-bottom:12px}
.connect-add-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--accent-light);color:var(--accent-dark);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:background .15s;text-align:center}
.connect-add-btn:hover{background:#c7d2fe}
.connect-add-btn:disabled{opacity:.45;cursor:not-allowed}
.connect-students{margin-top:12px;border-top:1px solid var(--paper-dark);padding-top:10px;max-height:200px;overflow-y:auto}
.connect-stud-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--paper-dark)}
.connect-stud-row:last-child{border-bottom:none}
.connect-stud-name{flex:1;font-size:14px;font-weight:600}
.connect-stud-meta{font-size:11px;color:var(--ink-mid)}

/* ── STUDENT PICKER MODAL ── */
.mo-box.picker{max-width:640px;max-height:96vh}
.picker-search{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--accent);border-radius:var(--radius-sm);font-size:16px;outline:none;background:var(--paper-card);margin-bottom:10px}
.picker-list{overflow-y:auto;max-height:calc(96vh - 200px)}
.picker-item{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;min-height:60px}
.picker-item:hover,.picker-item:focus{background:var(--accent-light);outline:none}
.picker-item.assigned{background:var(--success-light);cursor:default}
.picker-item-name{font-size:15px;font-weight:600;color:var(--ink)}
.picker-item-meta{font-size:12px;color:var(--ink-mid);margin-top:1px}
.picker-item-right{margin-left:auto;flex-shrink:0}
.picker-section{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px;border-bottom:1px solid var(--paper-dark)}

/* ── ACCESSIBILITY ── */
.fc:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.picker-item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* ── UNDO TOAST ── */
#undo-toast{position:fixed;bottom:calc(84px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:#1e293b;color:#fff;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:500;pointer-events:all;opacity:0;transition:all .22s;z-index:301;display:flex;align-items:center;gap:12px;white-space:nowrap;max-width:92vw}
#undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#undo-toast button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
#undo-toast button:hover{background:rgba(255,255,255,.35)}
@media(min-width:768px){#undo-toast{bottom:32px}}

/* ── ROLE BADGE TOOLTIP ── */
.role-badge{position:relative;cursor:help}
.role-badge::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);right:0;background:#1e293b;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;font-weight:400;text-transform:none;letter-spacing:0;z-index:200}
.role-badge:hover::after{opacity:1}

/* ── FIRST-RUN CARD ── */
.first-run{background:linear-gradient(135deg,var(--accent-light),#eff6ff);border-radius:var(--radius);padding:20px;margin-bottom:20px;border:1px solid rgba(37,99,235,.2)}
.first-run h3{font-size:16px;font-weight:800;margin-bottom:10px;color:var(--accent-dark)}
.first-run-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.first-run-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── MY LEADERS WIDGET ── */
.my-leaders-card{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.ml-leader-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--paper-dark)}
.ml-leader-row:last-child{border-bottom:none}

<body>
<div id="app"></div>
<div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="undo-toast"></div>
<div id="modal-root"></div>
<script>
// ============================================================
// API ADAPTER
// ============================================================
const API = (() => {
  let _t = localStorage.getItem('yap_token') || null;
  const hdr = () => ({ 'Content-Type': 'application/json', ...(_t ? { Authorization: `Bearer ${_t}` } : {}) });
  async function r(method, path, body) {
    const ac = new AbortController();
    const timer = setTimeout(() => ac.abort(new Error('Request timed out')), 20000);
    try {
      const res = await fetch(path, { method, headers: hdr(), signal: ac.signal, ...(body !== undefined ? { body: JSON.stringify(body) } : {}) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || e.error || res.statusText || 'Request failed'); }
      return res.json();
    } finally {
      clearTimeout(timer);
    }
  }
  const _inflight = new Map();
  return {
    setToken(t) { _t = t; t ? localStorage.setItem('yap_token', t) : localStorage.removeItem('yap_token'); },
    get token() { return _t; },
    get: (p) => {
      const cached = Cache.get(p);
      if (cached !== null) return Promise.resolve(cached);
      if (_inflight.has(p)) return _inflight.get(p);
      const promise = r('GET', p).then(data => { Cache.set(p, data); _inflight.delete(p); return data; }).catch(err => { _inflight.delete(p); throw err; });
      _inflight.set(p, promise);
      return promise;
    },
    post: (p, b) => r('POST', p, b),
    patch: (p, b) => r('PATCH', p, b),
    del: (p) => r('DELETE', p),
  };
})();

// ============================================================
// DATA CACHE (30-second TTL — makes back-navigation instant)
// ============================================================
const Cache = (() => {
  const store = new Map();
  const TTL = 30_000;
  return {
    get(key) {
      const e = store.get(key);
      return (e && Date.now() - e.ts < TTL) ? e.data : null;
    },
    set(key, data) { store.set(key, { data, ts: Date.now() }); },
    del(...keys) { for (const k of keys) { for (const sk of store.keys()) { if (sk === k || sk.startsWith(k + '/')) store.delete(sk); } } },
    clear() { store.clear(); },
  };
})();

// ============================================================
// STATE & ROUTING
// ============================================================
const S = { user: null, page: 'home', settings: {} };
function go(page) { S.page = page; render(); }
function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function modal(html, onClose) {
  const r = document.getElementById('modal-root');
  r.innerHTML = `<div class="mo" id="mo-overlay"><div class="mo-box"><div class="mo-handle"></div>${html}</div></div>`;
  r._onClose = onClose;
  r.querySelector('#mo-overlay').addEventListener('click', e => { if (e.target.id === 'mo-overlay') closeModal(); });
}
function closeModal() { const r = document.getElementById('modal-root'); if (r._onClose) r._onClose(); r.innerHTML = ''; r._onClose = null; }

// setApp updates only the <main id="page-main"> when the persistent shell is
// in place, falling back to a full #app replacement (login page, first render).
let _shellReady = false;
function setApp(h) {
  const main = document.getElementById('page-main');
  if (_shellReady && main) { main.innerHTML = h; window.scrollTo(0, 0); _updateNavActive(); }
  else document.getElementById('app').innerHTML = h;
}

function _updateNavActive() {
  const cur = S.page;
  document.querySelectorAll('[data-nav-page]').forEach(el => {
    el.classList.toggle('on', el.dataset.navPage === cur);
  });
}

// Build the persistent shell (header + empty main + bottom nav) once per login.
// Subsequent navigations only update <main id="page-main">.
function _initShell() {
  const u = S.user;
  if (!u) return;
  const items = navItems();
  const bn = bottomNavItems();
  const dlinks = items.map(it => `<a data-nav-page="${it.id}" onclick="go('${it.id}')">${icN(it.ic)} ${it.label}</a>`).join('');
  const mlinks = bn.map(it => `<a data-nav-page="${it.id}" onclick="go('${it.id}')">${icN(it.ic)}<span>${it.mbl||it.label}</span></a>`).join('');
  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <h1>Youth Connection</h1>
      <div class="hdr-meta">
        <nav class="desk-nav">${dlinks}</nav>
        ${roleBadge(u)}
        <div class="btn-icon" onclick="doLogout()" title="Sign out" aria-label="Sign out">${icN('logout')}</div>
      </div>
    </div>
    <main id="page-main" class="pg"></main>
    <nav class="bot-nav">${mlinks}</nav>`;
  _shellReady = true;
  _prefetch();
}

function _prefetch() {
  ['/overview', '/students', '/leaders', '/connections', '/at-risk', '/trends', '/import/history'].forEach(p => API.get(p).catch(() => {}));
}

// ============================================================
// HELPERS
// ============================================================
const QUAD_LABELS = { g79:'Girls Yr 7–9', b79:'Boys Yr 7–9', g1012:'Girls Yr 10–12', b1012:'Boys Yr 10–12' };
function quadLabel(q) { return QUAD_LABELS[q] || q; }
const ROLE_TIPS = {
  grade: (u) => `Grade ${u.grade} login — manages leaders and connections for Year ${u.grade}`,
  quad:  (u) => `${QUAD_LABELS[u.quad]||u.quad} login — read-only overview of your quad`,
  director: () => 'Director — full ministry access, can import data',
  admin: () => 'Admin — full access including settings and accounts',
};
function roleBadge(u) {
  if (!u) return '';
  let label, tip;
  if (u.role === 'grade') { label = `Grade ${u.grade}`; }
  else if (u.role === 'quad') { label = quadLabel(u.quad); }
  else { label = u.role.charAt(0).toUpperCase() + u.role.slice(1); }
  tip = (ROLE_TIPS[u.role]||(() => ''))(u);
  return `<span class="role-badge" data-tip="${tip}">${label}</span>`;
}
function roleBadgeInner(u) {
  // Returns just the label string for use inside shell() where we can't return HTML
  if (!u) return '';
  if (u.role === 'grade') return `Grade ${u.grade}`;
  if (u.role === 'quad') return quadLabel(u.quad);
  return u.role.charAt(0).toUpperCase() + u.role.slice(1);
}

// ── UNDO SYSTEM ──
const _undo = { pending: null, timer: null };
function showUndoToast(msg, undoFn) {
  const el = document.getElementById('undo-toast');
  if (_undo.timer) clearTimeout(_undo.timer);
  _undo.pending = undoFn;
  el.innerHTML = `<span>${msg}</span><button onclick="execUndo()">Undo</button>`;
  el.classList.add('show');
  _undo.timer = setTimeout(() => { el.classList.remove('show'); _undo.pending = null; }, 5000);
}
function execUndo() {
  const el = document.getElementById('undo-toast');
  el.classList.remove('show');
  if (_undo.pending) { _undo.pending(); _undo.pending = null; }
}

// ── ESCAPE KEY CLOSES MODALS ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const root = document.getElementById('modal-root');
    if (root && root.innerHTML) closeModal();
  }
});
function quadChip(q) {
  if (!q) return '';
  return `<span class="chip quad-${q}">${QUAD_LABELS[q] || q}</span>`;
}
function riskChip(s) {
  if (!s || s === 'regular') return '';
  const m = { stopped:['Stopped','risk-stopped'], atrisk:['At Risk','risk-atrisk'], declining:['Declining','risk-declining'], watch:['Watch','risk-watch'], new:['New','risk-new'] };
  const [l, c] = m[s] || [s, 'c-neutral'];
  return `<span class="chip ${c}">${l}</span>`;
}
function statusChip(status) {
  return status === 'active'
    ? '<span class="chip c-success">Active</span>'
    : '<span class="chip c-neutral">Inactive</span>';
}
function svcPct(s) { return s.svcTotal > 0 ? Math.round(s.svcAttended / s.svcTotal * 100) : null; }
function pBar(pct) {
  const cls = pct >= 70 ? 'fill-g' : pct >= 40 ? 'fill-a' : 'fill-r';
  return `<div class="pb"><div class="pb-f ${cls}" style="width:${pct}%"></div></div>`;
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.getDate()+'/'+(dt.getMonth()+1)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}
function fmtDM(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.getUTCDate()+'/'+(dt.getUTCMonth()+1);
}

// Quad helpers (gender + year bracket) — mirror backend quadGenderOf/quadGradesOf
function quadGrades(q) { return (q === 'g79' || q === 'b79') ? [7, 8, 9] : (q === 'g1012' || q === 'b1012') ? [10, 11, 12] : []; }
function quadGender(q) { return (q === 'g79' || q === 'g1012') ? 'female' : (q === 'b79' || q === 'b1012') ? 'male' : null; }

// ============================================================

function saveConnectFilters() {
  try {
    sessionStorage.setItem('yap_connect_filters', JSON.stringify({
      gf: [..._aS.gf],
      df: [..._aS.df],
      search: _aS.search,
      unconnectOnly: _aS.unconnectOnly
    }));
  } catch {}
}

function restoreConnectFilters() {
  try {
    const raw = sessionStorage.getItem('yap_connect_filters');
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (Array.isArray(saved.gf)) _aS.gf = new Set(saved.gf);
    if (Array.isArray(saved.df)) _aS.df = new Set(saved.df);
    if (typeof saved.search === 'string') _aS.search = saved.search;
    if (typeof saved.unconnectOnly === 'boolean') _aS.unconnectOnly = saved.unconnectOnly;
  } catch {}
}

// Returns true if all listed GET endpoints are in the cache (so we can skip the spinner).
function _allCached(...paths) { return paths.every(p => Cache.get(p) !== null); }

async function render() {
  if (!S.user) { renderLogin(); return; }
  if (!_shellReady) _initShell();
  _updateNavActive();
  const p = S.page;
  if (p && p.indexOf('ca-') === 0 && window.CA) { await CA.render(p); return; } /*CA-HOOK*/
  if (p==='home') await renderHome();
  else if (p==='leaders') await renderLeaders();
  else if (p==='allocate') go('leaders'); // legacy route — merged into leaders
  else if (p==='my-students') await renderMyStudents();
  else if (p==='quad-view') go('leaders'); // merged into leaders
  else if (p==='my-quad') go('leaders');   // merged into leaders
  else if (p==='at-risk') await renderAtRisk();
  else if (p==='students') await renderStudents();
  else if (p==='trends') await renderTrends();
  else if (p==='import') await renderImport();
  else if (p==='admin') await renderAdmin();
  else await renderHome();
}

  _shellReady = false;
  Cache.clear();
  document.getElementById('app').innerHTML = `

      <div class="login-card">

async function doLogin() {
  const email = document.getElementById('lemail')?.value?.trim();
  const password = document.getElementById('lpw')?.value;
  const errEl = document.getElementById('lerr');
  try {
    const res = await API.post('/auth/login', { email, password });
    API.setToken(res.token); S.user = res.user; go('home');
  } catch (e) { errEl.innerHTML = `<div class="alert al-err">${e.message}</div>`; }
}

async function doLogout() {
  try { await API.post('/auth/logout', { token: API.token }); } catch {}
  API.setToken(null); S.user = null; S.page = 'home';
  _msLeader = null; _trTab = 'svc'; _trGradeOpen = null; _trQuadOpen = null;
  _arFilter = { grade: null, gender: null };

function _hGradeAvg(trends, g) { const x = ((trends && trends.byGrade) || []).find(y => y.grade === g); return x ? Math.round(x.averageAttendance) : 0; }
function _hQuadAvg(trends, q) { const x = ((trends && trends.byQuad) || []).find(y => y.quad === q); return x ? Math.round(x.averageAttendance) : 0; }
function _hScopeSvcAvg(trends, u) {
  if (!trends) return 0;
  if (u.role === 'grade') return _hGradeAvg(trends, u.grade);
  if (u.role === 'quad') return _hQuadAvg(trends, u.quad);
  return trends.ministry ? Math.round(trends.ministry.averageAttendance) : 0;

function _hScopeSvcSess(trends, u) {
  if (!trends) return 0;
  if (u.role === 'quad') { const q = (trends.byQuad || []).find(x => x.quad === u.quad); return q && q.sessions ? q.sessions.length : 0; }
  if (u.role === 'grade') { const g = (trends.byGrade || []).find(x => x.grade === u.grade); return g && g.sessions ? g.sessions.length : 0; }
  return trends.ministry && trends.ministry.sessions ? trends.ministry.sessions.length : 0;
}

      body += '<div class="sh">Quick Actions</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
      for (const x of qa) {
        const warn = x.id === 'at-risk' && stats.atRiskTotal > 0;
        body += `<button class="btn btn-secondary" style="justify-content:flex-start${warn ? ';border-color:var(--danger);color:var(--danger)' : ''}" onclick="go('${x.id}')">${icS(x.ic)} ${x.label}</button>`;
      }
      body += '</div>';
    }

    if (u.role === 'grade') {
      // Compact 4-column connection strip
      body += '<div class="sh">Connection Summary</div>';
      body += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px">';
      body += `<div class="stat"><div class="stat-v">${stats.ministryTotal}</div><div class="stat-l">Total</div></div>`;
      body += `<div class="stat"><div class="stat-v" style="color:var(--success)">${stats.connectedTotal}</div><div class="stat-l">Connected</div></div>`;
      body += `<div class="stat"><div class="stat-v" style="color:var(--warn)">${stats.unconnectedTotal}</div><div class="stat-l">Pending</div></div>`;
      body += `<div class="stat"><div class="stat-v" style="color:var(--danger)">${stats.atRiskTotal}</div><div class="stat-l">At Risk</div></div>`;
      body += '</div>';
    } else {
      // Director/Admin: Attendance by Quad — tap to expand per-grade rows
      if (['admin', 'director'].includes(u.role)) {
        const vq = (stats.byQuad || []).filter(q => q.totalStudents > 0);
        if (vq.length) {
          body += '<div class="sh">Attendance by Quad</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
          for (const q of vq) {
            const open = _homeQuadOpen === q.quad;
            const qStud = sc.filter(s => s.quad === q.quad);
            let gradeRows = '';
            if (open) {
              gradeRows = '<div style="margin-top:8px">';
              for (const gr of _hQuadGrades(q.quad)) gradeRows += _hGradeMini('Yr ' + gr, qStud.filter(s => s.grade === gr), _hGradeAvg(trends, gr));
              gradeRows += '</div>';
            }
            body += _hAttTile(q.label, qStud, _hQuadAvg(trends, q.quad), { click: `toggleHomeQuad('${q.quad}')`, chev: open, span: open, gradeRows });
          }
          body += '</div>';
        }
      }
      // Quad: Attendance by Grade tiles (their bracket)
      if (u.role === 'quad') {
        body += '<div class="sh">Attendance by Grade</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
        for (const gr of _hQuadGrades(u.quad)) body += _hAttTile('Yr ' + gr, sc.filter(s => s.grade === gr), _hGradeAvg(trends, gr));
        body += '</div>';
      }
      // Connection by Grade bars
      if (['admin', 'director', 'quad'].includes(u.role) && stats.byGrade) {
        const vg = stats.byGrade.filter(g => g.totalStudents > 0);
        if (vg.length) {
          body += '<div class="sh">Connection by Grade</div><div class="card" style="padding:12px">';
          for (const g of vg) {
            const pct = g.totalStudents > 0 ? Math.round(g.connectedStudents / g.totalStudents * 100) : 0;
            body += `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--paper-dark)">
              <div style="width:60px;font-size:13px;font-weight:700">Grade ${g.grade}</div>
              <div style="flex:1"><div class="pb"><div class="pb-f ${pct >= 80 ? 'fill-g' : pct >= 50 ? 'fill-a' : 'fill-r'}" style="width:${pct}%"></div></div></div>
              <div style="font-size:12px;color:var(--ink-mid);width:90px;text-align:right">${g.connectedStudents}/${g.totalStudents} (${pct}%)${g.atRiskCount ? ` <span style="color:var(--danger);display:inline-flex;align-items:center;gap:2px">${icS('alert')}${g.atRiskCount}</span>` : ''}</div>
            </div>`;
          }
          body += '</div>';
        }
      }
    }
  }

  setApp(shell(body));
}

async function renderLeaders() {
  if (!_allCached('/leaders', '/connections')) setApp(shell('<div class="loading"><div class="spin"></div></div>'));
  const [leaders, connectsRaw] = await Promise.all([
    API.get('/leaders').catch(() => []),
    API.get('/connections').catch(() => []),
  ]);
  const countByLeader = {};
  for (const a of connectsRaw) countByLeader[a.leaderId] = (countByLeader[a.leaderId] || 0) + 1;
  const u = S.user;
  const canEdit = ['grade','quad','director','admin'].includes(u.role);

  let body = `<div class="ph"><div style="display:flex;align-items:center;justify-content:space-between">
    <div><div class="ph-title">Leaders</div><div class="ph-sub">${leaders.length} active</div></div>
    ${canEdit ? `<button class="btn btn-primary btn-sm" onclick="showAddLeader()">+ Add</button>` : ''}
  </div></div>`;

  if (u.role === 'quad') {
    body += `<div class="alert al-info">${icS('info')} You can add, edit and connect leaders within your quad (${u.quad ? quadGender(u.quad) : ''} · Yr ${quadGrades(u.quad).join('–') || '—'}).</div>`;
  }

  if (canEdit) {
    body += `<button class="btn btn-primary btn-full" style="margin-bottom:12px" onclick="go('leaders')">${icS('link')} Connect Students</button>`;
  }

  if (!leaders.length) {
    body += `<div class="empty">${icEmpty('users')}<div class="empty-title">No leaders yet</div><div class="empty-sub">Add leaders to start connecting students</div></div>`;
  } else {
    // Mobile cards
    body += '<div class="mob">';
    for (const l of leaders) {
      const assigned = countByLeader[l.id] || 0;
      const gi = l.gender==='female'?'♀':l.gender==='male'?'♂':'⚥';
      body += `
        <div class="li" style="cursor:pointer" onclick="showLeaderDetail('${l.id}')">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${gi}</div>
          <div class="li-body">
            <div class="li-title">${l.fullName}</div>
            <div class="li-sub">Gr ${l.grades?.join(', ')||'All'} · ${l.gender||'any'} · ${assigned} student${assigned!==1?'s':''}</div>
          </div>
          ${canEdit?`<div class="li-right">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showEditLeader('${l.id}')" title="Edit">${icS('edit')}</button>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();confirmDelLeader('${l.id}','${l.fullName.replace(/'/g,"\\'")}') " title="Delete">${icS('trash')}</button>
          </div>`:''}
        </div>`;
    }
    body += '</div>';
    // Desktop table
    body += `<div class="desk"><table class="dt"><thead><tr>
      <th>Name</th><th>Gender</th><th>Grades</th><th>Assigned</th><th></th>
    </tr></thead><tbody>`;
    for (const l of leaders) {
      const assigned = countByLeader[l.id] || 0;
      body += `<tr style="cursor:pointer" onclick="showLeaderDetail('${l.id}')">
        <td><strong>${l.fullName}</strong></td>
        <td>${l.gender||'—'}</td>
        <td>${l.grades?.length?'Gr '+l.grades.join(', '):'All'}</td>
        <td><span class="chip ${assigned>0?'c-success':'c-neutral'}">${assigned} student${assigned!==1?'s':''}</span></td>
        <td onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="showLeaderDetail('${l.id}')">View</button>
          ${canEdit?`<button class="btn btn-ghost btn-sm" onclick="showEditLeader('${l.id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="confirmDelLeader('${l.id}','${l.fullName.replace(/'/g,"\\'")}')">Del</button>`:''}
        </td>
      </tr>`;
    }
    body += '</tbody></table></div>';
  }
  setApp(shell(body));
}

async function submitAddLeader() {
  const name = document.getElementById('ln')?.value?.trim();
  const gender = document.getElementById('lg')?.value || null;
  const grades = [...(document.querySelectorAll('.gcb:checked')||[])].map(el => parseInt(el.value,10));

    await API.post('/leaders', { fullName:name, gender, grades });

  } catch (e) { errEl.innerHTML=`<div class="alert al-err">${e.message}</div>`; }
}

// ============================================================
// CONNECT  (leader-centric card view — scales to 60+ students)
// ============================================================
let _aS = { students:[], leaders:[], allocs:{}, gf:new Set(), df:new Set(), unconnectOnly:false };
// _pickerCtx = { leaderId, leaderGender, leaderName }
let _pickerCtx = null;

async function renderConnect() {
  if (!_allCached('/students', '/leaders', '/connections')) setApp(shell('<div class="loading"><div class="spin"></div></div>'));
  await loadConnectData();
  renderConnectView();
}

async function loadConnectData() {
  const [students, leaders, connectsRaw] = await Promise.all([
    API.get('/students').catch(() => []),
    API.get('/leaders').catch(() => []),
    API.get('/connections').catch(() => []),
  ]);
  const allocs = {};
  for (const a of connectsRaw) { if (!allocs[a.studentId]) allocs[a.studentId]=[]; allocs[a.studentId].push(a.leaderId); }
  _aS.students = students; _aS.leaders = leaders; _aS.allocs = allocs;
}

function renderConnectView() {
  const { students, leaders, allocs, gf, df, unconnectOnly } = _aS;
  const u = S.user;

  // Connection lock check
  const lockDate = S.settings?.connectionLockDate;
  const isLocked = !!(lockDate && new Date() >= new Date(lockDate));
  const canEdit = (!isLocked || u?.role === 'admin');

  // Filter leaders by grade/gender chips (applied to the leader cards shown)
  let visLeaders = leaders;
  if (gf.size) visLeaders = visLeaders.filter(l => l.grades?.some(g => gf.has(g)));
  if (df.size) visLeaders = visLeaders.filter(l => !l.gender || df.has(l.gender));
  if (unconnectOnly) {
    // Show only leaders that have at least one unconnected student in their scope
    visLeaders = visLeaders.filter(l => {
      const pool = students.filter(s => !l.gender || s.gender === l.gender);
      return pool.some(s => !(allocs[s.id]?.includes(l.id)));
    });
  }

  // Counts
  const connectedStudentIds = new Set(Object.keys(allocs).filter(id => allocs[id].length > 0));
  const totalStudents = students.length;
  const connectedCount = connectedStudentIds.size;

  const gChips = [7,8,9,10,11,12].map(g =>
    `<button class="fc ${gf.has(g)?'on':''}" onclick="toggleAF('g',${g})" aria-pressed="${gf.has(g)}">${g}</button>`
  ).join('');
  const dChips = ['male','female'].map(g =>
    `<button class="fc ${df.has(g)?'on':''}" onclick="toggleAF('d','${g}')" aria-pressed="${df.has(g)}">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`
  ).join('');

  let lockBanner = '';
  if (isLocked) {
    const lockFmt = new Date(lockDate).toLocaleDateString();
    lockBanner = `<div class="lock-banner">${icS('lock')} Connections locked as of ${lockFmt}.${u?.role==='admin'?' (Admin can still make changes.)':' Contact admin to make changes.'}</div>`;
  }
  const gradeHint = (u?.role === 'grade')
    ? `<div class="alert al-info" style="margin-bottom:10px">Tap "Add Students" on any leader to search. You can add students from other grades if they match the leader's gender.</div>`
    : '';

  let body = `
    <div class="ph">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div class="ph-title">Connect</div>
          <div class="ph-sub">${connectedCount}/${totalStudents} students connected · ${visLeaders.length} leader${visLeaders.length!==1?'s':''}</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="exportConnectCSV()" aria-label="Export connections to CSV">Export CSV</button>
      </div>
    </div>
    ${lockBanner}${gradeHint}
    <div class="filter-row" role="group" aria-label="Filter by grade">
      <span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Grade:</span>${gChips}
    </div>
    <div class="filter-row" role="group" aria-label="Filter by gender">
      <span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}
      <button class="fc ${unconnectOnly?'on':''}" onclick="toggleUnconnectOnly()" aria-pressed="${unconnectOnly}">Unconnected focus</button>
    </div>`;

  if (!visLeaders.length) {
    body += `<div class="empty">${icEmpty('users')}<div class="empty-title">No leaders match filters</div><div class="empty-sub">Clear filters or add leaders first</div></div>`;
  } else {
    body += '<div class="connect-grid">';
    for (const l of visLeaders) {
      const assignedIds = students.filter(s => allocs[s.id]?.includes(l.id)).map(s => s.id);
      const assignedStudents = assignedIds.map(id => students.find(s => s.id === id)).filter(Boolean);
      const n = assignedStudents.length;
      // Capacity hint: rough target = total students in gender / number of same-gender leaders
      const sameGenderLeaders = leaders.filter(ll => !ll.gender || ll.gender === l.gender).length || 1;
      const sameGenderStudents = students.filter(s => !l.gender || s.gender === l.gender).length;
      const target = Math.round(sameGenderStudents / sameGenderLeaders);
      const pct = target > 0 ? Math.min(100, Math.round(n / target * 100)) : 0;
      const fillCls = pct >= 90 ? 'fill-r' : pct >= 60 ? 'fill-g' : 'fill-a';

      let studentRows = '';
      for (const s of assignedStudents.slice(0, 8)) {
        const p = svcPct(s);
        studentRows += `<div class="connect-stud-row">
          <div style="flex:1;min-width:0">
            <div class="connect-stud-name">${s.firstName} ${s.lastName}</div>
            <div class="connect-stud-meta">Gr ${s.grade||'—'} · ${s.gender}${p!==null?' · '+p+'%':''}</div>
          </div>
          ${riskChip(s.atRiskStatus)}
          ${canEdit?`<button class="btn btn-ghost btn-sm" style="padding:4px 6px;color:var(--danger)" onclick="removeConnectWithUndo('${s.id}','${l.id}','${s.firstName} ${s.lastName}','${l.fullName}')" aria-label="Disconnect ${s.firstName} ${s.lastName} from ${l.fullName}">×</button>`:''}
        </div>`;
      }
      if (assignedStudents.length > 8) {
        studentRows += `<div style="font-size:12px;color:var(--ink-faint);padding:6px 0;text-align:center">+${assignedStudents.length - 8} more · <button class="btn btn-ghost btn-sm" onclick="showLeaderDetail('${l.id}')">View all</button></div>`;
      }

      const gi = l.gender==='female'?'♀ ':l.gender==='male'?'♂ ':'';
      body += `<div class="connect-leader">
        <div class="connect-leader-name">${gi}${l.fullName}</div>
        <div class="connect-leader-meta">Gr ${l.grades?.join(', ')||'All'} · ${l.gender||'any gender'}</div>
        <div class="connect-count-bar"><div class="connect-count-fill ${fillCls}" style="width:${pct}%"></div></div>
        <div class="connect-count-label">
          <span>${n} student${n!==1?'s':''}</span>
          <span style="color:var(--ink-faint)">~${target} target</span>
        </div>
        ${canEdit?`<button class="connect-add-btn" onclick="openStudentPicker('${l.id}','${l.gender||''}','${l.fullName.replace(/'/g,"\\'")}')">+ Add Students</button>`:''}
        ${assignedStudents.length?`<div class="connect-students">${studentRows}</div>`:''}
      </div>`;
    }
    body += '</div>';
  }

  setApp(shell(body));
}

function toggleAF(type, val) {
  if (type==='g') { if (_aS.gf.has(val)) _aS.gf.delete(val); else _aS.gf.add(val); }
  else { if (_aS.df.has(val)) _aS.df.delete(val); else _aS.df.add(val); }
  saveConnectFilters(); renderConnectView();
}
function toggleUnconnectOnly() { _aS.unconnectOnly = !_aS.unconnectOnly; saveConnectFilters(); renderConnectView(); }

// ── STUDENT PICKER MODAL (replaces tiny <select> — works at 60+ students) ──
function openStudentPicker(leaderId, leaderGender, leaderName) {
  _pickerCtx = { leaderId, leaderGender, leaderName };
  const assignedForLeader = new Set(
    _aS.students.filter(s => _aS.allocs[s.id]?.includes(leaderId)).map(s => s.id)
  );
  // Pool: same gender (or ungendered leader) — includes all grades for cross-grade connection
  const pool = _aS.students.filter(s => !leaderGender || s.gender === leaderGender);

  modal(`
    <div class="mo-title">Add Students → ${leaderName}</div>
    <div style="position:relative;margin-bottom:4px">
      <input class="picker-search" id="picker-q" placeholder="Search by name, grade…" oninput="filterPicker()" autofocus>
    </div>
    <div id="picker-list" class="picker-list"></div>`,
    () => { _pickerCtx = null; }
  );

  // Pre-render the list
  window._pickerPool = pool;
  window._pickerAssigned = assignedForLeader;
  filterPicker();

  // Focus the search input
  setTimeout(() => document.getElementById('picker-q')?.focus(), 60);
}

function filterPicker() {
  const q = (document.getElementById('picker-q')?.value || '').toLowerCase().trim();
  const pool = window._pickerPool || [];
  const assigned = window._pickerAssigned || new Set();

  let list = pool;
  if (q) {
    // Match each word against first name, last name, or grade
    const terms = q.split(/\s+/).filter(Boolean);
    list = pool.filter(s => {
      const text = `${s.firstName} ${s.lastName} ${s.grade||''}`.toLowerCase();
      return terms.every(t => text.includes(t));
    });
  }

  // Group: already assigned at top, then by grade
  const alreadyAssigned = list.filter(s => assigned.has(s.id));
  const available = list.filter(s => !assigned.has(s.id));

  // Group available by grade
  const byGrade = {};
  for (const s of available) {
    const g = s.grade || 0;
    if (!byGrade[g]) byGrade[g] = [];
    byGrade[g].push(s);
  }

  let html = '';
  if (alreadyAssigned.length) {
    html += `<div class="picker-section">Already assigned (${alreadyAssigned.length})</div>`;
    for (const s of alreadyAssigned) {
      html += pickerRow(s, true);
    }
  }
  if (available.length === 0 && alreadyAssigned.length === 0) {
    html = '<div style="text-align:center;padding:32px;color:var(--ink-faint)">No students found</div>';
  } else {
    for (const [grade, students] of Object.entries(byGrade).sort((a,b) => Number(a[0])-Number(b[0]))) {
      html += `<div class="picker-section">Grade ${grade === '0' ? '—' : grade} (${students.length})</div>`;
      for (const s of students) html += pickerRow(s, false);
    }
  }
  const listEl = document.getElementById('picker-list');
  if (listEl) listEl.innerHTML = html;
}

function pickerRow(s, isAssigned) {
  const pct = svcPct(s);
  const risk = riskChip(s.atRiskStatus);
  if (isAssigned) {
    return `<div class="picker-item assigned">
      <div>
        <div class="picker-item-name" style="display:flex;align-items:center;gap:4px">${icS('check')} ${s.firstName} ${s.lastName}</div>
        <div class="picker-item-meta">Gr ${s.grade||'—'} · ${s.gender}${pct!==null?' · '+pct+'%':''}</div>
      </div>
      <div class="picker-item-right">${risk}<button onclick="remPick('${s.id}')" title="Remove from this leader" style="margin-left:8px;border:none;background:none;color:var(--danger);font-size:20px;font-weight:700;line-height:1;cursor:pointer">−</button></div>
    </div>`;
  }
  return `<button class="picker-item" onclick="addConnFromPicker('${s.id}')" aria-label="Assign ${s.firstName} ${s.lastName}">
    <div>
      <div class="picker-item-name">${s.firstName} ${s.lastName}</div>
      <div class="picker-item-meta">Gr ${s.grade||'—'} · ${s.gender}${pct!==null?' · '+pct+'%':''}</div>
    </div>
    <div class="picker-item-right">${risk}<span style="color:var(--accent);font-size:18px;margin-left:8px">+</span></div>
  </button>`;
}

async function addConnFromPicker(studentId) {
  if (!_pickerCtx) return;
  const { leaderId } = _pickerCtx;
  try {
    await API.post('/connections', { studentId, leaderId });
    Cache.del('/connections', '/overview', '/at-risk');
    const cur = _aS.allocs[studentId] || [];
    _aS.allocs[studentId] = [...cur, leaderId];
    window._pickerAssigned.add(studentId);
    filterPicker();
    pickerSyncBg();
    const s = _aS.students.find(x => x.id === studentId);
    if (s) toast(`${s.firstName} ${s.lastName} added`);
  } catch (e) { toast(e.message); }
}

// Remove a connection from inside the picker (demo: remPick) + keep the page behind in sync.
async function remPick(studentId) {
  if (!_pickerCtx) return;
  const { leaderId } = _pickerCtx;
  try {
    await API.del(`/connections/${studentId}/${leaderId}`);
    Cache.del('/connections', '/overview', '/at-risk');
    _aS.allocs[studentId] = (_aS.allocs[studentId] || []).filter(id => id !== leaderId);
    window._pickerAssigned.delete(studentId);
    filterPicker();
    pickerSyncBg();
    const s = _aS.students.find(x => x.id === studentId);
    if (s) toast(`${s.firstName} ${s.lastName} removed`);
  } catch (e) { toast(e.message); }
}
// Repaint the page behind the open picker so leader counts stay current.

async function removeConnectWithUndo(studentId, leaderId, studentName, leaderName) {

function tLvF(type, val) {

function fmtBday(iso) {
  if (!iso) return '';
  const p = String(iso).split('T')[0].split('-');
  return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : String(iso);
}

  let body = `
    <div class="ph">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div class="ph-title" style="display:flex;align-items:center;gap:7px">${icN('alert')} At Risk</div><div class="ph-sub">${list.length} student${list.length!==1?'s':''} flagged</div></div>
        ${['director','admin'].includes(u.role)?`<button class="btn btn-secondary btn-sm" onclick="recomputeAtRisk()">Recompute</button>`:''}
      </div>
    </div>`;

  if (arGrades.length) {
    body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Grade:</span>${gChips}
      <button class="fc ${!_arFilter.grade?'on':''}" onclick="setArFilter('grade',null)">All</button></div>`;
  }
  if (arGenders.length) {
    body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}
      <button class="fc ${!_arFilter.gender?'on':''}" onclick="setArFilter('gender',null)">All</button></div>`;
  }

  if (!list.length) {
    body += `<div class="empty">${icEmpty('check')}<div class="empty-title">No at-risk students</div><div class="empty-sub">Great news — attendance looks healthy</div></div>`;
  } else {
    const groups = { declining:[], atrisk:[], stopped:[], watch:[] };
    for (const s of list) if (groups[s.status]) groups[s.status].push(s);
    const labels = { declining:'Declining', atrisk:'At Risk', stopped:'Stopped Attending', watch:'Watch List' };
    for (const [status, items] of Object.entries(groups)) {
      if (!items.length) continue;
      let cards = '';
      for (const s of items) {
        const pct = s.svcTotal > 0 ? Math.round(s.svcAttended / s.svcTotal * 100) : 0;
        cards += `
          <div class="li" style="cursor:default;align-items:flex-start">
            <div class="li-body">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="li-title">${s.fullName}</span>
                ${riskChip(s.status)} ${quadChip(s.quad)}
              </div>
              <div class="li-sub" style="margin-top:3px">Gr ${s.grade||'—'} · ${s.gender}</div>
              <div style="display:flex;gap:16px;margin-top:8px">
                <div>
                  <div style="font-size:10px;color:var(--ink-faint);font-weight:700;text-transform:uppercase">Service</div>
                  <div style="font-size:13px;font-weight:700;color:${pct<50?'var(--danger)':'var(--ink)'}">${s.svcAttended}/${s.svcTotal} (${pct}%)</div>
                  <div class="pb" style="width:80px">${pBar(pct)}</div>
                </div>
                ${s.grpTotal>0?`<div>
                  <div style="font-size:10px;color:var(--ink-faint);font-weight:700;text-transform:uppercase">Groups</div>
                  <div style="font-size:13px;font-weight:700">${s.grpAttended}/${s.grpTotal}</div>
                </div>`:''}
              </div>
              ${(s.prevSvcRate!=null||s.prevGrpRate!=null)?`<div style="font-size:11px;color:var(--ink-faint);margin-top:6px;display:flex;align-items:center;gap:6px">
                <span>Prev term: ${s.prevSvcRate!=null?'Svc '+Math.round(s.prevSvcRate*100)+'%':''}${s.prevSvcRate!=null&&s.prevGrpRate!=null?' · ':''}${s.prevGrpRate!=null?'Grp '+Math.round(s.prevGrpRate*100)+'%':''}</span>
                ${trendArrow(s.svcTrend)}
              </div>`:''}
            </div>
            <div class="li-right">
              <button class="btn btn-ghost btn-sm" onclick="showAtRiskUpdate('${s.studentId}','${s.fullName.replace(/'/g,"\\'")}','${s.status}')" title="Update status">${icS('edit')}</button>
            </div>
          </div>`;
      }
      body += `<div class="card" style="margin-bottom:12px">
        <div onclick="toggleArSection('${status}')" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 16px;user-select:none">
          <span id="ar-chev-${status}" style="display:inline-flex;color:var(--ink-mid)">${icS('chevr')}</span>

          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">
            ${cards}
          </div>
        </div>
      </div>`;
    }
  }
  setApp(shell(body));
}

function colChart(sessions, maxH) {
  const max = Math.max(1, ...sessions.map(s => s.pct));
  return '<div class="cchart">' + sessions.map(s => {
    const h = s.pct ? Math.round(s.pct / max * (maxH || 56)) + 4 : 4;
    const cls = s.pct >= 70 ? '' : s.pct < 40 ? 'cr' : 'lo';
    return `<div class="ccol"><div class="ccol-bar ${cls}" style="height:${h}px"></div><div class="ccol-lbl">${fmtDM(s.date||'')}</div></div>`;
  }).join('') + '</div>';
}
function hbarTr(label, pct, disp) {
  const shown = disp !== undefined ? disp : pct + '%';
  return `<div class="tbar-row"><div class="tbar-lbl">${label}</div><div class="tbar-track"><div class="tbar-fill ${pct<40?'crit':pct<70?'low':''}" style="width:${pct}%"></div></div><div class="tbar-val">${shown}</div></div>`;
}
function trendBadge(dir) {
  if (dir === 'up') return `<span class="tr-up" style="display:inline-flex;align-items:center;gap:2px">${icS('arru')} Improving</span>`;
  if (dir === 'down') return `<span class="tr-dn" style="display:inline-flex;align-items:center;gap:2px">${icS('arrd')} Declining</span>`;
  return `<span class="tr-st" style="display:inline-flex;align-items:center;gap:2px">${icS('arrr')} Stable</span>`;
}
function trendDir(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  if (v.length < 4) return 'stable';
  const h1 = v.slice(0, Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/Math.floor(v.length/2);
  const h2 = v.slice(Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/(v.length-Math.floor(v.length/2));
  if (h2-h1 > 4) return 'up'; if (h1-h2 > 4) return 'down'; return 'stable';
}
function avgAtt(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  return v.length ? Math.round(v.reduce((s,x)=>s+x.att,0)/v.length) : 0;
}
function statCard(nums, labels, prevs) {
  const cols = nums.length;
  const fz = cols >= 3 ? '1.2rem' : '1.5rem';
  return `<div class="tstat" style="grid-template-columns:repeat(${cols},1fr)">` +
    nums.map((n,i) => `<div class="tstat-cell"><div class="tstat-v" style="font-size:${fz}">${n}</div><div class="tstat-l">${labels[i]}</div>${prevs&&prevs[i]?`<div class="tstat-p">${prevs[i]}</div>`:''}</div>`).join('') +
    '</div>';
}

// Breadth bar: how many enrolled attended at least once (demo: grpBar)
function grpBar(uniq, enrolled) {
  const p = enrolled ? Math.round(uniq / enrolled * 100) : 0;
  return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-mid);margin-bottom:3px"><span>${uniq} of ${enrolled} enrolled attended at least once</span><span>${p}%</span></div><div class="pb"><div class="pb-f ${p>=75?'fill-g':p>=50?'fill-a':'fill-r'}" style="width:${p}%"></div></div></div>`;
}
// Compact trend arrow for at-risk prev-term comparison
function trendArrow(dir) {
  if (dir === 'up') return `<span style="color:var(--success);display:inline-flex">${icS('arru')}</span>`;
  if (dir === 'down') return `<span style="color:var(--danger);display:inline-flex">${icS('arrd')}</span>`;
  return '';
}

async function renderTrends() {
  if (!_allCached('/students')) setApp(shell('<div class="loading"><div class="spin"></div></div>'));
  const u = S.user;
  const [students, overview] = await Promise.all([
    API.get('/students').catch(() => []),
    API.get('/overview').catch(() => null),
  ]);

  const canExport = ['quad','director','admin'].includes(u.role);
  const QUAD_LABELS_LOCAL = { g79:'Girls Yr 7–9', b79:'Boys Yr 7–9', g1012:'Girls Yr 10–12', b1012:'Boys Yr 10–12' };

  // Compute per-grade stats from students
  function gradeStats(sc) {
    return [7,8,9,10,11,12].map(gr => {
      const gs = sc.filter(s => s.grade === gr);
      const tot = gs.reduce((s,x)=>s+x.svcTotal,0);
      const att = gs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPctGr = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = gs.filter(s=>s.svcAttended>0).length;
      return { grade:gr, count:gs.length, svcPct:svcPctGr, uniq, att, tot };
    });
  }
  function quadStats(sc) {
    return ['g79','b79','g1012','b1012'].map(q => {
      const qs = sc.filter(s => s.quad === q);
      const tot = qs.reduce((s,x)=>s+x.svcTotal,0);
      const att = qs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPct = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = qs.filter(s=>s.svcAttended>0).length;
      return { quad:q, label:QUAD_LABELS_LOCAL[q], count:qs.length, svcPct, uniq, att, tot };
    });
  }

  const byGrade = gradeStats(students);
  const byQuad = quadStats(students);
  const totalUniq = students.filter(s=>s.svcAttended>0).length;
  const totalTot = students.reduce((s,x)=>s+x.svcTotal,0);
  const totalAtt = students.reduce((s,x)=>s+x.svcAttended,0);
  const totalAvgPct = totalTot > 0 ? Math.round(totalAtt/totalTot*100) : 0;
  const totalAvgSess = students.length ? Math.round(totalAtt/students.length) : 0;

  const QUAD_COLORS = { g79:'#ec4899', b79:'#3b82f6', g1012:'#8b5cf6', b1012:'#10b981' };

async function exportTrendsCSV() {
  try {
    const students = await API.get('/students');
    const rows = [['Grade','Students','Unique Svc','Avg Svc Sess','Grp Enrolled','Unique Grp','Avg Grp Sess']];
    for (const gr of [7,8,9,10,11,12]) {
      const gs = students.filter(s=>s.grade===gr);
      if (!gs.length) continue;
      const u=gs.filter(s=>s.svcAttended>0).length;
      const avgSvc=gs.length?Math.round(gs.reduce((s,x)=>s+x.svcAttended,0)/gs.length):0;
      const grpS=gs.filter(s=>s.grpTotal>0);
      const uG=grpS.filter(s=>s.grpAttended>0).length;
      const avgGrp=grpS.length?Math.round(grpS.reduce((s,x)=>s+x.grpAttended,0)/grpS.length):0;
      rows.push([gr,gs.length,u,avgSvc,grpS.length,uG,avgGrp]);
    }
    const csv = rows.map(r=>r.join(',')).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='trends.csv'; a.click();
    URL.revokeObjectURL(url); toast('Exported');
  } catch(e) { toast('Export failed: '+e.message); }
}

// ── XLSX READER (no library — uses the browser's native DecompressionStream) ──
// Reads sheet 1 of an .xlsx ArrayBuffer into a 2D array of strings. Date-styled numeric
// cells are converted to ISO yyyy-mm-dd so the existing CSV parsers work unchanged.
async function readXlsx(buf){
  if(typeof DecompressionStream==='undefined')throw new Error('This browser cannot read Excel files — export the sheet as CSV and re-upload.');
  const u8=new Uint8Array(buf),dv=new DataView(u8.buffer,u8.byteOffset,u8.byteLength);
  if(u8.length>3&&dv.getUint32(0,true)===0xE011CFD0)throw new Error('Legacy .xls files are not supported — save as .xlsx or export as CSV.');
  let eocd=-1;
  for(let i=u8.length-22;i>=Math.max(0,u8.length-22-65536);i--){if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;}}
  if(eocd<0)throw new Error('Not a valid .xlsx file.');
  const count=dv.getUint16(eocd+10,true);let off=dv.getUint32(eocd+16,true);
  const td=new TextDecoder();
  const entries={};
  for(let i=0;i<count;i++){
    if(dv.getUint32(off,true)!==0x02014b50)break;
    const method=dv.getUint16(off+10,true),csize=dv.getUint32(off+20,true),nlen=dv.getUint16(off+28,true),elen=dv.getUint16(off+30,true),clen=dv.getUint16(off+32,true),lho=dv.getUint32(off+42,true);
    entries[td.decode(u8.subarray(off+46,off+46+nlen))]={method,csize,lho};
    off+=46+nlen+elen+clen;
  }
  async function zfile(name){
    const en=entries[name];if(!en)return null;
    const nlen=dv.getUint16(en.lho+26,true),elen=dv.getUint16(en.lho+28,true);
    const start=en.lho+30+nlen+elen;
    const bytes=u8.subarray(start,start+en.csize);
    if(en.method===0)return td.decode(bytes);
    const stream=new ReadableStream({start(c){c.enqueue(bytes);c.close();}}).pipeThrough(new DecompressionStream('deflate-raw'));
    return td.decode(await new Response(stream).arrayBuffer());
  }
  const unesc=x=>String(x).replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#(\d+);/g,(m,n)=>String.fromCharCode(+n)).replace(/&amp;/g,'&');
  const shared=[];
  const ssXml=await zfile('xl/sharedStrings.xml');
  if(ssXml)for(const m of ssXml.matchAll(/<si>([\s\S]*?)<\/si>/g))
    shared.push(unesc((m[1].match(/<t[^>]*>([\s\S]*?)<\/t>/g)||[]).map(t=>t.replace(/<[^>]+>/g,'')).join('')));
  const dateXf=new Set();
  const stXml=await zfile('xl/styles.xml');
  if(stXml){
    const custom={};
    for(const m of stXml.matchAll(/<numFmt[^>]*numFmtId="(\d+)"[^>]*formatCode="([^"]*)"/g))custom[+m[1]]=m[2];
    const isDate=id=>(id>=14&&id<=22)||(id>=45&&id<=47)||(custom[id]!==undefined&&/[ymd]/i.test(custom[id].replace(/\[[^\]]*\]/g,'').replace(/"[^"]*"/g,'')));
    const xfs=stXml.match(/<cellXfs[^>]*>([\s\S]*?)<\/cellXfs>/);
    if(xfs){let i=0;for(const m of xfs[1].matchAll(/<xf\b[^>]*/g)){const fm=/numFmtId="(\d+)"/.exec(m[0]);if(fm&&isDate(+fm[1]))dateXf.add(i);i++;}}
  }
  const sheetName=entries['xl/worksheets/sheet1.xml']?'xl/worksheets/sheet1.xml':Object.keys(entries).filter(n=>/^xl\/worksheets\/sheet\d+\.xml$/.test(n)).sort()[0];
  if(!sheetName)throw new Error('No worksheet found in the .xlsx file.');
  const xml=await zfile(sheetName);
  const colIdx=l=>{let n=0;for(const c of l)n=n*26+(c.charCodeAt(0)-64);return n-1;};
  const serialToIso=n=>new Date(Math.round((n-25569)*864e5)).toISOString().slice(0,10); // 25569 = 1970-01-01 in Excel's 1900 system
  const rows=[];
  for(const rm of xml.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)){
    const row=[];
    for(const cm of rm[1].matchAll(/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g)){
      const a=cm[1],inner=cm[2]||'';
      const rf=/r="([A-Z]+)\d+"/.exec(a);
      const ci=rf?colIdx(rf[1]):row.length;
      const t=(/(?:^|\s)t="([^"]+)"/.exec(a)||[])[1];
      const si=(/(?:^|\s)s="(\d+)"/.exec(a)||[])[1];
      let v='';
      if(t==='inlineStr')v=unesc((inner.match(/<t[^>]*>([\s\S]*?)<\/t>/g)||[]).map(x=>x.replace(/<[^>]+>/g,'')).join(''));
      else{const vm=/<v[^>]*>([\s\S]*?)<\/v>/.exec(inner);v=vm?vm[1]:'';}
      if(t==='s')v=shared[+v]??'';
      else if(t==='b')v=v==='1'?'TRUE':'FALSE';
      else if(t!=='inlineStr'){
        if(v!==''&&si!==undefined&&dateXf.has(+si)&&!isNaN(parseFloat(v)))v=serialToIso(parseFloat(v));
        else v=unesc(v);
      }
      while(row.length<ci)row.push('');
      row[ci]=String(v);
    }
    rows.push(row);
  }
  return rows;
}
function rowsToCsv(rows){return rows.map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');}

function handleImportDrop(e) { const f = e.dataTransfer.files[0]; if (f) processImport(f); }
function handleImportFile(input) { const f = input.files[0]; if (f) processImport(f); }

function processImport(file) {
  const statusEl = document.getElementById('import-status');
  const isExcel = /\.xlsx?$/i.test(file.name);
  statusEl.innerHTML = '<div class="alert al-info"><div class="spin" style="margin-right:8px"></div>Parsing ' + (isExcel ? 'Excel' : 'CSV') + '…</div>';
  const reader = new FileReader();
  reader.onload = async (e) => {
    let rows;
    if (isExcel) {
      try { rows = parseCSV(rowsToCsv(await readXlsx(e.target.result))); }
      catch (err) { statusEl.innerHTML = `<div class="alert al-err">${(err && err.message) || 'Could not read this Excel file'}</div>`; return; }
    } else rows = parseCSV(e.target.result);
    if (!rows.length) { statusEl.innerHTML = '<div class="alert al-err">No valid rows found</div>'; return; }
    statusEl.innerHTML = `<div class="alert al-info">Found ${rows.length} rows. Uploading…</div>`;
    try {
      const result = await API.post('/import/csv', { rows, filename: file.name });
      Cache.clear();
      statusEl.innerHTML = `<div class="alert al-ok" style="display:flex;align-items:center;gap:6px">${icS('check')} Import complete: ${result.studentsAdded} added, ${result.studentsUpdated} updated, ${result.sessionsAdded} sessions</div>`;
    } catch (err) { statusEl.innerHTML = `<div class="alert al-err">Import failed: ${err.message}</div>`; }
  };
  if (isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file);
}

function splitCSVLine(line) {
  const vals=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const c=line[i];
    if (inQ) { if (c==='"'&&line[i+1]==='"') { cur+='"'; i++; } else if (c==='"') { inQ=false; } else { cur+=c; } }
    else if (c==='"') { inQ=true; }
    else if (c===',') { vals.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  vals.push(cur.trim());
  return vals;
}
function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g,''));
    const obj = {};
    headers.forEach((h, i) => {
      const v = vals[i] || '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(h)) {
        obj[h] = ['true','1','yes','y'].includes(v.toLowerCase());
      } else if (h === 'grade') {
        obj[h] = v ? parseInt(v, 10) : null;
      } else { obj[h] = v; }
    });
    return (obj.first_name || obj['first name']) ? obj : null;
  }).filter(Boolean);
}
