async function renderUpcomingBirthdays() {
  const u = S.user;
  const _pg = S.page;
  const allFresh = BIRTHDAYS_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = BIRTHDAYS_PATHS.every(p => Cache.getStale(p) !== null);
  let students = [], leaders = [], conns = [];
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    leaders = Cache.getStale('/leaders') || [];
    conns = Cache.getStale('/connections') || [];
    if (!allFresh) _revalidateBirthdays();
  } else {
    setApp(shell(''));
    try { [students, leaders, conns] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/leaders').catch(() => []),
      API.get('/connections').catch(() => []),
    ]); } catch {}
    if (S.page !== _pg) return;
  }
  const leaderName = {}; for (const l of (leaders || [])) leaderName[l.id] = l.fullName;
  const leadersByStudent = {};
  for (const a of (conns || [])) { (leadersByStudent[a.studentId] = leadersByStudent[a.studentId] || []).push(leaderName[a.leaderId] || 'Unknown'); }

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const cap = new Date(today.getFullYear(), today.getMonth() + 2, today.getDate());

  // Grade/gender dropdown filters — admin/director only (they see the whole
  // ministry list here; grade/quad logins are already scoped server-side).
  const showBdayFilters = ['admin', 'director'].includes(u.role);
  let scopedStudents = students || [];
  if (showBdayFilters) {
    if (_bdayFilter.grade) scopedStudents = scopedStudents.filter(s => s.grade === _bdayFilter.grade);
    if (_bdayFilter.gender) scopedStudents = scopedStudents.filter(s => s.gender === _bdayFilter.gender);
  }

  // Everyone in scope with a birthday between today and +2 months, soonest first.
  const upcoming = [];
  for (const s of scopedStudents) {
    const when = _nextBirthday(s.dateOfBirth, today);
    if (when && when <= cap) upcoming.push({ s, when });
  }
  upcoming.sort((a, b) => a.when - b.when);

  let body = `<div class="ph"><div class="ph-title">Upcoming Birthdays</div><div class="ph-sub">Next 2 months</div></div>`;
  if (showBdayFilters) {
    body += `<div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="fs" style="flex:1" onchange="setBdayFilter('grade', this.value ? Number(this.value) : null)">
        <option value="">All grades</option>
        ${[7,8,9,10,11,12].map(g => `<option value="${g}" ${_bdayFilter.grade === g ? 'selected' : ''}>Grade ${g}</option>`).join('')}
      </select>
      <select class="fs" style="flex:1" onchange="setBdayFilter('gender', this.value || null)">
        <option value="">All genders</option>
        <option value="female" ${_bdayFilter.gender === 'female' ? 'selected' : ''}>Female</option>
        <option value="male" ${_bdayFilter.gender === 'male' ? 'selected' : ''}>Male</option>
      </select>
    </div>`;
  }

  if (!upcoming.length) {
    body += `<div class="empty">${icEmpty('cake')}<div class="empty-title">No birthdays in the next 2 months</div></div>`;
    setApp(shell(body));
    return;
  }

  // Group rows under a month header (window spans at most two/three month names).
  let curKey = '';
  for (const { s, when } of upcoming) {
    const f = _fmtUpcoming(when);
    const key = when.getFullYear() + '-' + when.getMonth();
    if (key !== curKey) { curKey = key; body += `<div class="sh">${f.monthName}</div>`; }
    const birthYear = Number(String(s.dateOfBirth).slice(0, 4));
    const turns = birthYear > 1900 ? when.getFullYear() - birthYear : null;
    body += `<div class="li" style="position:relative;align-items:flex-start">
      <div class="li-body">
        <div style="padding-right:56px">
          <div class="li-title">${esc(s.firstName)} ${esc(s.lastName)}</div>
          ${turns != null ? `<div class="li-sub">Turns ${turns}</div>` : ''}
        </div>
        ${(leadersByStudent[s.id] || []).length
          ? `<div style="font-size:12px;margin-top:4px;color:var(--accent-dark);font-weight:600;display:flex;align-items:center;gap:5px">${icS('users')}<span>${leadersByStudent[s.id].map(esc).join(', ')}</span></div>`
          : `<div style="font-size:12px;margin-top:4px;color:var(--ink-faint)">No leader connected</div>`}
        ${s.mobile ? `<div style="font-size:12px;margin-top:4px;color:var(--ink-mid)" onclick="event.stopPropagation()"><span style="font-weight:600">Mobile:</span> ${phoneLink(s.mobile, s.firstName)}</div>` : ''}
      </div>
      <div style="position:absolute;top:13px;right:13px;text-align:right">
        <div style="font-weight:800;font-size:14px">${f.day} ${f.month}</div>
        <div style="font-size:11px;color:var(--ink-faint)">${f.weekday}</div>
      </div>
    </div>`;
  }
  setApp(shell(body));
}
function fmtBday(iso) {
  if (!iso) return '';
  const p = String(iso).split('T')[0].split('-');
  return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : String(iso);
}

  if (arGenders.length) body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}<button class="fc ${!_arFilter.gender?'on':''}" onclick="setArFilter('gender',null)">All</button></div>`;
  body += `<div id="ar-results">${_arSectionsHtml(scoped, u)}</div>`;
  setApp(shell(body));
  if (_arNameFilter) requestAnimationFrame(() => {
    const el = document.getElementById('ar-name-filter');
    if (el) { el.focus(); const n = el.value.length; try { el.setSelectionRange(n, n); } catch {} }
  });
}

// Sections: Rising / Mixed (one stream up, one down) / Declining / Stopped (neither this term).
const AR_SEC = [
  ['rising', 'Rising', '#065f46', 'arru'],
  ['stable', 'Stable', '#475569', 'check'],
  ['mixed', 'Mixed', '#92400e', 'arrr'],
  ['declining', 'Declining', '#991b1b', 'arrd'],
  ['stopped', 'Stopped', '#991b1b', 'alert'],
];

// Renders the categorised section cards for the given (grade/gender-filtered) student
// list, applying the current name filter on top. Split out from renderAtRisk so a
// keystroke in the name filter can patch just this markup, not the whole page — that
// keeps focus/caret in the input (see studSearch for the same pattern on Student Search).
function _arSectionsHtml(scoped, u) {
  const term = _arNameFilter.trim().toLowerCase();
  let filtered = scoped;
  if (term) {
    filtered = scoped.filter(s => {
      const fn = (s.firstName||'').toLowerCase();
      const ln = (s.lastName||'').toLowerCase();
      return fn.includes(term) || ln.includes(term) || `${fn} ${ln}`.trim().includes(term);
    });
  }

  const sections = { rising:[], mixed:[], declining:[], stopped:[], stable:[] };
  for (const s of filtered) { const cat = attendQual(s).category; if (sections[cat]) sections[cat].push(s); }
  for (const k of Object.keys(sections)) sections[k].sort((a,b)=>(a.firstName||'').localeCompare(b.firstName||''));

  let body = '';
  let any = false;
  for (const [key, label, col, ic] of AR_SEC) {
    const items = sections[key];
    if (!items.length) continue;
    any = true;
    const open = !!term;
    let cards = '';
    for (const s of items) {
      const _arPhone = s.mobile || s.parentPhone;
      cards += `
        <div class="li" style="align-items:flex-start;padding:11px;margin-bottom:4px">
          <div class="li-body">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="li-title">${esc(s.firstName)} ${esc(s.lastName)}</span>
              ${u.role !== 'grade' ? quadChip(s.quad) : ''}
            </div>
            <div class="li-sub" style="margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span>Gr ${s.grade||'—'} · ${s.gender}</span>
              ${_arQualChips(s)}
            </div>
            ${termRow('Youth', s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal, true)}
            ${(s.grpTotal>0||s.prevGrpTotal>0)?termRow('Lifegroup', s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal, true):''}
            ${_arPhone ? `<div style="margin-top:4px;font-size:13px">${!s.mobile && s.parentPhone ? '<span style="font-weight:600">Parent: </span>' : ''}${phoneLink(_arPhone, s.firstName)}</div>` : ''}
          </div>
        </div>`;
    }
    body += `<div class="card" style="margin-bottom:12px;border-left:4px solid ${col}">
      <div onclick="toggleArSection('${key}')" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 16px;user-select:none">
        <span id="ar-chev-${key}" style="display:inline-flex;color:var(--ink-mid)">${icS(open?'chevd':'chevr')}</span>
        <strong style="color:${col};display:inline-flex;align-items:center;gap:4px">${icS(ic)} ${label}</strong>
        <span class="badge" style="margin-left:auto">${items.length}</span>
      </div>
      <div id="ar-body-${key}" style="display:${open?'':'none'};padding:0 12px 12px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px">${cards}</div>
      </div>
    </div>`;
  }
  if (!any) {
    body = term
      ? `<div class="empty">${icEmpty('xmark')}<div class="empty-title">No students match "${esc(_arNameFilter.trim())}"</div><div class="empty-sub">Try a different name, or clear the search</div></div>`
      : `<div class="empty">${icEmpty('check')}<div class="empty-title">Nothing flagged</div><div class="empty-sub">Attendance looks healthy this term</div></div>`;
  }
  return body;
}

function toggleArSection(status) {
  const body = document.getElementById('ar-body-' + status);
  const chev = document.getElementById('ar-chev-' + status);
  if (!body || !chev) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  chev.innerHTML = open ? icS('chevr') : icS('chevd');
}

function setArFilter(key, val) {
  _arFilter[key] = val;
  saveArFilter();
  renderAtRisk();
}

// On keystroke, patch ONLY the results container — the input element stays in the
// DOM so focus/caret position is preserved (same pattern as studSearch).
function setArNameFilter(v) {
  _arNameFilter = v;
  const res = document.getElementById('ar-results');
  if (res) res.innerHTML = _arSectionsHtml(_arScoped, S.user);
}

// STUDENTS
// ============================================================
let _sS = { students:[], leaderNames:new Set(), search:'', gf:new Set(), df:new Set() };

const STUDENTS_PATHS = ['/students', '/leaders'];
let _studentsRevalidating = false;
function _revalidateStudents() {
  if (_studentsRevalidating) return;
  _studentsRevalidating = true;
  Promise.all(STUDENTS_PATHS.map(p => API.get(p).catch(() => null)))
    .then(() => { if (S.page === 'students') return renderStudents(); })
    .catch(() => {})
    .finally(() => { _studentsRevalidating = false; });
}
async function renderStudents() {
  const _pg = S.page;
  // Leaders are fetched alongside students so they can be hidden from the search
  // (a person who both leads and appears in the service export shows up as a
  // student row otherwise). Both paths now gate the spinner (previously only
  // /students did, even though /leaders was fetched too).
  const allFresh = STUDENTS_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = STUDENTS_PATHS.every(p => Cache.getStale(p) !== null);
  let students, leaders;
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    leaders = Cache.getStale('/leaders') || [];
    if (!allFresh) _revalidateStudents();
  } else {
    setApp(shell(''));
    [students, leaders] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/leaders').catch(() => []),
    ]);
    if (S.page !== _pg) return;
  }
  _sS.students = students || [];
  _sS.leaderNames = new Set((leaders || []).map(l => (l.fullName || '').trim().toLowerCase()).filter(Boolean));
  renderStudentView();
}

// The students that pass the leader filter + grade/gender chips + name search.
// Names carrying a leader-role suffix in the attendance export — mirrors the
// importer's LEADER_RE so "(Leader)" AND "(Assistant leader)" are both hidden.
const _ROLE_SUFFIX_RE = /\(\s*(?:assistant\s+)?leaders?\s*\)/i;
function _visStudents() {
  const { students, leaderNames, search, gf, df } = _sS;
  let vis = students.filter(s => {
    const full = `${s.firstName} ${s.lastName}`.trim();
    if (_ROLE_SUFFIX_RE.test(full)) return false;
    return !leaderNames.has(full.toLowerCase());
  });
  if (gf.size) vis = vis.filter(s => gf.has(s.grade));
  if (df.size) vis = vis.filter(s => df.has(s.gender));
  if (search) { const q = search.toLowerCase(); vis = vis.filter(s => `${s.firstName} ${s.lastName}`.toLowerCase().includes(q)); }
  return vis;
}

// Just the results list (mobile cards + desktop table) — re-rendered on every
// keystroke WITHOUT rebuilding the search input, so the cursor never jumps.
function _studentResultsHtml(vis) {
  if (!vis.length) return `<div class="empty">${icEmpty('id')}<div class="empty-title">No students found</div></div>`;
  let h = '<div class="mob">';
  for (const s of vis) {
    const pct = svcPct(s);
    h += `<div class="li" onclick="showStudentDetail('${s.id}')" style="cursor:pointer">
      <div class="li-body">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="li-title">${esc(s.firstName)} ${esc(s.lastName)}</span>
          ${qualChips(s)}
        </div>
        <div class="li-sub">Gr ${s.grade||'—'} · ${s.gender}${fmtBday(s.dateOfBirth) ? ' · ' + fmtBday(s.dateOfBirth) : ''} ${quadChip(s.quad)}</div>
        ${termRow('Youth', s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal)}
        ${(s.grpTotal>0||s.prevGrpTotal>0)?termRow('Lifegroup', s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal):''}
      </div>
      <div class="li-right" style="color:var(--ink-faint)">›</div>
    </div>`;
  }
  h += '</div>';
  h += `<div class="desk"><table class="dt"><thead><tr><th>Name</th><th>Gr</th><th>Gender</th><th>DOB</th><th>Quad</th><th>Youth (this / last)</th><th>Lifegroup (this / last)</th><th>Status</th><th></th></tr></thead><tbody>`;
  for (const s of vis) {
    const pct = svcPct(s);
    const psvc = s.prevSvcTotal > 0 ? Math.round(s.prevSvcAttended / s.prevSvcTotal * 100) + '%' : '—';
    const gp = s.grpTotal > 0 ? Math.round(s.grpAttended / s.grpTotal * 100) + '%' : '—';
    const pgp = s.prevGrpTotal > 0 ? Math.round(s.prevGrpAttended / s.prevGrpTotal * 100) + '%' : '—';
    h += `<tr>
      <td><strong>${esc(s.firstName)} ${esc(s.lastName)}</strong></td>
      <td>${s.grade||'—'}</td><td>${s.gender}</td>
      <td>${fmtBday(s.dateOfBirth) || '—'}</td>
      <td>${quadChip(s.quad)}</td>
      <td>${pct!==null?pct+'%':'—'} <span style="color:var(--ink-faint)">/ ${psvc}</span></td>
      <td>${gp} <span style="color:var(--ink-faint)">/ ${pgp}</span></td>
      <td>${qualChips(s) || '<span style="color:var(--ink-faint)">—</span>'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="showStudentDetail('${s.id}')">View →</button></td>
    </tr>`;
  }
  h += '</tbody></table></div>';
  return h;
}

function renderStudentView() {
  const { search, gf, df } = _sS;
  const totalSearchable = _sS.students.filter(s => !_sS.leaderNames.has(`${s.firstName} ${s.lastName}`.trim().toLowerCase())).length;
  const vis = _visStudents();

  const u = S.user;
  const ssGrades = u.role==='grade' ? [] : u.role==='quad'
    ? (u.quad==='g79'||u.quad==='b79'?[7,8,9]:[10,11,12])
    : [7,8,9,10,11,12];
  const ssGenders = ['director','admin'].includes(u.role) ? ['male','female'] : [];
  const gChips = ssGrades.map(g => `<button class="fc ${gf.has(g)?'on':''}" onclick="toggleSF('g',${g})">${g}</button>`).join('');
  const dChips = ssGenders.map(g => `<button class="fc ${df.has(g)?'on':''}" onclick="toggleSF('d','${g}')">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`).join('');

  let body = `
    <div class="ph"><div class="ph-title">Student Search</div><div class="ph-sub"><span id="stu-count">${vis.length} of ${totalSearchable}</span></div></div>
    <div class="sbar"><input id="stu-search" type="text" placeholder="Search by name…" value="${search.replace(/"/g,'&quot;')}" oninput="studSearch(this.value)"></div>`;
  if (ssGrades.length) body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Grade:</span>${gChips}</div>`;
  if (ssGenders.length) body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}</div>`;
  body += `<div id="stu-results">${_studentResultsHtml(vis)}</div>`;

  setApp(shell(body));
  if (search) requestAnimationFrame(() => {
    const el = document.getElementById('stu-search');
    if (el) { el.focus(); const n = el.value.length; try { el.setSelectionRange(n, n); } catch {} }
  });
}

function toggleSF(type, val) {
  if (type==='g') { if (_sS.gf.has(val)) _sS.gf.delete(val); else _sS.gf.add(val); }
  else { if (_sS.df.has(val)) _sS.df.delete(val); else _sS.df.add(val); }
  renderStudentView();
}

// On keystroke, update ONLY the results list + count — the input element stays
// in the DOM so the caret position is preserved.
function studSearch(v) {
  _sS.search = v;
  const vis = _visStudents();
  const res = document.getElementById('stu-results');
  if (res) res.innerHTML = _studentResultsHtml(vis);
  const cnt = document.getElementById('stu-count');
  if (cnt) {
    const total = _sS.students.filter(s => !_sS.leaderNames.has(`${s.firstName} ${s.lastName}`.trim().toLowerCase())).length;
    cnt.textContent = `${vis.length} of ${total}`;
  }
}

// Student-detail leader assignment (aligned to demo showSD/assignSD/unassignSD)
let _sdStudent = null, _sdLeaders = [], _sdAssigned = new Set();
function sdEligibleLeaders() {
  const s = _sdStudent; if (!s) return [];
  return _sdLeaders.filter(l => !_sdAssigned.has(l.id)
    && (!l.gender || l.gender === s.gender)
    && (!l.grades || l.grades.length === 0 || l.grades.includes(s.grade)));
}
function sdLeaderSearch(sid) {
  const q = ((document.getElementById('sd-lq') || {}).value || '').toLowerCase().trim();
  let list = sdEligibleLeaders();
  if (q) list = list.filter(l => l.fullName.toLowerCase().includes(q));
  list = list.slice(0, 12);
  const el = document.getElementById('sd-llist'); if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:14px;color:var(--ink-faint);font-size:13px">${q ? 'No matching leaders' : 'No eligible leaders for this student'}</div>`;
    return;
  }
  el.innerHTML = list.map(l => `<button onclick="assignSD('${sid}','${l.id}')" style="display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--paper);border:1px solid var(--paper-dark);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer">
    <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(l.fullName)}</div><div style="font-size:11px;color:var(--ink-mid)">${l.gender || 'any gender'} · Yr ${(l.grades || []).join(', ') || 'All'}</div></div>
    <span style="color:var(--accent);font-size:20px;font-weight:700">+</span></button>`).join('');
}
async function assignSD(sid, lid) {
  try { await API.post('/connections', { studentId: sid, leaderId: lid }); }
  catch (e) { toast(e.message || 'Could not assign'); return; }
  Cache.del('/connections', '/overview', '/at-risk');
  toast('Connected'); render(); showStudentDetail(sid);
}
async function unassignSD(sid, lid) {
  try { await API.del(`/connections/${sid}/${lid}`); }
  catch (e) { toast(e.message || 'Could not remove'); return; }
  Cache.del('/connections', '/overview', '/at-risk');
  toast('Disconnected'); render(); showStudentDetail(sid);
}

async function showStudentDetail(id) {

  modal(`

      ${quadChip(s.quad)} ${qualChips(s)}

    </div>

    <div class="sh">Attendance</div>

        <div class="stat-v" style="font-size:22px;color:${pct!==null&&pct<50?'var(--danger)':pct!==null&&pct<70?'var(--warn)':'var(--accent)'}">${pct!==null?pct+'%':'—'}</div>
        <div class="stat-l">Service · this term</div>
        ${pct!==null?pBar(pct):''}
        <div style="font-size:11px;color:var(--ink-faint);margin-top:3px">${s.svcAttended}/${s.svcTotal} sessions</div>
        ${s.prevSvcTotal>0?`<div style="font-size:11px;color:var(--ink-faint);margin-top:2px">Last term: ${s.prevSvcAttended}/${s.prevSvcTotal} (${Math.round(s.prevSvcAttended/s.prevSvcTotal*100)}%)</div>`:''}
      </div>
      <div class="stat">
        <div class="stat-v" style="font-size:22px">${grpPct!==null?grpPct+'%':'—'}</div>
        <div class="stat-l">Lifegroup · this term</div>
        ${grpPct!==null?pBar(grpPct):''}
        <div style="font-size:11px;color:var(--ink-faint);margin-top:3px">${s.grpAttended}/${s.grpTotal} weeks</div>
        ${s.prevGrpTotal>0?`<div style="font-size:11px;color:var(--ink-faint);margin-top:2px">Last term: ${s.prevGrpAttended}/${s.prevGrpTotal} (${Math.round(s.prevGrpAttended/s.prevGrpTotal*100)}%)</div>`:''}
      </div>

    <div class="sh">Leader Assignments</div>

    <div id="sd-llist" style="margin-bottom:14px"></div>` : ''}

      ${s.parentPhone?`<div style="font-size:14px"><span style="color:var(--ink-mid);font-weight:600">Parent:</span> ${phoneLink(s.parentPhone, s.firstName)}</div>`:''}
    </div>`:''}

    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary btn-sm" onclick="closeModal();go('leaders')">Connect →</button>

// ============================================================
function colChart(sessions, maxH) {
  const max = Math.max(1, ...sessions.map(s => s.pct));
  return '<div class="cchart">' + sessions.map(s => {
    const h = s.pct ? Math.round(s.pct / max * (maxH || 56)) + 4 : 4;
    const cls = s.pct >= 70 ? '' : s.pct < 40 ? 'cr' : 'lo';
    const val = (s.att != null) ? s.att : '';
    return `<div class="ccol"><div class="ccol-val">${val}</div><div class="ccol-bar ${cls}" style="height:${h}px"></div><div class="ccol-lbl">${fmtDM(s.date||'')}</div></div>`;
  }).join('') + '</div>';
}
function hbarTr(label, pct, disp) {
  const shown = disp !== undefined ? disp : pct + '%';
  return `<div class="tbar-row"><div class="tbar-lbl">${label}</div><div class="tbar-track"><div class="tbar-fill ${pct<40?'crit':pct<70?'low':''}" style="width:${pct}%"></div></div><div class="tbar-val">${shown}</div></div>`;
}
function trendBadge(dir) {
  if (dir === 'up') return `<span class="tr-up" style="display:inline-flex;align-items:center;gap:2px">${icS('arru')} Improving</span>`;
  if (dir === 'down') return `<span class="tr-dn" style="display:inline-flex;align-items:center;gap:2px">${icS('arrd')} Declining</span>`;
  return `<span class="tr-st" style="display:inline-flex;align-items:center;gap:2px">${icS('arrr')} Stable</span>`;
}
function trendDir(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  if (v.length < 4) return 'stable';
  const h1 = v.slice(0, Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/Math.floor(v.length/2);
  const h2 = v.slice(Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/(v.length-Math.floor(v.length/2));
  if (h2-h1 > 4) return 'up'; if (h1-h2 > 4) return 'down'; return 'stable';
}
function avgAtt(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  return v.length ? Math.round(v.reduce((s,x)=>s+x.att,0)/v.length) : 0;
}
function statCard(nums, labels, prevs) {
  const cols = nums.length;
  const fz = cols >= 3 ? '1.2rem' : '1.5rem';
  return `<div class="tstat" style="grid-template-columns:repeat(${cols},1fr)">` +
    nums.map((n,i) => `<div class="tstat-cell"><div class="tstat-v" style="font-size:${fz}">${n}</div><div class="tstat-l">${labels[i]}</div>${prevs&&prevs[i]?`<div class="tstat-p">${prevs[i]}</div>`:''}</div>`).join('') +
    '</div>';
}

// Breadth bar: how many enrolled attended at least once (demo: grpBar)
function grpBar(uniq, enrolled) {
  const p = enrolled ? Math.round(uniq / enrolled * 100) : 0;
  return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-mid);margin-bottom:3px"><span>${uniq} of ${enrolled} enrolled attended at least once</span><span>${p}%</span></div><div class="pb"><div class="pb-f ${p>=75?'fill-g':p>=50?'fill-a':'fill-r'}" style="width:${p}%"></div></div></div>`;
}
// Compact trend arrow for at-risk prev-term comparison
function trendArrow(dir) {
  if (dir === 'up') return `<span style="color:var(--success);display:inline-flex">${icS('arru')}</span>`;
  if (dir === 'down') return `<span style="color:var(--danger);display:inline-flex">${icS('arrd')}</span>`;
  return '';
}

// Service attendance aggregate for a student subset. `prev=true` reads the
// previous-term fields. weekly = total attendances ÷ valid weeks in the term
// (== the server's per-session average), uniq = distinct attenders.
function _svcAgg(list, prev) {
  const att = list.reduce((a, s) => a + (prev ? s.prevSvcAttended : s.svcAttended), 0);
  const tot = list.reduce((m, s) => Math.max(m, (prev ? s.prevSvcTotal : s.svcTotal)), 0);
  const uniq = list.filter(s => (prev ? s.prevSvcAttended : s.svcAttended) > 0).length;
  return { uniq, avg: tot > 0 ? Math.round(att / tot) : 0, weeks: tot };
}
function _svcPrevSub(p) { return p.weeks > 0 ? ['prev: ' + p.uniq, 'prev: ' + p.avg] : null; }

// ── Lifegroup-stats render helpers (used by Trends Lifegroups tab + Home) ──
// `showPrev` toggles the muted previous-term line (Trends shows it; Home doesn't).
function _lgAggBits(a) {
  if (!a) return '<span style="color:var(--ink-faint)">no data</span>';
  return `<b style="color:var(--ink)">${a.uniqueAttenders}</b> seen · <b style="color:var(--ink)">${a.avgPerWeek}</b> weekly · <b style="color:var(--ink)">${a.weeksRan}</b> wk${a.weeksRan===1?'':'s'}`;
}
function _lgPrevBits(a) {
  if (!a || a.weeksRan === 0) return '';
  return `<div style="font-size:11px;color:var(--ink-faint);margin-top:1px">prev term: ${a.uniqueAttenders} seen · ${a.avgPerWeek} weekly · ${a.weeksRan} wk${a.weeksRan===1?'':'s'}</div>`;
}
// One lifegroup detail row (per-grade dropdown content).
function _lgGroupRow(lg, showPrev) {
  return `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px 20px">
    <div style="font-size:13px;font-weight:600;margin-bottom:2px">${esc(lg.name)}</div>
    <div style="font-size:12px;color:var(--ink-mid)">${_lgAggBits(lg.current)}</div>
    ${showPrev ? _lgPrevBits(lg.previous) : ''}
  </div>`;
}
// A grade block as a pre-rendered collapsible (.drop). `id` must be unique on the
// page; the lifegroups are rendered hidden and toggled in-DOM (no re-render).
function _lgGradeBlock(g, showPrev, gsfx, id) {
  gsfx = gsfx || '';
  let h = `<div class="drop" id="${id}">
    <div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 0;border-top:1px solid var(--paper-dark)" onclick="_drop('${id}')">
      <span class="drop-chev" style="font-size:12px">›</span>
      <div style="flex:1;font-size:13px;font-weight:700">Year ${g.grade}${gsfx}</div>
      <span style="font-size:12px;color:var(--ink-mid)">${g.current.uniqueAttenders} seen · ${g.current.avgPerWeek} weekly</span>
    </div>`;
  if (showPrev && (g.previous.uniqueAttenders > 0 || g.previous.members > 0)) h += `<div style="font-size:11px;color:var(--ink-faint);padding:0 0 4px 20px">prev term: ${g.previous.uniqueAttenders} seen · ${g.previous.avgPerWeek} weekly</div>`;
  h += `<div class="drop-body">`;
  if (g.lifegroups && g.lifegroups.length) for (const lg of g.lifegroups) h += _lgGroupRow(lg, showPrev);
  else h += `<div style="font-size:12px;color:var(--ink-faint);padding:4px 0 6px 20px">No lifegroups ran this term</div>`;
  h += `</div></div>`;
  return h;
}
// Same content as _lgGradeBlock but WITHOUT its own collapsible wrapper — for
// nesting a grade's lifegroups directly inside an already-collapsible parent
// (e.g. Trends' per-quad drop) so opening the parent goes straight to the
// lifegroups instead of requiring a second click on a nested grade drop.
function _lgGradeInline(g, showPrev, gsfx) {
  gsfx = gsfx || '';
  let h = `<div style="padding:7px 0;border-top:1px solid var(--paper-dark)">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;font-size:13px;font-weight:700">Year ${g.grade}${gsfx}</div>
      <span style="font-size:12px;color:var(--ink-mid)">${g.current.uniqueAttenders} seen · ${g.current.avgPerWeek} weekly</span>
    </div>`;
  if (showPrev && (g.previous.uniqueAttenders > 0 || g.previous.members > 0)) h += `<div style="font-size:11px;color:var(--ink-faint);padding:0 0 4px 0">prev term: ${g.previous.uniqueAttenders} seen · ${g.previous.avgPerWeek} weekly</div>`;
  if (g.lifegroups && g.lifegroups.length) for (const lg of g.lifegroups) h += _lgGroupRow(lg, showPrev);
  else h += `<div style="font-size:12px;color:var(--ink-faint);padding:4px 0 6px 0">No lifegroups ran this term</div>`;
  h += `</div>`;
  return h;
}

const TREND_PATHS = ['/students', '/overview', '/trends', '/lifegroups/stats'];
let _trendsRevalidating = false;
function _revalidateTrends() {
  if (_trendsRevalidating) return;
  _trendsRevalidating = true;
  Promise.all(TREND_PATHS.map(p => API.get(p).catch(() => null)))
    .then(() => { if (S.page === 'trends') return renderTrends(); })
    .catch(() => {})
    .finally(() => { _trendsRevalidating = false; });
}
async function renderTrends() {
  const u = S.user;
  const _pg = S.page;
  // Stale-while-revalidate (same approach as Home): if every endpoint has a
  // last-known value, paint instantly from cache and refresh behind the page —
  // this kills the multi-second freeze when a cold serverless start makes the
  // heavy /trends + /lifegroups/stats fetches slow. Only spinner on a true cold load.
  const allFresh = TREND_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = TREND_PATHS.every(p => Cache.getStale(p) !== null);
  let students, overview, trends, lgStats;
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    overview = Cache.getStale('/overview');
    trends   = Cache.getStale('/trends');
    lgStats  = Cache.getStale('/lifegroups/stats');
    if (!allFresh) _revalidateTrends();
  } else {
    if (!_allCached('/students')) setApp(shell(''));
    [students, overview, trends, lgStats] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/overview').catch(() => null),
      API.get('/trends').catch(() => null),
      API.get('/lifegroups/stats').catch(() => null),
    ]);
    if (S.page !== _pg) return; // navigated away while awaiting — don't overwrite the new page
    // Cold-load self-heal: retry any endpoint that failed (e.g. a timed-out
    // /lifegroups/stats) so Trends doesn't sit on degraded numbers.
    if (TREND_PATHS.some(p => Cache.get(p) === null)) _revalidateTrends();
  }

  const canExport = ['quad','director','admin'].includes(u.role);
  const QUAD_LABELS_LOCAL = { g79:'Girls Yr 7–9', b79:'Boys Yr 7–9', g1012:'Girls Yr 10–12', b1012:'Boys Yr 10–12' };

  // Compute per-grade stats from students
  function gradeStats(sc) {
    return [7,8,9,10,11,12].map(gr => {
      const gs = sc.filter(s => s.grade === gr);
      const tot = gs.reduce((s,x)=>s+x.svcTotal,0);
      const att = gs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPctGr = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = gs.filter(s=>s.svcAttended>0).length;
      return { grade:gr, count:gs.length, svcPct:svcPctGr, uniq, att, tot };
    });
  }
  function quadStats(sc) {
    return ['g79','b79','g1012','b1012'].map(q => {
      const qs = sc.filter(s => s.quad === q);
      const tot = qs.reduce((s,x)=>s+x.svcTotal,0);
      const att = qs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPct = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = qs.filter(s=>s.svcAttended>0).length;
      return { quad:q, label:QUAD_LABELS_LOCAL[q], count:qs.length, svcPct, uniq, att, tot };
    });
  }

  const byGrade = gradeStats(students);
  const byQuad = quadStats(students);
  const totalUniq = students.filter(s=>s.svcAttended>0).length;
  const totalTot = students.reduce((s,x)=>s+x.svcTotal,0);
  const totalAtt = students.reduce((s,x)=>s+x.svcAttended,0);
  const totalAvgPct = totalTot > 0 ? Math.round(totalAtt/totalTot*100) : 0;
  const totalAvgSess = students.length ? Math.round(totalAtt/students.length) : 0;

  const QUAD_COLORS = { g79:'#ec4899', b79:'#3b82f6', g1012:'#8b5cf6', b1012:'#10b981' };

  let body = `<div class="ph"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div><div class="ph-title">Attendance Trends</div><div class="ph-sub">Youth &amp; lifegroup overview</div></div>
    ${canExport?'<button class="btn btn-secondary btn-sm" onclick="exportTrendsCSV()">Export CSV</button>':''}
  </div></div>`;

  // Tab bar
  body += `<div class="tbbar">
    <button class="tbbtn ${_trTab==='svc'?'on':''}" onclick="_trTab='svc';renderTrends()">Fridays</button>
    <button class="tbbtn ${_trTab==='grp'?'on':''}" onclick="_trTab='grp';renderTrends()">Lifegroups</button>
  </div>`;

  // Term label for the "this term" sub-heading (uses the trends term range).
  const _curTerm = trends && trends.terms && trends.terms.current;
  const _termNote = _curTerm ? `${fmtDM(_curTerm.startDate)} – ${fmtDM(_curTerm.endDate)}` : 'this term';

  if (_trTab === 'svc') {
    // Ministry-wide overview — director/admin only. Grade logins go straight to
    // their own grade's numbers below (the ministry-wide block was redundant
    // context for a single-grade login and just added scroll); quad logins get
    // their own scoped quad+by-grade section further down (matching how the
    // Lifegroups tab already scopes quad server-side), so this whole-ministry
    // block would otherwise leak ministry-wide data to a quad account.
    if (['director', 'admin'].includes(u.role)) {
      const mn = (trends && trends.ministry) || {};
      body += `<div class="sh">Ministry Overview</div><div class="card">`;
      body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:8px">Whole-ministry service attendance · this term (${_termNote})</div>`;
      body += statCard([mn.uniqueAttenders || 0, Math.round(mn.averageAttendance || 0)], ['Seen', 'Weekly'],
        (mn.prevSeenAttenders || mn.prevAverageAttendance) ? ['prev: ' + (mn.prevSeenAttenders||0), 'prev: ' + (mn.prevAverageAttendance||0)] : null);
      body += '</div>';

      // Weekly attendance chart — one bar per valid CURRENT-TERM service (whole ministry)
      if (trends && trends.ministry && Array.isArray(trends.ministry.sessions)) {
        const valid = trends.ministry.sessions.filter(s => !s.isOutlier);
        if (valid.length) {
          const peak = Math.max(1, ...valid.map(s => s.totalAttended));
          const chartSess = valid.map(s => ({ date: s.sessionDate, pct: Math.round(s.totalAttended / peak * 100), att: s.totalAttended, tot: s.totalPresent }));
          body += `<div class="sh">Weekly Attendance ${trendBadge(trends.ministry.recentTrend)}</div><div class="card">`;
          body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:10px">${valid.length} valid services · avg ${trends.ministry.averageAttendance} · peak ${trends.ministry.peakAttendance} · trend across this term</div>`;
          body += colChart(chartSess, 56);
          body += '</div>';
        } else {
          body += `<div class="sh">Weekly Attendance</div><div class="card"><div style="font-size:13px;color:var(--ink-faint)">No valid services in the current term yet.</div></div>`;
        }
      }
    }

    if (u.role === 'grade') {
      const gl = students.filter(s => s.grade === u.grade);
      const c = _svcAgg(gl, false), p = _svcAgg(gl, true);
      body += `<div class="sh">Grade ${u.grade}${_gsfx(_loginGender(u))}</div><div class="card">`;
      body += statCard([c.uniq, c.avg], ['Seen','Weekly'], _svcPrevSub(p));
      body += '</div>';
      // Weekly attendance bar graph for this grade (already gender-scoped server-side).
      const gtr = (trends && trends.byGrade || []).find(x => x.grade === u.grade);
      const gvalid = gtr && Array.isArray(gtr.sessions) ? gtr.sessions.filter(s => !s.isOutlier) : [];
      if (gvalid.length) {
        const peak = Math.max(1, ...gvalid.map(s => s.totalAttended));
        const cs = gvalid.map(s => ({ date: s.sessionDate, pct: Math.round(s.totalAttended / peak * 100), att: s.totalAttended, tot: s.totalPresent }));
        body += `<div class="sh">Weekly Attendance</div><div class="card">`;
        body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:10px">${gvalid.length} valid services this term</div>`;
        body += colChart(cs, 56);
        body += '</div>';
      }
    } else if (u.role === 'quad') {
      const ql = students.filter(s => s.quad === u.quad);
      const c = _svcAgg(ql, false), p = _svcAgg(ql, true);
      body += `<div class="sh">${QUAD_LABELS_LOCAL[u.quad]||u.quad}</div><div class="card">`;
      body += statCard([c.uniq, c.avg], ['Seen','Weekly'], _svcPrevSub(p));
      body += '<div class="sh" style="margin-top:10px">By Grade</div>';
      const grades = u.quad==='g79'||u.quad==='b79' ? [7,8,9] : [10,11,12];
      for (const gr of grades) {
        const gl2 = students.filter(s => s.grade === gr);
        if (!gl2.length) continue;
        const gc = _svcAgg(gl2, false), gp = _svcAgg(gl2, true);
        body += `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px 20px">
          <div style="font-size:13px;font-weight:600">Year ${gr}${_gsfx(_loginGender(u))}</div>
          <div style="font-size:12px;color:var(--ink-mid)"><b style="color:var(--ink)">${gc.uniq}</b> seen · <b style="color:var(--ink)">${gc.avg}</b> weekly</div>
          ${gp.weeks>0?`<div style="font-size:11px;color:var(--ink-faint)">prev term: ${gp.uniq} seen · ${gp.avg} weekly</div>`:''}
        </div>`;
      }
      body += '</div>';
    } else {
      // Director / admin: collapsible quad cards (current + previous term)
      body += `<div class="sh">By Quad</div>`;
      for (const q of byQuad) {
        if (!q.count) continue;
        const ql = students.filter(s => s.quad === q.quad);
        const c = _svcAgg(ql, false), p = _svcAgg(ql, true);
        const qid = 'tfq-' + q.quad;
        body += `<div class="card drop" id="${qid}" style="margin-bottom:8px;border-left:4px solid ${QUAD_COLORS[q.quad]}">`;
        body += `<div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('${qid}')">
          <span class="drop-chev" style="font-size:12px">›</span>
          <div style="flex:1;font-weight:700;font-size:14px">${q.label}</div>
          <span style="font-size:12px;font-weight:700;color:var(--ink-mid)">${c.uniq} seen · ${c.avg} weekly</span>
        </div>`;
        if (p.weeks>0) body += `<div style="font-size:11px;color:var(--ink-faint);padding-left:20px;margin-top:2px">prev term: ${p.uniq} seen · ${p.avg} weekly</div>`;
        body += `<div class="drop-body">`;
        {
          const grades = q.quad==='g79'||q.quad==='b79' ? [7,8,9] : [10,11,12];
          for (const gr of grades) {
            const gl2 = students.filter(s => s.grade === gr && s.quad === q.quad);
            if (!gl2.length) continue;
            const gc = _svcAgg(gl2, false), gp = _svcAgg(gl2, true);
            body += `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px">
                <div style="font-size:13px;font-weight:600;padding-left:20px;margin-bottom:2px">Year ${gr}${_gsfx(quadGender(q.quad))}</div>
                <div style="padding-left:20px;font-size:12px;color:var(--ink-mid)"><b style="color:var(--ink)">${gc.uniq}</b> seen · <b style="color:var(--ink)">${gc.avg}</b> weekly${gp.weeks>0?` <span style="color:var(--ink-faint)">(prev ${gp.uniq} · ${gp.avg})</span>`:''}</div>
              </div>`;
          }
        }
        body += '</div></div>';
      }
    }

  } else {
    // ── Lifegroups tab — quad → grade → lifegroup, current + previous term. ──
    // All numbers come from /lifegroups/stats: average = individuals attending a
    // lifegroup each week the scope ran (not a percentage).
    if (!lgStats) {
      body += `<div class="card"><div style="color:var(--ink-faint);font-size:13px">Lifegroup stats unavailable.</div></div>`;
    } else {
      const oc = lgStats.overall.current, op = lgStats.overall.previous;
      if (u.role === 'grade') {
        // Grade-only: mirror the Fridays tab's own layout — "Grade X Boys" stat
        // card, then Weekly Attendance in its own separate box. No weeks-ran note
        // here — that's already shown per-group in the breakout below.
        body += `<div class="sh">Grade ${u.grade}${_gsfx(_loginGender(u))}</div><div class="card">`;
        body += statCard([oc.uniqueAttenders, oc.avgPerWeek], ['Seen','Weekly'],
          op.weeksRan>0 ? ['prev: '+op.uniqueAttenders, 'prev: '+op.avgPerWeek] : null);
        body += '</div>';
        const gwk = (lgStats.overall.weekly || []).filter(w => w.attended != null);
        if (gwk.length) {
          const gpeakW = Math.max(1, ...gwk.map(w => w.attended));
          const gwkSess = gwk.map(w => ({ date: w.weekStart, pct: Math.round(w.attended / gpeakW * 100), att: w.attended, tot: w.attended }));
          body += `<div class="sh">Weekly Attendance</div><div class="card">`;
          body += colChart(gwkSess, 56);
          body += '</div>';
        }
      } else {
        body += `<div class="sh">Overview</div><div class="card">`;
        body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:8px">Individuals attending a lifegroup · this term</div>`;
        body += statCard([oc.uniqueAttenders, oc.avgPerWeek], ['Seen','Weekly'],
          op.weeksRan>0 ? ['prev: '+op.uniqueAttenders, 'prev: '+op.avgPerWeek] : null);
        body += `<div style="font-size:11px;color:var(--ink-faint);margin-top:6px">${oc.weeksRan} week${oc.weeksRan===1?'':'s'} ran this term${op.weeksRan>0?' · '+op.weeksRan+' previous':''}</div>`;
        // Weekly lifegroup attendance chart (current term) — bar = individuals that week
        const wk = (lgStats.overall.weekly || []).filter(w => w.attended != null);
        if (wk.length) {
          const peakW = Math.max(1, ...wk.map(w => w.attended));
          const wkSess = wk.map(w => ({ date: w.weekStart, pct: Math.round(w.attended / peakW * 100), att: w.attended, tot: w.attended }));
          body += `<div style="font-size:12px;color:var(--ink-mid);margin:12px 0 4px">Weekly attendance</div>`;
          body += colChart(wkSess, 56);
        }
        body += '</div>';
      }

      if (u.role === 'grade') {
        const g = (lgStats.byGrade || [])[0];
        body += `<div class="sh">Grade ${u.grade}${_gsfx(_loginGender(u))} Lifegroups</div><div class="card">`;
        if (g && g.lifegroups.length) for (const lg of g.lifegroups) body += _lgGroupRow(lg, true);
        else body += `<div style="color:var(--ink-faint);font-size:13px">No lifegroups ran this term</div>`;
        body += '</div>';
      } else if (u.role === 'quad') {
        body += `<div class="sh">By Grade</div><div class="card">`;
        const grades = (lgStats.byGrade || []);
        if (grades.length) for (const g of grades) body += _lgGradeBlock(g, true, _gsfx(_loginGender(u)), 'tlg-' + g.grade);
        else body += `<div style="color:var(--ink-faint);font-size:13px">No lifegroup data yet</div>`;
        body += '</div>';
      } else {
        body += `<div class="sh">By Quad</div>`;
        const quads = (lgStats.byQuad || []);
        for (const q of quads) {
          const qid = 'tlq-' + q.quad;
          body += `<div class="card drop" id="${qid}" style="margin-bottom:8px;border-left:4px solid ${QUAD_COLORS[q.quad]}">`;
          body += `<div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('${qid}')">
            <span class="drop-chev" style="font-size:12px">›</span>
            <div style="flex:1;font-weight:700;font-size:14px">${q.label}</div>
            <span style="font-size:12px;font-weight:700;color:var(--ink-mid)">${q.current.uniqueAttenders} seen · ${q.current.avgPerWeek} weekly</span>
          </div>`;
          if (q.previous.uniqueAttenders>0 || q.previous.members>0) body += `<div style="font-size:11px;color:var(--ink-faint);padding-left:20px;margin-top:2px">prev term: ${q.previous.uniqueAttenders} seen · ${q.previous.avgPerWeek} weekly</div>`;
          body += `<div class="drop-body">`;
          // Use the quad's own GENDERED per-grade breakdown (not the combined byGrade).
          // _lgGradeInline (not _lgGradeBlock) — opening the quad goes straight to each
          // grade's lifegroups, no separate per-grade drop to click through first.
          const gradeStats = q.grades || [];
          if (gradeStats.length) for (const g of gradeStats) body += _lgGradeInline(g, true, _gsfx(quadGender(q.quad)));
          else body += `<div style="font-size:12px;color:var(--ink-faint);padding:6px 0 4px 20px">No lifegroups ran this term</div>`;
          body += '</div></div>';
        }
        if (!quads.length) body += `<div class="card"><div style="color:var(--ink-faint);font-size:13px">No lifegroup data yet</div></div>`;
      }
    }
  }

  setApp(shell(body));
}

async function exportTrendsCSV() {
  try {
    const students = await API.get('/students');
    const rows = [['Grade','Students','Seen Svc','Avg Svc Sess','Grp Enrolled','Seen Grp','Avg Grp Sess']];
    for (const gr of [7,8,9,10,11,12]) {
      const gs = students.filter(s=>s.grade===gr);
      if (!gs.length) continue;
      const u=gs.filter(s=>s.svcAttended>0).length;
      const avgSvc=gs.length?Math.round(gs.reduce((s,x)=>s+x.svcAttended,0)/gs.length):0;
      const grpS=gs.filter(s=>s.grpTotal>0);
      const uG=grpS.filter(s=>s.grpAttended>0).length;
      const avgGrp=grpS.length?Math.round(grpS.reduce((s,x)=>s+x.grpAttended,0)/grpS.length):0;
      rows.push([gr,gs.length,u,avgSvc,grpS.length,uG,avgGrp]);
    }
    const csv = rows.map(r=>r.join(',')).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='trends.csv'; a.click();
    URL.revokeObjectURL(url); toast('Exported');
  } catch(e) { toast('Export failed: '+e.message); }
}

// ── XLSX READER (lazy SheetJS) ────────────────────────────────
// Reads the first sheet of an .xlsx/.xls ArrayBuffer into a 2D array of strings, with date
// cells emitted as ISO yyyy-mm-dd so the existing CSV parsers work unchanged. Backed by the
// vendored SheetJS build (public/vendor/xlsx.full.min.js), lazy-loaded on first use so it never
// weighs on normal navigation. Replaced the hand-rolled DecompressionStream reader for
// robustness on arbitrary Excel exports (legacy .xls, 1904 date system, sheet order, format
// variants) — this is a medical/compliance roster where a silent misparse is the worst outcome.
let _xlsxLoading=null;
function _ensureXlsx(){
  if(window.XLSX)return Promise.resolve();
  if(_xlsxLoading)return _xlsxLoading;
  _xlsxLoading=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="vendor/xlsx.full.min.js";
    s.onload=()=>window.XLSX?resolve():reject(new Error("Excel reader failed to initialise"));
    s.onerror=()=>{_xlsxLoading=null;reject(new Error("Could not load the Excel reader — export the sheet as CSV and re-upload."));};
    document.head.appendChild(s);
  });
  return _xlsxLoading;
}
async function readXlsx(buf){
  await _ensureXlsx();
  const wb=XLSX.read(new Uint8Array(buf),{type:"array",cellDates:true});
  const first=wb.SheetNames&&wb.SheetNames[0];
  const ws=first&&wb.Sheets[first];
  if(!ws)throw new Error("The workbook has no readable sheet — export as CSV and re-upload.");
  const p2=n=>String(n).padStart(2,"0");
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
  return aoa.map(r=>(r||[]).map(c=>c instanceof Date?(c.getFullYear()+"-"+p2(c.getMonth()+1)+"-"+p2(c.getDate())):(c==null?"":String(c))));
}
function rowsToCsv(rows){return rows.map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');}

// Generic CSV -> array of objects keyed by lowercased header. Unlike parseCSV
// (which is tailored to the attendance import and drops unknown columns), this
// preserves every column — needed so the "Leader" column survives for the
// allocation import. Server does the agnostic header detection.
function parseAllocationCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g, '').toLowerCase().trim());
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g, ''));
    const obj = {};
    headers.forEach((h, i) => { if (h) obj[h] = (vals[i] || '').trim(); });
    return obj;
  }).filter(o => Object.values(o).some(v => v));
}

// Parse a "Group Individual Attendance" CSV export (Elvanto/UCare).
// Returns { groups: [...] } or null if the file is not recognised as a group CSV.
function parseGroupCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const rawHeaders = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,''));
  // Find date columns: DD/MM/YYYY format
  const dateCols = [];
  for (let i = 0; i < rawHeaders.length; i++) {
    const m = rawHeaders[i].match(/^(\d{1,2})\/(\d{2})\/(\d{4})$/);
    if (m) dateCols.push({ index: i, iso: `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` });
  }
  if (!dateCols.length) return null;
  const meetings = dateCols.map(d => d.iso);
  const groups = [];
  let curGroup = null;
  for (const line of lines.slice(1)) {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g,''));
    if (!vals[0] || !vals[0].trim()) continue;
    // Group header: all date columns are empty
    const isHeader = dateCols.every(d => !vals[d.index] || vals[d.index].trim() === '');
    if (isHeader) {
      curGroup = { name: vals[0].trim(), meetings, members: [] };
      groups.push(curGroup);
      continue;
    }
    if (!curGroup) continue;
    // Parse "Lastname, Firstname"
    const nameStr = vals[0].trim();
    const ci = nameStr.indexOf(',');
    let first_name, last_name;
    if (ci >= 0) { last_name = nameStr.slice(0, ci).trim(); first_name = nameStr.slice(ci + 1).trim(); }
    else { const parts = nameStr.split(' '); first_name = parts.slice(0, -1).join(' '); last_name = parts[parts.length - 1] || ''; }
    if (!first_name || !last_name) continue;
    // attendance: null = not a member ('-'), true = Y, false = N
    const attendance = dateCols.map(d => {
      const v = (vals[d.index] || '').trim();
      if (!v || v === '-') return null;
      return ['y','yes','true','1'].includes(v.toLowerCase());
    });
    if (attendance.some(a => a !== null)) curGroup.members.push({ first_name, last_name, attendance });
  }
  return groups.length ? { groups } : null;
}

function splitCSVLine(line) {
  const vals=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const c=line[i];
    if (inQ) { if (c==='"'&&line[i+1]==='"') { cur+='"'; i++; } else if (c==='"') { inQ=false; } else { cur+=c; } }
    else if (c==='"') { inQ=true; }
    else if (c===',') { vals.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  vals.push(cur.trim());
  return vals;
}
// Normalize known Elvanto/UCare column names to backend field names.
const _CSV_FIELD_MAP = {
  'first name':'first_name', 'first_name':'first_name',
  'last name':'last_name', 'last_name':'last_name',
  'gender':'gender',
  'school grade':'grade', 'grade':'grade',
  'mobile number':'mobile', 'mobile':'mobile',
  'phone':'phone',
  'youth parent phone number':'parent_phone', 'parent_phone':'parent_phone',
  'guardian phone':'guardian_phone', 'guardian_phone':'guardian_phone',
  'date of birth':'date_of_birth', 'date_of_birth':'date_of_birth',
  'birthday':'birthday',
};
const _CSV_SKIP = new Set(['attended','absent']);
// Try to extract an ISO date from a column header (handles ISO, DD/MM/YYYY,
// and descriptive session names like "Brisbane - Youth Society - Fri 30/01 6:50 PM").
function _extractHeaderDate(h) {
  if (/^\d{4}-\d{2}-\d{2}$/.test(h)) return h;
  const m4 = h.match(/\b(\d{1,2})\/(\d{2})\/(\d{4})\b/);
  if (m4) return `${m4[3]}-${m4[2].padStart(2,'0')}-${m4[1].padStart(2,'0')}`;
  const m2 = h.match(/\b(\d{1,2})\/(\d{2})\b/);
  if (m2) {
    const day = m2[1].padStart(2,'0'), mon = m2[2].padStart(2,'0');
    const now = new Date();
    let yr = now.getFullYear();
    if (new Date(`${yr}-${mon}-${day}`).getTime() - now.getTime() > 60*24*3600000) yr--;
    return `${yr}-${mon}-${day}`;
  }
  return null;
}
function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const rawHeaders = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,''));
  // Map each header index to its normalized key (null = skip)
  const headerMap = rawHeaders.map(h => {
    const lo = h.toLowerCase().trim();
    if (_CSV_SKIP.has(lo)) return null;
    if (_CSV_FIELD_MAP[lo]) return { type:'field', key:_CSV_FIELD_MAP[lo] };
    const d = _extractHeaderDate(h);
    if (d) return { type:'date', key:d };
    return null;
  });
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g,''));
    const obj = {};
    headerMap.forEach((norm, i) => {
      if (!norm) return;
      const v = vals[i] || '';
      if (norm.type === 'date') {
        obj[norm.key] = ['true','1','yes','y'].includes(v.toLowerCase());
      } else if (norm.key === 'grade') {
        obj[norm.key] = v ? parseInt(v, 10) : null;
      } else {
        obj[norm.key] = v;
      }
    });
    return obj['first_name'] ? obj : null;
  }).filter(Boolean);
}

const ADMIN_PATHS = ['/settings', '/accounts/users'];
let _adminRevalidating = false;
function _revalidateAdmin() {
  if (_adminRevalidating) return;
  _adminRevalidating = true;
  Promise.all(ADMIN_PATHS.map(p => API.get(p).catch(() => null)))
    .then(() => { if (S.page === 'admin') return renderAdmin(); })
    .catch(() => {})
    .finally(() => { _adminRevalidating = false; });
}
async function renderAdmin() {
  if (S.user?.role !== 'admin') { go('home'); return; }
  const _pg = S.page;
  const allFresh = ADMIN_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = ADMIN_PATHS.every(p => Cache.getStale(p) !== null);
  let settings, users;
  if (allFresh || haveStale) {
    settings = Cache.getStale('/settings') || {};
    users = Cache.getStale('/accounts/users') || [];
    if (!allFresh) _revalidateAdmin();
  } else {
    setApp(shell(''));
    [settings, users] = await Promise.all([
      API.get('/settings').catch(() => ({})),
      API.get('/accounts/users').catch(() => []),
    ]);
    if (S.page !== _pg) return;
  }
  renderAdminView(settings, users);
}

// ── New Year Data Refresh wizard ──
// A gated, in-order checklist through the existing pieces needed to roll the
// platform into a new year: export the current allocations + freeze this
// year's Connection Audit snapshot, wipe last year's data, re-import fresh
// attendance, then restore the allocations onto the new roster. Nothing here
// is a new capability — it's the existing Export/Reset/Import endpoints
// walked in the one order that actually works, since Full Reset (step 2)
// deletes the leaders that step 4's allocation import needs to match against,
// and re-importing the lifegroup CSV (step 3) is what recreates them.
// State is deliberately in-memory only (session-based) — re-opening this tab
// always starts a fresh run; there's no reliable way to know from the server
// whether a past export was actually saved somewhere by the admin.
let _wiz = { step1Done: false, step2Done: false, step3Ack: false, step4Done: false };
function _wizReset() { _wiz = { step1Done: false, step2Done: false, step3Ack: false, step4Done: false }; }
function renderWizard() { renderAdminView(_adminData.settings, _adminData.users); }

function _wizStepCard(n, title, desc, bodyHtml, done, locked) {
  return `<div class="card" style="margin-bottom:10px${locked ? ';opacity:.5' : ''}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:${done ? '#16a34a' : 'var(--paper-dark)'};color:${done ? '#fff' : 'var(--ink-mid)'}">${done ? '✓' : n}</div>
      <div style="font-size:14px;font-weight:700">${esc(title)}</div>
    </div>
    <div class="help-text" style="margin-bottom:10px">${esc(desc)}</div>
    ${locked ? '' : bodyHtml}
  </div>`;
}

function renderNewYearWizard() {
  let b = `<div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
    <div style="flex:1;font-size:13px;color:var(--ink-mid)">Walks through the new-year data refresh in order — each step unlocks once the one before it is done.</div>
    ${helpTip('Step 1 exports current allocations and freezes this year’s attendance into the Connection Audit (so it stays available for comparison after the reset). Step 2 (Full Reset) then wipes students, leaders, connections and attendance — accounts are kept. Step 3 is a reminder to re-import this year’s attendance CSVs, which also recreates leaders tagged "(leader)" in the group export. Step 4 restores the allocations you exported in step 1 onto the freshly imported roster.')}
  </div>`;

  b += _wizStepCard(1, "Export allocations & finalize this year's audit baseline",
    "Downloads a CSV of every student–leader allocation (you'll re-import it in step 4), and saves this year's attendance into the Connection Audit so it's kept for year-over-year comparison.",
    `<button class="btn btn-secondary btn-full" onclick="wizStep1()">Export &amp; Finalize Baseline</button>`,
    _wiz.step1Done, false);

  b += _wizStepCard(2, 'Full Reset',
    'Permanently deletes all students, leaders, connections and attendance. Accounts are kept. This cannot be undone.',
    `<button class="btn btn-danger btn-full" onclick="confirmType({title:'Full Reset?',word:'RESET',danger:true,body:'This permanently deletes all students, leaders, connections and attendance. Accounts are kept. This cannot be undone.',onConfirm:wizStep2Confirmed})">Full Reset</button>`,
    _wiz.step2Done, !_wiz.step1Done);

  b += _wizStepCard(3, "Re-import this year's attendance",
    'Go to the Import screen and upload the new Service and Group attendance exports. This also recreates any leader tagged "(leader)" in the group export — needed before step 4 can match allocations back on.',
    _wiz.step3Ack
      ? `<div class="alert al-ok" style="display:flex;align-items:center;gap:6px">${icS('check')} Confirmed</div>`
      : `<button class="btn btn-secondary btn-full" onclick="wizStep3Ack()">I've re-imported this year's attendance</button>`,
    _wiz.step3Ack, !_wiz.step2Done);

  b += _wizStepCard(4, 'Import allocations',
    "Re-import the allocations CSV from step 1 to restore every student–leader pairing onto the freshly imported roster.",
    `<label class="btn btn-secondary btn-full" style="cursor:pointer">Import Allocations
      <input type="file" accept=".csv,.xlsx" style="display:none" onchange="wizHandleAllocationImportFile(this)">
    </label>
    <div id="alloc-import-status" style="margin-top:8px"></div>`,
    _wiz.step4Done, !_wiz.step3Ack);

  return b;
}

async function wizStep1() {
  const exportOk = await exportAllocationsCSV();
  if (!exportOk) return;
  try {
    await API.post('/audits/finalize-live', {});
    toast('✓ Baseline finalized');
    _wiz.step1Done = true;
    renderWizard();
  } catch (e) { toast('Finalize failed: ' + e.message); }
}

async function wizStep2Confirmed() {
  try {
    await API.post('/admin/reset', { force: true, confirmWipe: CONFIRM_WIPE_STRING });
    Cache.clear();
    if (window.CA) CA.reset(); /*CA-HOOK*/
    toast('✓ Full reset complete');
    _wiz.step2Done = true;
    renderWizard();
  } catch (e) { toast(e.message); }
}

function wizStep3Ack() {
  _wiz.step3Ack = true;
  renderWizard();
}

function wizHandleAllocationImportFile(input) {
  const f = input.files[0];
  if (f) processAllocationImport(f, () => { _wiz.step4Done = true; renderWizard(); });
}

}

function isoDate(d){

  m=String(d).trim().match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=2000;return y+'-'+String(+m[2]).padStart(2,'0')+'-'+String(+m[1]).padStart(2,'0');}
  return null;
}
function parseRows(text){
  const lines=String(text||'').trim().split(/\r?\n/);
  if(lines.length<2)return null;
  const hd=splitCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
  const gi=n=>hd.indexOf(n);
  const iN=gi('name');
  const iF=Math.max(gi('first name'),gi('first_name'),gi('firstname'));
  const iL=Math.max(gi('last name'),gi('last_name'),gi('lastname'));
  let iD=Math.max(gi('date'),gi('decision date'),gi('connect date'));
  // Fallback: any header containing 'date' as a whole word that isn't birth/DOB-related.
  if(iD<0)iD=hd.findIndex(h=>/\bdate\b/.test(h)&&!/birth|born|dob/.test(h));
  if(iN<0&&iF<0)return null;
  const out=[];
  for(const line of lines.slice(1)){
    const v=splitCSVLine(line).map(x=>x.replace(/^"|"$/g,'').trim());
    const name=iN>=0?v[iN]:((v[iF]||'')+' '+(iL>=0?(v[iL]||''):'')).trim();
    if(!name)continue;
    out.push({name,date:iD>=0?isoDate(v[iD]):null});

// Parse a connect/decision CSV in the service-matrix format: rows are people, date-format
// column headers are sessions, cell Y/yes/1/true = attended/submitted on that date.
// Returns [{name, date}] — one row per person with the earliest (connect) or latest
// (decision) date — or null when no date-format column headers are found.
function parseMatrixRows(text,kind){
  const lines=String(text||'').trim().split(/\r?\n/);
  if(lines.length<2)return null;
  const raw=splitCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,''));
  const hd=raw.map(h=>h.trim().toLowerCase());
  const gi=n=>hd.indexOf(n);
  const iN=gi('name');
  const iF=Math.max(gi('first name'),gi('first_name'),gi('firstname'));
  const iL=Math.max(gi('last name'),gi('last_name'),gi('lastname'));
  if(iN<0&&iF<0)return null;
  const dateCols=[];
  for(let i=0;i<raw.length;i++){const d=_extractHeaderDate(raw[i]);if(d)dateCols.push({i,d});}
  if(!dateCols.length)return null;
  const YES=new Set(['y','yes','1','true']);
  const pick=(dates)=>kind==='connect'?dates.reduce((a,b)=>a<b?a:b):dates.reduce((a,b)=>a>b?a:b);
  const out=[];
  for(const line of lines.slice(1)){
    const v=splitCSVLine(line).map(x=>x.replace(/^"|"$/g,'').trim());
    const name=iN>=0?v[iN]:((v[iF]||'')+' '+(iL>=0?(v[iL]||''):'')).trim();
    if(!name)continue;
    const yDates=dateCols.filter(c=>YES.has((v[c.i]||'').toLowerCase())).map(c=>c.d);

// Columns: Person, Contact Number, Demographics, Status, Date Entered, Due Date, Days in Step, Administrator, …
function parseFlows(text){
  const lines=String(text||'').trim().split(/\r?\n/);
  if(lines.length<2)return null;
  const hd=splitCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
  const iP=hd.indexOf('person'),iSt=hd.indexOf('status'),iDe=hd.indexOf('date entered'),iDs=hd.indexOf('days in step'),iAd=hd.indexOf('administrator');
  if(iP<0||iDe<0||iDs<0||iAd<0)return null;
  let step=0;const out=[];
  for(const line of lines.slice(1)){

// Per-leader, per-term follow-up stats from the flows upload.
// Steps 1 & 5 ignored. Completion date = Date Entered + Days in Step → term (calendar quarter ≈ school term).
// Overdue days = max(0, days in step − SLA), SLA: step 2 = 7d, step 3 = 7d, step 4 = 14d.
function flowStats(){
  restore();

  const SLA={2:7,3:7,4:14};
  const terms=new Map(),admins=new Map();
  for(const r of rows){

  const svcD=Math.round((rate(tv.reduce((t,s)=>t+s.sA,0),tv.reduce((t,s)=>t+s.sT,0))-rate(tv.reduce((t,s)=>t+s.psA,0),tv.reduce((t,s)=>t+s.psT,0)))*100);
  const tg=students.filter(s=>s.pgT>0);
  const grpD=Math.round((rate(tg.reduce((t,s)=>t+s.gA,0),tg.reduce((t,s)=>t+s.gT,0))-rate(tg.reduce((t,s)=>t+s.pgA,0),tg.reduce((t,s)=>t+s.pgT,0)))*100);
  let actTrend='level';
  if(ss.length>=6){
    const f3=(ss[0].v+ss[1].v+ss[2].v)/3,l3=(ss[ss.length-3].v+ss[ss.length-2].v+ss[ss.length-1].v)/3;
    actTrend=l3-f3>=5?'rising':f3-l3>=5?'declining':'level';
  }
  const decisions=people.filter(p=>p.dec).length;
  // groups = 12 grade×gender cohorts (the API exposes no named lifegroups)
  const groups=[];
  for(const gender of['female','male'])for(let gr=7;gr<=12;gr++){
    const mem=students.filter(s=>s.grade===gr&&s.gender===gender&&s.gT>0);
    const enrolled=mem.length;
    const active=mem.filter(s=>s.gA>0).length;
    const va=active?+(mem.reduce((t,s)=>t+s.gA,0)/active).toFixed(1):0;
    const breadth=enrolled?active/enrolled:0;
    const weeksRun=enrolled?Math.max(0,...mem.map(s=>s.gT)):0;
    const pv=mem.filter(s=>s.pgT>0);
    let trend='stable',trendPct=0;
    if(pv.length){
      const cur=rate(pv.reduce((t,s)=>t+s.gA,0),pv.reduce((t,s)=>t+s.gT,0));
      const prev=rate(pv.reduce((t,s)=>t+s.pgA,0),pv.reduce((t,s)=>t+s.pgT,0));
      trendPct=Math.round((cur-prev)*100);
      trend=cur-prev>=0.20?'rising':prev-cur>=0.20?'declining':'stable';
    }
    const loose=enrolled>=10&&va<3&&trend==='stable';
    groups.push({id:'co-'+gr+(gender==='female'?'f':'m'),name:'Yr '+gr+' '+(gender==='female'?'Girls':'Boys'),grade:gr,gender,mem,enrolled,active,va,breadth,weeksRun,trend,trendPct,loose});
  }
  mdl={people,rungs,groups,kpis:{act,inLG,avgFri,svcD,grpD,actTrend,decisions}};
  return mdl;
}

function tabs(page){

// A human label for the loaded scope, e.g. "2026 · T2 (in progress)" or
// "2026 · Year to date". Pairs the term ordinal with its year everywhere it's
// shown (titles, hub hero) so a slice is never ambiguous across years.
function scopeLabel(){
  if(!AUDIT)return'';
  const y=AUDIT_YEAR!=null?String(AUDIT_YEAR):'';
  if(TERM==='ALL')return (y?y+' · ':'')+'Year to date';
  const t=(AUDIT.terms||[]).find(x=>x.key===TERM);
  if(!t)return y;
  const ip=(AUDIT.perTerm[t.key]||{}).inProgress;
  return (y?y+' · ':'')+'T'+t.ordinal+(ip?' (in progress)':'');
}
// Unified scope bar: year picker + period (term) picker in one place, always
// visible on the analytical tabs. Year is inline pills when there are few
// audits, a <select> once there are many. Replaces the old term-only switcher
// (which never showed the year, so cross-year views looked identical).
function scopeBar(){
  if(!AUDIT)return'';
  const terms=AUDIT.terms||[];
  const yrs=AUDIT_SUMMARIES||[];
  let yearCtl;
  if(yrs.length>4){
    const opts=yrs.map(y=>'<option value="'+y.year+'"'+(y.year===AUDIT_YEAR?' selected':'')+'>'+esc(String(y.year))+'</option>').join('');
    yearCtl='<select class="ca-scope-sel" onchange="CA.setYear(this.value)">'+opts+'</select>';
  }else if(yrs.length){
    yearCtl=yrs.map(y=>'<span class="ca-chip2'+(y.year===AUDIT_YEAR?' on':'')+'" onclick="CA.setYear('+y.year+')">'+esc(String(y.year))+'</span>').join('');
  }else{
    yearCtl='<span class="ca-chip2 on">'+esc(AUDIT_YEAR!=null?String(AUDIT_YEAR):'—')+'</span>';
  }
  let termCtl='<span class="ca-chip2'+(TERM==='ALL'?' on':'')+'" onclick="CA.setTerm(\'ALL\')">Year to date</span>';
  for(const t of terms){const ip=(AUDIT.perTerm[t.key]||{}).inProgress;termCtl+='<span class="ca-chip2'+(TERM===t.key?' on':'')+'" onclick="CA.setTerm(\''+t.key+'\')">T'+t.ordinal+(ip?' • live':'')+'</span>';}
  return '<div class="ca-scope">'
    +'<div class="ca-scope-row"><span class="ca-scope-lb">Year '+helpTip('This is a frozen snapshot from your last year-to-date upload, not live data. Re-upload in the Data tab to refresh it.')+'</span><div class="ca-scope-ctl">'+yearCtl+'</div></div>'
    +'<div class="ca-scope-row"><span class="ca-scope-lb">Period</span><div class="ca-scope-ctl">'+termCtl+'</div></div>'
    +'</div>';
}

function exportQuad(q){

// Stage an uploaded file into PENDING (not localStorage). saveAudit() then POSTs
// the whole staged set to /audits, where the server computes the terms.
function upload(kind,input){
  const f=input&&input.files&&input.files[0];if(!f)return;
  const isX=/\.xlsx?$/i.test(f.name);
  const rd=new FileReader();
  rd.onload=async e=>{
    let text=e.target.result;
    if(isX){
      try{text=rowsToCsv(await readXlsx(e.target.result));}
      catch(err){toast((err&&err.message)||'Could not read that Excel file');return;}
    }
    if(kind==='service'){
      if(parseGroupCSV(text)){toast('That looks like a Lifegroup export — use the Lifegroup slot');return;}
      const rows=parseCSV(text);
      if(!rows.length){toast('Could not read that as a Youth attendance CSV');return;}
      PENDING.service={rows};PENDING._serviceFn=f.name;
      toast(rows.length+' Youth rows staged');rerender();return;
    }
    if(kind==='group'){
      const grp=parseGroupCSV(text);
      if(!grp||!grp.groups.length){toast('Could not read that as a lifegroup attendance CSV');return;}
      PENDING.group=grp;PENDING._groupFn=f.name;
      toast(grp.groups.length+' lifegroups staged');rerender();return;
    }
    if(kind==='flows'){
      const frows=parseFlows(text);
      if(!frows||!frows.length){toast('Could not read that file — needs the People Flow export columns (Person, Status, Date Entered, Days in Step, Administrator)');return;}
      PENDING.flows=frows;PENDING._flowsFn=f.name;
      toast(frows.length+' rows · '+frows.filter(r=>r.step>=2&&r.step<=4).length+' step 2–4 records');rerender();return;
    }
    // For connect/decision try the matrix format (date-column headers, Y/N cells) first,
    // then fall back to the lean single-date-column format.
    let rows=kind!=='team'?parseMatrixRows(text,kind):null;
    if(!rows)rows=parseRows(text);
    if(!rows||!rows.length){toast('Could not read that file — needs a Name (or First/Last Name) column');return;}
    const seen=new Map();
    for(const r of rows){
      const k=norm(r.name);if(!k)continue;
      const p=seen.get(k);
      if(!p)seen.set(k,{name:r.name,date:r.date});
      else if(kind==='connect'&&r.date&&(!p.date||r.date<p.date))p.date=r.date;
      else if(kind==='decision'&&r.date&&(!p.date||r.date>p.date))p.date=r.date;
    }
    PENDING[kind]=[...seen.values()];PENDING['_'+kind+'Fn']=f.name;
    toast(PENDING[kind].length+' '+kind+' rows staged');rerender();
  };
  if(isX)rd.readAsArrayBuffer(f);else rd.readAsText(f);
}
// POST the staged uploads as one audit; the server computes terms + per-term
// aggregates and stores one row for that year (re-save overwrites the year).
async function saveAudit(){
  if(!PENDING.service){toast('Upload the year-to-date service CSV first');return;}
  try{
    const a=await API.post('/audits',{
      service:PENDING.service,
      group:PENDING.group||{groups:[]},
      team:PENDING.team||[],connect:PENDING.connect||[],decision:PENDING.decision||[],flows:PENDING.flows||[],
    },90000);
    auditInvalidate();
    await auditList();
    await auditLoad(a.year);
    PENDING={service:null,group:null,team:[],connect:[],decision:[],flows:[]};
    toast('Audit saved for '+a.year);
    await render('ca-overview');
  }catch(e){toast((e&&e.message)||'Save failed');}
}

    +'var tx=null;'
    +'document.addEventListener("touchstart",function(e){tx=e.touches[0].clientX;},{passive:true});'
    +'document.addEventListener("touchend",function(e){if(tx===null)return;var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>55){if(dx<0)next();else prev();}tx=null;},{passive:true});'
    +'show(0);';
  const chrome='<div class="progress-track"><div id="progress"></div></div>'
    +'<div class="bar"><button id="prev" class="nav">‹ Prev</button><button id="next" class="nav">Next ›</button>'
    +'<span id="counter"></span><div id="dots"></div><span class="spacer"></span>'
    +'<button id="present">Presenter notes (S)</button><button id="printbtn" class="accent">Print / PDF</button></div>';
  const html='<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
    +'<meta name="viewport" content="width=device-width, initial-scale=1">'
    +'<title>The Health of '+esc(ministry)+' — '+esc(dateStr)+'</title>'
    +'<style>'+CSS+'</style></head><body>'
    +'<div class="deck">'+slides.map(slideHTML).join('')+'</div>'+chrome
    +'<script>'+NAVJS+'<\/script></body></html>';
  try{
    const blob=new Blob([html],{type:'text/html'});
    const u=URL.createObjectURL(blob);
    const w=window.open(u,'_blank');
    if(!w){const a=document.createElement('a');a.href=u;a.download='connection-audit-brief.html';document.body.appendChild(a);a.click();a.remove();}
    setTimeout(()=>URL.revokeObjectURL(u),60000);
  }catch(err){toast('Could not build the brief: '+(err.message||err));}
}

// ---------- router ----------
function dispatch(p){
  if(p==='ca-funnel')rFunnel();
  else if(p==='ca-groups')rGroups();
  else if(p==='ca-people')rPeople();
  else if(p==='ca-data')rData();
  else{S.page='ca-overview';rOverview();}
}
async function render(p){
  if(!S.user||!['director','admin'].includes(S.user.role)){go('home');return;}
  // Ensure the audit list is known and a year is loaded (default: most recent).
  await auditList();
  if(!AUDIT&&AUDIT_SUMMARIES&&AUDIT_SUMMARIES.length){ await auditLoad(AUDIT_SUMMARIES[0].year); }
  await load(p==='ca-overview'||!D);
  restore();mdl=null;
  dispatch(p);
}
return{render,reset,stale,seedOn,dismissWarn,setYear,setTerm,saveAudit,
  model:async()=>{await load();restore();return model();},
  fquad,gfilter,lgfilter,fopen,flowStats,_parseFlows:parseFlows,pick,upload,showPerson,showGroup,showLgRoster,exportMenu,exportQuad,buildDeck,
  pq,pstage,pquad,pmore};
})();
window.CA=CA;
/* ── CA MODULE END ── */

async function boot() {
  const token = localStorage.getItem('yap_token');
  if (token) {
    try { const user = await API.get('/auth/me'); S.user = user; } catch { API.setToken(null); }
  }
  restoreConnectFilters();
  restoreArFilter();
  if (S.user) {
    try { S.settings = await API.get('/settings'); } catch { S.settings = {}; }
  }
  render();
}

boot();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(() => {
      // When a new SW activates and claims this page, reload to pick up the new HTML
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
    }).catch(() => {});
  });
}
