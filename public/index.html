        if (wk.length) {

          body += `<div style="font-size:12px;color:var(--ink-mid);margin:12px 0 4px">Weekly attendance</div>`;
          body += colChart(wkSess, 56);
        }
        body += '</div>';
      }

      if (u.role === 'grade') {
        // Multi-grade grade login: flatten every visible grade's lifegroups
        // (single-grade → exactly its one byGrade entry, unchanged).
        const allLg = (lgStats.byGrade || []).flatMap(gg => gg.lifegroups || []);
        body += `<div class="sh">${gradeBadgeLabel(u)}${_gsfx(_loginGender(u))} ${L('smallGroupPlural')}</div><div class="card">`;
        if (allLg.length) for (const lg of allLg) body += _lgGroupRow(lg, true);
        else body += `<div style="color:var(--ink-faint);font-size:13px">No lifegroups ran this term</div>`;
        body += '</div>';
      } else if (u.role === 'quad') {
        body += `<div class="sh">By Grade</div><div class="card">`;
        const grades = (lgStats.byGrade || []);
        if (grades.length) for (const g of grades) body += _lgGradeBlock(g, true, _gsfx(_loginGender(u)), 'tlg-' + g.grade);
        else body += `<div style="color:var(--ink-faint);font-size:13px">No lifegroup data yet</div>`;
        body += '</div>';
      } else {
        body += `<div class="sh">By Quad</div>`;
        const quads = (lgStats.byQuad || []);
        for (const q of quads) {
          const qid = 'tlq-' + q.quad;
          body += `<div class="card drop" id="${qid}" style="margin-bottom:8px;border-left:4px solid ${QUAD_COLORS[q.quad]}">`;
          body += `<div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('${qid}')">
            <span class="drop-chev" style="font-size:12px">›</span>
            <div style="flex:1;font-weight:700;font-size:14px">${q.label}</div>
            <span style="font-size:12px;font-weight:700;color:var(--ink-mid)">${q.current.uniqueAttenders} seen · ${q.current.avgPerWeek} weekly</span>
          </div>`;
          if (q.previous.uniqueAttenders>0 || q.previous.members>0) body += `<div style="font-size:11px;color:var(--ink-faint);padding-left:20px;margin-top:2px">prev term: ${q.previous.uniqueAttenders} seen · ${q.previous.avgPerWeek} weekly</div>`;
          body += `<div class="drop-body">`;
          // Use the quad's own GENDERED per-grade breakdown (not the combined byGrade).
          // _lgGradeInline (not _lgGradeBlock) — opening the quad goes straight to each
          // grade's lifegroups, no separate per-grade drop to click through first.
          const gradeStats = q.grades || [];
          if (gradeStats.length) for (const g of gradeStats) body += _lgGradeInline(g, true, _gsfx(quadGender(q.quad)));
          else body += `<div style="font-size:12px;color:var(--ink-faint);padding:6px 0 4px 20px">No lifegroups ran this term</div>`;
          body += '</div></div>';
        }
        if (!quads.length) body += `<div class="card"><div style="color:var(--ink-faint);font-size:13px">No lifegroup data yet</div></div>`;
      }
    }
  }

  setApp(shell(body));
}

async function exportTrendsCSV() {
  try {
    const students = await API.get('/students');
    const lgOn = _lifegroupsOn();
    const header = [_gradeWord(),'Students','Seen Svc','Avg Svc Sess'];
    if (lgOn) header.push(L('smallGroup') + ' Enrolled', 'Seen ' + L('smallGroup'), 'Avg ' + L('smallGroup') + ' Sess');
    const aoa = [header];
    for (const gr of _gradeList()) {
      const gs = students.filter(s=>s.grade===gr);
      if (!gs.length) continue;
      const u=gs.filter(s=>s.svcAttended>0).length;
      const avgSvc=gs.length?Math.round(gs.reduce((s,x)=>s+x.svcAttended,0)/gs.length):0;
      const row = [gr,gs.length,u,avgSvc];
      if (lgOn) {
        const grpS=gs.filter(s=>s.grpTotal>0);
        const uG=grpS.filter(s=>s.grpAttended>0).length;
        const avgGrp=grpS.length?Math.round(grpS.reduce((s,x)=>s+x.grpAttended,0)/grpS.length):0;
        row.push(grpS.length,uG,avgGrp);
      }
      aoa.push(row);
    }
    await _ensureXlsx();

// ── XLSX READER (lazy SheetJS) ────────────────────────────────
// Reads the first sheet of an .xlsx/.xls ArrayBuffer into a 2D array of strings, with date
// cells emitted as ISO yyyy-mm-dd so the existing CSV parsers work unchanged. Backed by the
// vendored SheetJS build (public/vendor/xlsx.full.min.js), lazy-loaded on first use so it never
// weighs on normal navigation. Replaced the hand-rolled DecompressionStream reader for
// robustness on arbitrary Excel exports (legacy .xls, 1904 date system, sheet order, format
// variants) — this is a medical/compliance roster where a silent misparse is the worst outcome.
let _xlsxLoading=null;
function _ensureXlsx(){
  if(window.XLSX)return Promise.resolve();
  if(_xlsxLoading)return _xlsxLoading;
  _xlsxLoading=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="vendor/xlsx.full.min.js";
    s.onload=()=>window.XLSX?resolve():reject(new Error("Excel reader failed to initialise"));
    s.onerror=()=>{_xlsxLoading=null;reject(new Error("Could not load the Excel reader — export the sheet as CSV and re-upload."));};
    document.head.appendChild(s);
  });
  return _xlsxLoading;
}
async function readXlsx(buf){
  await _ensureXlsx();
  const wb=XLSX.read(new Uint8Array(buf),{type:"array",cellDates:true});
  const first=wb.SheetNames&&wb.SheetNames[0];
  const ws=first&&wb.Sheets[first];
  if(!ws)throw new Error("The workbook has no readable sheet — export as CSV and re-upload.");
  const p2=n=>String(n).padStart(2,"0");
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
  return aoa.map(r=>(r||[]).map(c=>c instanceof Date?(c.getFullYear()+"-"+p2(c.getMonth()+1)+"-"+p2(c.getDate())):(c==null?"":String(c))));
}
function rowsToCsv(rows){return rows.map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');}

// Generic CSV -> array of objects keyed by lowercased header. Unlike parseCSV
// (which is tailored to the attendance import and drops unknown columns), this
// preserves every column — needed so the "Leader" column survives for the
// allocation import. Server does the agnostic header detection.
function parseAllocationCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g, '').toLowerCase().trim());
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g, ''));
    const obj = {};
    headers.forEach((h, i) => { if (h) obj[h] = (vals[i] || '').trim(); });
    return obj;
  }).filter(o => Object.values(o).some(v => v));
}

async function detectAndPreview(file) {
  const statusEl = document.getElementById('import-status');
  const isExcel = /\.xlsx?$/i.test(file.name);
  statusEl.innerHTML = `<div class="alert al-info"><div class="spin" style="margin-right:8px"></div>Reading ${isExcel ? 'Excel' : 'CSV'}…</div>`;

    else text = await file.text();
  } catch (err) { statusEl.innerHTML = `<div class="alert al-err">${(err && err.message) || 'Could not read this file'}</div>`; return; }

  // Group exports have DD/MM/YYYY date-column headers + group-name header rows;
  // parseGroupCSV returns null when that structure is absent → treat as Service.
  const group = parseGroupCSV(text);
  if (group) { previewGroupImport(file.name, group); return; }

  const rows = parseCSV(text);

  await previewServiceImport(file.name, rows);
}

// Service preview: new vs existing students, plus any unrecognised grades.
async function previewServiceImport(filename, rows) {
  // Match the server's new-vs-known logic against CURRENT students. The 30s cache
  // (Cache.get) returns null once expired AND is wiped by Cache.clear() after every
  // import, so relying on it made a re-upload show everyone as "new" with 0 updates.
  // Fetch fresh (falling back to the last-known list, then empty) before counting.
  let studentList = Cache.get('/students');
  if (!studentList) {
    try { studentList = await API.get('/students'); }
    catch { studentList = Cache.getStale('/students') || []; }
  }
  const existing = new Set((studentList || []).map(s => `${(s.firstName||'').trim().toLowerCase()} ${(s.lastName||'').trim().toLowerCase()}`));
  let nu = 0; const grades = new Set(); let unknownGrade = 0;
  for (const r of rows) {
    const key = `${(r.first_name||'').trim().toLowerCase()} ${(r.last_name||'').trim().toLowerCase()}`;
    if (key.trim() && !existing.has(key)) nu++;
    const g = parseInt(r.grade, 10);
    if (r.grade != null && r.grade !== '') { if (g >= 7 && g <= 12) grades.add(g); else unknownGrade++; }
  }
  const warn = unknownGrade ? `<div style="color:var(--warn);font-size:12px;margin-top:6px">${unknownGrade} row(s) have a grade outside Yr 7–12.</div>` : '';
  modal(`<div class="mo-title">Service import — confirm</div>
    <div style="font-size:13px;color:var(--ink-mid);line-height:1.7">
      <div><strong>${rows.length}</strong> attendance rows</div>
      <div><strong>${nu}</strong> new student${nu!==1?'s':''} · ${rows.length - nu} already known</div>
      <div>Grades seen: ${[...grades].sort((a,b)=>a-b).join(', ') || '—'}</div>
    </div>${warn}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" onclick="closeModal();uploadServiceImport(${JSON.stringify(filename).replace(/"/g,'&quot;')})">Import</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`);
  window._pendingServiceRows = rows;
}

// Guards against a second import firing while one is still in flight — the

// Parse a "Group Individual Attendance" CSV export (Elvanto/UCare).
// Returns { groups: [...] } or null if the file is not recognised as a group CSV.
function parseGroupCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const rawHeaders = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,''));
  // Find date columns: DD/MM/YYYY format
  const dateCols = [];
  for (let i = 0; i < rawHeaders.length; i++) {
    const m = rawHeaders[i].match(/^(\d{1,2})\/(\d{2})\/(\d{4})$/);
    if (m) dateCols.push({ index: i, iso: `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` });
  }
  if (!dateCols.length) return null;
  const meetings = dateCols.map(d => d.iso);
  const groups = [];
  let curGroup = null;
  for (const line of lines.slice(1)) {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g,''));
    if (!vals[0] || !vals[0].trim()) continue;
    // Group header: all date columns are empty
    const isHeader = dateCols.every(d => !vals[d.index] || vals[d.index].trim() === '');
    if (isHeader) {
      curGroup = { name: vals[0].trim(), meetings, members: [] };
      groups.push(curGroup);
      continue;
    }
    if (!curGroup) continue;
    // Parse "Lastname, Firstname"
    const nameStr = vals[0].trim();
    const ci = nameStr.indexOf(',');
    let first_name, last_name;
    if (ci >= 0) { last_name = nameStr.slice(0, ci).trim(); first_name = nameStr.slice(ci + 1).trim(); }
    else { const parts = nameStr.split(' '); first_name = parts.slice(0, -1).join(' '); last_name = parts[parts.length - 1] || ''; }
    if (!first_name || !last_name) continue;
    // attendance: null = not a member ('-'), true = Y, false = N
    const attendance = dateCols.map(d => {
      const v = (vals[d.index] || '').trim();
      if (!v || v === '-') return null;
      return ['y','yes','true','1'].includes(v.toLowerCase());
    });
    if (attendance.some(a => a !== null)) curGroup.members.push({ first_name, last_name, attendance });
  }
  return groups.length ? { groups } : null;
}

function splitCSVLine(line) {
  const vals=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const c=line[i];
    if (inQ) { if (c==='"'&&line[i+1]==='"') { cur+='"'; i++; } else if (c==='"') { inQ=false; } else { cur+=c; } }
    else if (c==='"') { inQ=true; }
    else if (c===',') { vals.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  vals.push(cur.trim());
  return vals;
}
// Normalize known Elvanto/UCare column names to backend field names.
const _CSV_FIELD_MAP = {
  'first name':'first_name', 'first_name':'first_name',
  'last name':'last_name', 'last_name':'last_name',
  'gender':'gender',
  'school grade':'grade', 'grade':'grade',
  'mobile number':'mobile', 'mobile':'mobile',
  'phone':'phone',
  'youth parent phone number':'parent_phone', 'parent_phone':'parent_phone',
  'guardian phone':'guardian_phone', 'guardian_phone':'guardian_phone',
  'date of birth':'date_of_birth', 'date_of_birth':'date_of_birth',
  'birthday':'birthday',
};
const _CSV_SKIP = new Set(['attended','absent']);
// Try to extract an ISO date from a column header (handles ISO, DD/MM/YYYY,
// and descriptive session names like "Brisbane - Youth Society - Fri 30/01 6:50 PM").
function _extractHeaderDate(h) {
  if (/^\d{4}-\d{2}-\d{2}$/.test(h)) return h;
  const m4 = h.match(/\b(\d{1,2})\/(\d{2})\/(\d{4})\b/);
  if (m4) return `${m4[3]}-${m4[2].padStart(2,'0')}-${m4[1].padStart(2,'0')}`;
  const m2 = h.match(/\b(\d{1,2})\/(\d{2})\b/);
  if (m2) {
    const day = m2[1].padStart(2,'0'), mon = m2[2].padStart(2,'0');
    const now = new Date();
    let yr = now.getFullYear();
    if (new Date(`${yr}-${mon}-${day}`).getTime() - now.getTime() > 60*24*3600000) yr--;
    return `${yr}-${mon}-${day}`;
  }
  return null;
}
function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const rawHeaders = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,''));
  // Map each header index to its normalized key (null = skip)
  const headerMap = rawHeaders.map(h => {
    const lo = h.toLowerCase().trim();
    if (_CSV_SKIP.has(lo)) return null;
    if (_CSV_FIELD_MAP[lo]) return { type:'field', key:_CSV_FIELD_MAP[lo] };
    const d = _extractHeaderDate(h);
    if (d) return { type:'date', key:d };
    return null;
  });
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.replace(/^"|"$/g,''));
    const obj = {};
    headerMap.forEach((norm, i) => {
      if (!norm) return;
      const v = vals[i] || '';
      if (norm.type === 'date') {
        obj[norm.key] = ['true','1','yes','y'].includes(v.toLowerCase());
      } else if (norm.key === 'grade') {
        obj[norm.key] = v ? parseInt(v, 10) : null;
      } else {
        obj[norm.key] = v;
      }
    });
    return obj['first_name'] ? obj : null;
  }).filter(Boolean);
}

// ── New Year Data Refresh wizard ──
// A gated, in-order checklist through the existing pieces needed to roll the
// platform into a new year: export the current allocations, back up every
// saved Connection Audit year, wipe last year's data (including the Connection
// Audit itself — Full Reset now leaves NO student data anywhere in the app),
// re-import fresh attendance, restore allocations, then reload the Connection
// Audit backup. Nothing here is a new capability except the audit backup/
// restore pair — it's the existing Export/Reset/Import endpoints walked in the
// one order that actually works, since Full Reset (step 3) deletes the leaders
// that step 5's allocation import needs to match against, and re-importing the
// lifegroup CSV (step 4) is what recreates them.
// State is deliberately in-memory only (session-based) — re-opening this tab
// always starts a fresh run; there's no reliable way to know from the server
// whether a past export was actually saved somewhere by the admin.
let _wiz = { step1Done: false, prayersExportDone: false, step2Done: false, step3Done: false, step4Ack: false, step5Done: false, step6Done: false };
function _wizReset() { _wiz = { step1Done: false, prayersExportDone: false, step2Done: false, step3Done: false, step4Ack: false, step5Done: false, step6Done: false }; }
function renderWizard() { renderAdminView(_adminData.settings, _adminData.users, _adminData.history); }

function _wizStepCard(n, title, desc, bodyHtml, done, locked) {

      <div style="font-size:14px;font-weight:700">${esc(title)}</div>
    </div>
    <div class="help-text" style="margin-bottom:10px">${esc(desc)}</div>

}

  b += _wizStepCard(4, 'Full Reset',

  b += _wizStepCard(5, "Re-import this year's attendance",

    _wiz.step4Ack, !_wiz.step3Done);

  b += _wizStepCard(6, 'Import Allocations & Prayers',
    "Re-import the allocations CSV from step 1 to restore every student–leader pairing, and the prayers CSV from step 2 to restore prayer history, onto the freshly imported roster.",
    `<label class="btn btn-secondary btn-full" style="cursor:pointer">Import Allocations

    </label>
    <div id="prayer-import-status" style="margin-top:8px"></div>`,
    _wiz.step5Done, !_wiz.step4Ack);

  b += _wizStepCard(7, 'Re-import Configuration Audit Data',
    "Re-load the Connection Audit backup from step 3 so past years are available again for comparison.",
    caOn ? `<label class="btn btn-secondary btn-full" style="cursor:pointer">Re-import Configuration Audit Data

}

async function wizStep1() {
  const exportOk = await exportAllocationsCSV();
  if (!exportOk) return;
  _wiz.step1Done = true;

async function wizStepPrayersExport() {

async function wizStep2() {
  try {
    const audits = await API.get('/audits/export-all');
    const payload = { exportedAt: new Date().toISOString(), audits };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });

    const a = document.createElement('a');

    if (window.CA) CA.reset(); /*CA-HOOK*/

function wizHandleAuditImportFile(input) {
  const f = input.files[0];
  if (!f) return;
  const statusEl = document.getElementById('audit-import-status');
  statusEl.innerHTML = `<div class="alert al-info"><div class="spin" style="margin-right:8px"></div>Reading backup…</div>`;
  const reader = new FileReader();
  reader.onload = async (e) => {
    let audits;
    try {
      const parsed = JSON.parse(e.target.result);
      audits = Array.isArray(parsed) ? parsed : parsed.audits;
      if (!Array.isArray(audits)) throw new Error('Not a Connection Audit backup file');
    } catch (err) { statusEl.innerHTML = `<div class="alert al-err">${(err && err.message) || 'Could not read this file'}</div>`; return; }
    statusEl.innerHTML = `<div class="alert al-info">Found ${audits.length} audit year${audits.length !== 1 ? 's' : ''}. Importing…</div>`;
    try {
      const { imported } = await API.post('/audits/import-all', audits, 90000);
      Cache.del('/audits');
      statusEl.innerHTML = `<div class="alert al-ok">✓ Restored ${imported} audit year${imported !== 1 ? 's' : ''}</div>`;
      _wiz.step6Done = true;
      renderWizard();
    } catch (err) { statusEl.innerHTML = `<div class="alert al-err">${err.message}</div>`; }
  };
  reader.readAsText(f);
}

function wizHandleAllocationImportFile(input) {
  const f = input.files[0];
  if (f) processAllocationImport(f, () => { _wiz.step4Done = true; renderWizard(); });
}

// ── Logo crop tool ─────────────────────────────────────────────────────────
// A draggable/zoomable square crop over an uploaded photo, baked out to a

// of the Youth Setup tab behind the modal (e.g. from an unrelated field's
// onchange) can't clobber an in-progress crop.
let _crop = null;
const _CROP_OUT = 512; // output logo size (px, square)

function _openLogoCropModal(dataUrl) {
  const probe = new Image();
  probe.onload = () => {
    _crop = { dataUrl, natW: probe.naturalWidth, natH: probe.naturalHeight, zoom: 1, panX: 0, panY: 0, dragging: false };
    modal(`
      <div class="sh">Crop your logo</div>
      <div class="help-text" style="margin-bottom:10px">Drag to reposition, use the slider (or scroll/pinch) to zoom. The square is exactly what becomes your logo.</div>
      <div id="cropVp" style="width:min(280px,82vw);aspect-ratio:1/1;margin:0 auto;overflow:hidden;position:relative;border-radius:16px;background:var(--paper-dark);touch-action:none">
        <img id="cropImg" src="${dataUrl}" draggable="false" alt="" style="position:absolute;left:0;top:0;transform-origin:top left;user-select:none;-webkit-user-drag:none">
      </div>
      <div class="fg" style="margin-top:14px"><label class="fl">Zoom</label>
        <input type="range" id="cropZoomInput" min="1" max="3" step="0.01" value="1" oninput="_cropZoomChange(this.value)" style="width:100%"></div>
      <div style="display:flex;gap:8px;margin-top:12px">

        <button type="button" class="btn btn-primary" style="flex:1" onclick="_cropConfirm()">Use this crop</button>
      </div>`, () => { _crop = null; });

// Pure math: the on-screen (CSS) width/height of the image at the current
// zoom, given it must "cover" a square viewport of size `vp` (its smaller
// natural dimension exactly fills `vp` at zoom 1). Exposed as a standalone
// helper so _cropRectFor / _cropClampPan (also pure) can share it.
function _cropDispSizeFor(natW, natH, zoom, vp) {
  const scale = (vp / Math.min(natW, natH)) * zoom;
  return { scale, w: natW * scale, h: natH * scale };
}
function _cropDispSize() {
  const vp = _cropViewportSize();
  const { scale, w, h } = _cropDispSizeFor(_crop.natW, _crop.natH, _crop.zoom, vp);
  return { scale, w, h, vp };
}
function _cropViewportSize() {
  const el = document.getElementById('cropVp');
  return el ? el.getBoundingClientRect().width : 280;
}

// Pure: clamp a candidate pan (image top-left, in viewport px) so the image
// (displayed at dispW x dispH) always fully covers a `vp`-square viewport —
// i.e. never reveals empty space past its own edges.
function _cropClampPan(panX, panY, dispW, dispH, vp) {
  return {
    x: Math.min(0, Math.max(vp - dispW, panX)),
    y: Math.min(0, Math.max(vp - dispH, panY)),
  };
}

// Pure: the source rectangle (in the image's OWN natural pixel coordinates)
// that canvas drawImage should read from to reproduce exactly what the
// viewport shows. Viewport is always square, so sw===sh always — a square
// source crop regardless of zoom or the image's own aspect ratio.
//   dispScale = (vp / min(imgW,imgH)) * zoom  — natural px -> on-screen px
//   image top-left sits at viewport position (panX,panY), so viewport-space
//   point (0,0) is at image-space (-panX,-panY) and (vp,vp) is at
//   (vp-panX, vp-panY), both in ON-SCREEN px; divide by dispScale to get
//   back to the image's natural px.
function _cropRectFor(imgW, imgH, panX, panY, zoom, vp) {
  const { scale } = _cropDispSizeFor(imgW, imgH, zoom, vp);
  const sw = vp / scale;
  return { sx: -panX / scale, sy: -panY / scale, sw, sh: sw };
}

function _cropCenter() {
  const { w, h, vp } = _cropDispSize();
  const clamped = _cropClampPan((vp - w) / 2, (vp - h) / 2, w, h, vp);
  _crop.panX = clamped.x; _crop.panY = clamped.y;
}
function _cropApplyTransform() {
  const img = document.getElementById('cropImg');
  if (!img || !_crop) return;
  const { scale } = _cropDispSize();
  img.style.transform = `translate(${_crop.panX}px, ${_crop.panY}px) scale(${scale})`;
}

function _cropBindDrag() {
  const vp = document.getElementById('cropVp');
  if (!vp) return;
  vp.onpointerdown = _cropPointerDown;
  vp.onpointermove = _cropPointerMove;
  vp.onpointerup = _cropPointerUp;
  vp.onpointercancel = _cropPointerUp;
  // Wheel-to-zoom bonus (slider remains the primary, standalone control).
  vp.onwheel = (e) => {
    if (!_crop) return;
    e.preventDefault();
    const next = Math.max(1, Math.min(3, _crop.zoom + (e.deltaY < 0 ? 0.1 : -0.1)));
    const slider = document.getElementById('cropZoomInput');
    if (slider) slider.value = next;
    _cropZoomChange(next);
  };
}
function _cropPointerDown(e) {
  if (!_crop) return;
  _crop.dragging = true;
  _crop.startX = e.clientX; _crop.startY = e.clientY;
  _crop.startPanX = _crop.panX; _crop.startPanY = _crop.panY;
  if (e.currentTarget.setPointerCapture) e.currentTarget.setPointerCapture(e.pointerId);
}
function _cropPointerMove(e) {
  if (!_crop || !_crop.dragging) return;
  const dx = e.clientX - _crop.startX, dy = e.clientY - _crop.startY;
  const { w, h, vp } = _cropDispSize();
  const clamped = _cropClampPan(_crop.startPanX + dx, _crop.startPanY + dy, w, h, vp);
  _crop.panX = clamped.x; _crop.panY = clamped.y;
  _cropApplyTransform();
}
function _cropPointerUp() { if (_crop) _crop.dragging = false; }

// Zoom around the viewport's own center point (not the image's top-left) so
// the slider feels like it's zooming into "the middle of what you're looking
// at", not yanking the image toward its origin.
function _cropZoomChange(val) {
  if (!_crop) return;
  const newZoom = Math.max(1, Math.min(3, parseFloat(val) || 1));
  const before = _cropDispSize();
  const fx = (before.vp / 2 - _crop.panX) / before.w;
  const fy = (before.vp / 2 - _crop.panY) / before.h;
  _crop.zoom = newZoom;
  const after = _cropDispSize();
  const rawX = after.vp / 2 - fx * after.w;
  const rawY = after.vp / 2 - fy * after.h;
  const clamped = _cropClampPan(rawX, rawY, after.w, after.h, after.vp);
  _crop.panX = clamped.x; _crop.panY = clamped.y;
  _cropApplyTransform();
}

function _cropConfirm() {
  if (!_crop) return;
  const img = document.getElementById('cropImg');
  const vp = _cropViewportSize();
  const rect = _cropRectFor(_crop.natW, _crop.natH, _crop.panX, _crop.panY, _crop.zoom, vp);
  const canvas = document.createElement('canvas');
  canvas.width = _CROP_OUT; canvas.height = _CROP_OUT;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, _CROP_OUT, _CROP_OUT);
  // JPEG @ 0.85 keeps even a busy photo well under the 500,000-char schema
  // cap (a fully-random 512x512 frame is still only ~120-180KB base64 at
  // this quality; a real photo compresses further).
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  if (!_setupDraft) _setupDraft = {};
  if (!_setupDraft.branding) _setupDraft.branding = {};
  _setupDraft.branding.logoImage = dataUrl;
  _crop = null;
  closeModal();
  _setupRerender();
}
function _cropCancel() {
  _crop = null;
  closeModal();
}
function _setupSetMinAtt(val) { const n = parseInt(val, 10); _setupServiceMinAttendance = isNaN(n) ? 0 : n; _setupRerender(); }
function _setupSetTermGap(val) { const n = parseInt(val, 10); _setupTermGapDays = isNaN(n) ? 14 : n; _setupRerender(); }

function _deepMergeClient(base, patch) {
  if (!patch || typeof patch !== 'object' || Array.isArray(patch)) return patch === undefined ? base : patch;
  const out = Array.isArray(base) ? [...base] : { ...(base || {}) };
  for (const k of Object.keys(patch)) {
    const v = patch[k];
    out[k] = (v && typeof v === 'object' && !Array.isArray(v) && base && typeof base[k] === 'object')
      ? _deepMergeClient(base[k], v) : v;
  }
  return out;
}

// one in progress yet. switchAdminTab() nulls these out whenever the admin
// switches INTO this tab, so re-entering after time away picks up any
// server-side changes; edits within a visit persist across every re-render.
function _ensureSetupDraft(settings) {
  if (_setupDraft == null) {
    _setupDraft = JSON.parse(JSON.stringify((settings && settings.ministryConfig) || {}));
    _setupServiceMinAttendance = (settings && settings.serviceMinAttendance) ?? 100;
    _setupTermGapDays = (settings && settings.termGapDays) ?? 14;
    _logoModeOverride = null;

function pickMinistryPreset(id) {
  // Always layer the preset onto a clean defaults baseline (not onto whatever
  // _setupDraft currently holds) so switching presets fully replaces the
  // previous preset's overrides instead of accumulating them. Doesn't touch
  // serviceMinAttendance... actually it does (presets scale it) — but leaves
  // termGapDays alone, since that's not part of any preset.
  _setupDraft = _deepMergeClient(MINISTRY_CONFIG_DEFAULTS_CLIENT, PRESET_CONFIGS_CLIENT[id]);
  _setupServiceMinAttendance = PRESET_SERVICE_MIN_ATTENDANCE_CLIENT[id];
  _setupRerender();

async function saveMinistrySetup() {
  try {

      ministryConfig: _setupDraft,
      serviceMinAttendance: _setupServiceMinAttendance,

    });
    Cache.del('/settings');
    S.settings = fresh;
    applyTheme(fresh.ministryConfig);
    toast('Youth Setup saved');
    // Re-fetch rather than reusing the pre-save snapshot so Accounts/other tabs
    // see the new values too (e.g. the orphaned-accounts check below).
    const [settings, users, history] = await Promise.all([
      API.get('/settings').catch(() => fresh),
      API.get('/accounts/users').catch(() => _adminData.users),
      API.get('/import/history').catch(() => _adminData.history),

    _adminData = { settings, users, history };
    await renderAdminView(settings, users, history);
  } catch (e) { toast(e.message); }
}

function _youthSetupBody(settings, users) {
  _ensureSetupDraft(settings);
  const cfg = _setupDraft || {};
  const st = cfg.structure || {};
  const dst = MINISTRY_CONFIG_DEFAULTS_CLIENT.structure;
  const rl = cfg.roles || {};
  const drl = MINISTRY_CONFIG_DEFAULTS_CLIENT.roles;
  const rlEn = rl.enabled || {};
  const drlEn = drl.enabled;
  const roleEnabled = (k) => rlEn[k] != null ? rlEn[k] : drlEn[k];
  const cohort = st.cohortModel || dst.cohortModel;
  // The currently-SAVED structure (not the draft) — drives the "Apply account
  // layout" button (bug 8), which always operates on whatever's actually
  // saved, never an unsaved draft. Read from `settings` (the server value
  // passed into this function), not `_setupDraft`.
  const savedStructure = (settings.ministryConfig && settings.ministryConfig.structure) || {};
  const savedCohort = savedStructure.cohortModel || dst.cohortModel;
  const savedGradeMin = savedStructure.gradeMin != null ? savedStructure.gradeMin : dst.gradeMin;
  const savedGradeMax = savedStructure.gradeMax != null ? savedStructure.gradeMax : dst.gradeMax;
  const savedGradeLabel = savedStructure.gradeLabel != null ? savedStructure.gradeLabel : dst.gradeLabel;
  const gLabel = st.gradeLabel != null ? st.gradeLabel : dst.gradeLabel;
  const gMin = st.gradeMin != null ? st.gradeMin : dst.gradeMin;
  // The highest grade is always 12 — see includeGrade6 below, which is the
  // only grade-range control exposed in this UI (bug 8 follow-up, 2026-07-11:
  // replaced separate Lowest/Highest grade number fields).

// ── Apply account layout (bug 8) ──
// Client-side mirror of src/services/cohort-account-layout.ts, purely so the
// button above can grey itself out instantly from data already on the page
// (_adminData.users + the saved settings) instead of an extra round-trip on
// every Youth Setup render. The server re-derives the same plan itself when
// actually previewing/applying — this copy only ever decides the button's
// enabled/disabled state, never performs a mutation itself. Keep in sync with
// the backend file's gradeBrackets/buildTargetAccounts/planCohortAccountLayout.
function _gradeBracketsClient(gradeMin, gradeMax) {
  const top = [];
  let g = gradeMax;
  while (g - 1 >= gradeMin + 2) { top.unshift([g - 1, g]); g -= 2; }
  const lowest = [];
  for (let n = gradeMin; n <= g; n++) lowest.push(n);
  if (lowest.length) top.unshift(lowest);
  return top;
}
function _gradeWordLabelClient(grades, gradeWord) {
  const g = grades.slice().sort((a, b) => a - b);
  const nums = g.length > 1 ? (g[0] + '–' + g[g.length - 1]) : String(g[0]);
  return gradeWord + (g.length > 1 ? 's' : '') + ' ' + nums;
}
function buildTargetAccountsClient(targetCohort, gradeMin, gradeMax, gradeWord) {
  const out = [];
  const genders = [{ gender: 'female', label: 'Girls', suffix: 'g' }, { gender: 'male', label: 'Boys', suffix: 'b' }];
  if (targetCohort === 'none') {
    for (const bracket of _gradeBracketsClient(gradeMin, gradeMax)) {
      for (const g of genders) out.push({ role: 'grade', username: 'grade' + bracket.join('') + g.suffix, displayName: _gradeWordLabelClient(bracket, gradeWord) + ' ' + g.label });
    }
  } else {
    for (let grade = gradeMin; grade <= gradeMax; grade++) {
      for (const g of genders) out.push({ role: 'grade', username: 'grade' + grade + g.suffix, displayName: _gradeWordLabelClient([grade], gradeWord) + ' ' + g.label });
    }
    for (const q of [['g79', 'Girls Yr 7-9'], ['b79', 'Boys Yr 7-9'], ['g1012', 'Girls Yr 10-12'], ['b1012', 'Boys Yr 10-12']]) {
      out.push({ role: 'quad', username: q[0], displayName: q[1] });
    }
  }
  return out;
}
function planCohortAccountLayoutClient(targetCohort, gradeMin, gradeMax, gradeWord, existing) {
  const targets = buildTargetAccountsClient(targetCohort, gradeMin, gradeMax, gradeWord);
  const existingUsernames = new Set(existing.map(u => (u.email || '').toLowerCase()));
  const targetUsernames = new Set(targets.map(t => t.username.toLowerCase()));
  const toCreate = targets.filter(t => !existingUsernames.has(t.username.toLowerCase()));
  const toDeactivate = existing
    .filter(u => (u.role === 'grade' || u.role === 'quad') && u.status === 'active' && !targetUsernames.has((u.email || '').toLowerCase()))
    .map(u => ({ id: u.id, username: u.email, displayName: u.displayName }));
  return { targetCohort, toCreate, toDeactivate };
}

async function previewCohortLayout(targetCohort) {
  try {
    const plan = await API.post('/accounts/cohort-layout/preview', { targetCohort });
    _showCohortLayoutPreview(targetCohort, plan);
  } catch (e) { toast(e.message); }
}

function _showCohortLayoutPreview(targetCohort, plan) {
  const label = targetCohort === 'none' ? 'Simple' : 'Complex';
  const rows = (items) => items.map(x => `<div class="li-sub">${esc(x.displayName)} <span style="color:var(--ink-faint)">(${esc(x.username)})</span></div>`).join('');
  let h = `<div class="mo-title">Apply ${label} account layout?</div>
    <div style="font-size:13px;color:var(--ink-mid);margin-bottom:12px">This only creates/deactivates grade &amp; quad Accounts — it never touches students, leaders or connections, and never deletes an account.</div>`;
  if (plan.toCreate.length) h += `<div class="sh">Accounts to create (${plan.toCreate.length})</div>${rows(plan.toCreate.map(t => ({ displayName: t.displayName, username: t.username })))}`;
  if (plan.toDeactivate.length) h += `<div class="sh" style="margin-top:8px">Accounts to deactivate (${plan.toDeactivate.length})</div>${rows(plan.toDeactivate)}`;
  if (!plan.toCreate.length && !plan.toDeactivate.length) h += `<div class="alert al-ok">Accounts already match this layout — nothing to do.</div>`;
  // Matched-by-username accounts whose actual grades/gender/quad have drifted from
  // what that username implies — this action never edits them (same "never
  // silently edit an account" rule as create/deactivate), so just flag it.
  if (plan.mismatched && plan.mismatched.length) {
    h += `<div class="alert al-warn" style="margin-top:8px">
      <strong>${plan.mismatched.length} existing account${plan.mismatched.length===1?'':'s'} may need a manual check</strong> —
      their username matches this layout, but their actual grades/gender/quad don't. They won't be
      changed by this action.
      ${plan.mismatched.map(m => `<div class="li-sub">${esc(m.displayName)} <span style="color:var(--ink-faint)">(${esc(m.username)}) — ${esc(m.reason)}</span></div>`).join('')}
    </div>`;
  }
  h += `<p style="font-size:13px;margin:14px 0 6px">Type <strong>APPLY</strong> to confirm:</p>
    <input class="fi" id="col-confirm" autocomplete="off" autocapitalize="characters"
      oninput="document.getElementById('col-go').disabled = this.value.trim().toUpperCase() !== 'APPLY'">
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-danger" id="col-go" style="flex:1" disabled onclick="_submitApplyCohortLayout('${targetCohort}')">Apply</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`;
  modal(h);
}

function _showCohortLayoutResult(report) {
  let h = `<div class="mo-title">Account layout applied</div>`;
  if (report.created.length) {
    h += `<div class="sh">New accounts — passwords shown once, save them now</div>`;
    h += report.created.map(c => `<div class="fg"><label class="fl">${esc(c.displayName)} (${esc(c.username)})</label><input class="fi" readonly value="${esc(c.password)}" onclick="this.select()"></div>`).join('');
  }
  if (report.deactivated.length) {
    h += `<div class="sh" style="margin-top:8px">Deactivated (${report.deactivated.length})</div>`;
    h += report.deactivated.map(d => `<div class="li-sub">${esc(d.displayName)} <span style="color:var(--ink-faint)">(${esc(d.username)})</span></div>`).join('');
  }
  if (!report.created.length && !report.deactivated.length) h += `<div class="alert al-ok">Nothing to change — accounts already matched this layout.</div>`;
  h += `<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="closeModal();renderAdminView(_adminData.settings,_adminData.users,_adminData.history)">Done</button>`;
  modal(h);
}

// Set a nested field in the setup draft (e.g. 'structure.cohortModel') and
// re-render so dependent UI (the orphaned-accounts warning, role-label rows)
// updates immediately.
function _setupSet(path, val) {
  if (!_setupDraft) _setupDraft = {};
  const parts = path.split('.');
  let o = _setupDraft;
  for (let i = 0; i < parts.length - 1; i++) {
    if (o[parts[i]] == null || typeof o[parts[i]] !== 'object') o[parts[i]] = {};
    o = o[parts[i]];
  }
  o[parts[parts.length - 1]] = val;
  _setupRerender();
}
function _setupSetNum(path, val) { const n = parseInt(val, 10); _setupSet(path, isNaN(n) ? 0 : n); }
// "Include Grade 6" toggle (bug 8 follow-up) replaces separate Lowest/Highest
// grade number fields — the highest grade is always 12, so this is really
// just gradeMin: 6 (kids-church intake included) vs 7 (the old default).
// Sets both fields in one go so there's only one re-render, not two.
function _setupSetGrade6(checked) {
  if (!_setupDraft) _setupDraft = {};
  if (!_setupDraft.structure) _setupDraft.structure = {};
  _setupDraft.structure.gradeMin = checked ? 6 : 7;
  _setupDraft.structure.gradeMax = 12;
  _setupRerender();
}
// Changing the Cohort model dropdown directly (not via the preset buttons
// above) auto-selects Director/Quad the same way the Complex/Simple presets
// do — Complex turns both on, Simple turns both off. Only touches those two
// role toggles, unlike pickMinistryPreset() which replaces the whole draft —
// an admin who's already customised branding/terminology shouldn't lose that
// just from flipping this one dropdown.
function _setupSetCohortModel(value) {
  if (!_setupDraft) _setupDraft = {};
  if (!_setupDraft.structure) _setupDraft.structure = {};
  _setupDraft.structure.cohortModel = value;
  if (!_setupDraft.roles) _setupDraft.roles = {};
  if (!_setupDraft.roles.enabled) _setupDraft.roles.enabled = {};
  const on = value !== 'none';
  _setupDraft.roles.enabled.director = on;
  _setupDraft.roles.enabled.quad = on;
  _setupRerender();
}
// Store a newline-separated textarea as a trimmed, non-empty string array
// (e.g. labels.groupNameStrip). _setupSet would otherwise store the raw string.
function _setupSetList(path, val) {

function copyDeployGuide() { copyText(_deployGuideText(_setupDraft || {}, _setupServiceMinAttendance)); }
function downloadDeployGuide() {
  const cfg = _setupDraft || {};

    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')) || 'ys-connection';

function _downloadText(filename, text) {
  try {
    const blob = new Blob([text], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
    toast('Downloaded');
  } catch (e) { toast('Could not download'); }
}

// Account modals
// Change 6: auto-suggest email (and, for grade accounts, display name) on
// account creation/edit. `_acctAutoEmail`/`_acctAutoName` track the last
// value WE wrote into each field — a field is only ever overwritten while
// its current value still equals that tracked value (or is empty), so a
// grade/gender change keeps a still-default username/name in sync but never
// clobbers a value the admin has since typed themselves (bug 1 + bug 3).
// showAddUser() resets both trackers to '' (nothing typed yet); showEditUser()
// seeds them from the existing account only when its stored email/displayName
// still match what this same logic would have generated for its current
// grades/gender — i.e. it looks like an untouched seed/auto-generated name.
let _acctAutoEmail = null;
let _acctAutoName = null;
function _acctSuggestedGradeEmail(grades, gender) {
  if (!grades || !grades.length) return '';
  return 'grade' + grades.slice().sort((a, b) => a - b).join('') + (gender === 'female' ? 'g' : gender === 'male' ? 'b' : '');
}
function _acctSuggestedGradeName(grades, gender) {
  if (!grades || !grades.length) return '';
  const g = grades.slice().sort((a, b) => a - b);
  return gradeBadgeLabel({ grades: g }) + (gender === 'female' ? ' Girls' : gender === 'male' ? ' Boys' : '');
}
function suggestEmail() {
  const role = document.getElementById('u-role')?.value;
  const emailEl = document.getElementById('u-email');
  const nameEl = document.getElementById('u-name');
  if (!emailEl) return;
  let suggestedEmail = '', suggestedName = '';
  if (role === 'grade') {
    const gs = [...document.querySelectorAll('.ugcb:checked')].map(el => parseInt(el.value, 10));
    const gender = document.getElementById('u-gender')?.value;
    suggestedEmail = _acctSuggestedGradeEmail(gs, gender);
    suggestedName = _acctSuggestedGradeName(gs, gender);
  } else if (role === 'quad') {
    const quad = document.getElementById('u-quad')?.value;
    if (quad) suggestedEmail = quad;
  } else if (role === 'director') {
    suggestedEmail = 'director';
  } else if (role === 'admin') {
    suggestedEmail = 'admin';
  }
  if (suggestedEmail && (emailEl.value === '' || emailEl.value === _acctAutoEmail)) emailEl.value = suggestedEmail;
  if (suggestedEmail) _acctAutoEmail = suggestedEmail;
  if (nameEl && suggestedName && (nameEl.value === '' || nameEl.value === _acctAutoName)) nameEl.value = suggestedName;
  if (suggestedName) _acctAutoName = suggestedName;
}

// Grade checkboxes for the account form (mirrors the leader-grades `gcb` UI, own
// class `ugcb` so the two don't collide). `sel` = pre-checked grades.
function _accGradeChecks(sel) {
  const set = new Set(sel || []);
  return _gradeList().map(g =>
    `<label style="display:inline-flex;align-items:center;gap:6px;margin:0 12px 5px 0"><input type="checkbox" value="${g}" class="ugcb" ${set.has(g)?'checked':''}> ${g}</label>`
  ).join('');
}

// Config-aware role <option>s: Admin always available; Director/Grade/Quad/
// Leader are opt-in per ministry (ministryConfig.roles.enabled, §5.2).
function _accRoleOptions(selected) {
  const en = (S.settings && S.settings.ministryConfig && S.settings.ministryConfig.roles && S.settings.ministryConfig.roles.enabled) || {};
  const roles = [];
  if (en.grade) roles.push('grade');
  if (en.quad) roles.push('quad');
  if (en.director) roles.push('director');
  roles.push('admin');
  if (en.leader) roles.push('leader');
  // Ensure the current role is present even if it's since been disabled.
  if (selected && !roles.includes(selected)) roles.unshift(selected);
  return roles.map(r => `<option value="${r}" ${r===selected?'selected':''}>${esc(_roleLabel(r))}</option>`).join('');
}
// Leader-record picker options for binding a junior-leader account.
let _accLeaders = [];
function _accLeaderOptions(selectedId) {
  return `<option value="">— Select a leader —</option>` +
    _accLeaders.map(l => `<option value="${l.id}" ${l.id===selectedId?'selected':''}>${esc(l.fullName)}</option>`).join('');
}

async function submitEditUser(id) {
  const displayName = document.getElementById('u-name')?.value?.trim();
  const email = document.getElementById('u-email')?.value?.trim();
  const role = document.getElementById('u-role')?.value;
  const grades = role==='grade' ? [...document.querySelectorAll('.ugcb:checked')].map(el=>parseInt(el.value,10)) : null;
  const gender = role==='grade' ? (document.getElementById('u-gender')?.value || null) : null;
  const quad = role==='quad' ? document.getElementById('u-quad')?.value : null;
  const leaderId = role==='leader' ? (document.getElementById('u-leader')?.value || null) : null;
  if (!displayName || !email) { document.getElementById('uerr').innerHTML='<div class="alert al-err">Name and username are required</div>'; return; }
  if (role==='grade' && (!grades || !grades.length)) { document.getElementById('uerr').innerHTML='<div class="alert al-err">Select at least one grade</div>'; return; }
  if (role==='grade' && !gender) { document.getElementById('uerr').innerHTML='<div class="alert al-err">Select a gender scope</div>'; return; }
  if (role==='leader' && !leaderId) { document.getElementById('uerr').innerHTML='<div class="alert al-err">Select the leader record this login is for</div>'; return; }
  try {
    const updated = await API.patch(`/accounts/users/${id}`, { displayName, email, role, grades, gender, quad, leaderId });
    Cache.del('/accounts/users');
    _adminData.users = _adminData.users.map(u => u.id === id ? updated : u);
    closeModal(); toast('Account updated');
    renderAdminView(_adminData.settings, _adminData.users);
  } catch (e) { document.getElementById('uerr').innerHTML=`<div class="alert al-err">${e.message}</div>`; }
}

  }
  const termList=[...terms.values()].sort((a,b)=>a.sort-b.sort).slice(-4);
  const lastIdx=termList.length-1;
  // Average days overdue in a given term cell (-1 = no follow-ups that term).
  const cellAvgOd=(c)=>(c&&c.done)?c.od/c.done:-1;
  const adminRows=[...admins.entries()].map(([nm,m])=>{
    const cells=termList.map(t=>m.get(t.key)||null);
    return {
      admin:nm,
      terms:cells,
      total:cells.reduce((s,c)=>s+((c&&c.done)||0),0),
      recentAvgOd:cellAvgOd(cells[lastIdx]),
    };
  }).filter(a=>a.total>0)
    // Most recent term first, by highest average days overdue down to lowest.
    .sort((a,b)=>b.recentAvgOd-a.recentAvgOd || b.total-a.total);
  return{terms:termList,admins:adminRows};
}

// ---------- model (SPA variant: rate-based personal trend; cohort groups) ----------
function trendOf(s){
  if(!s||!s.psT||!s.sT)return'stable';
  const d=s.sA/s.sT-s.psA/s.psT;
  return d>=0.20?'rising':d<=-0.20?'declining':'stable';
}
function scoreOf(stage,s,trend){
  if(!stage)return 0;
  const base=[0,10,30,55,75,90][stage];
  const cons=s&&s.sT>0?Math.round(10*s.sA/s.sT):0;
  const tm=trend==='rising'?5:trend==='declining'?-10:0;
  return Math.max(0,Math.min(100,base+cons+tm));
}
function model(){
  if(mdl)return mdl;restore();
  const students=D.students,rr=regR();
  const rate=(a,b)=>b>0?a/b:0;
  const marks=new Map();
  const mk=(k,nm)=>{let x=marks.get(k);if(!x){x={name:nm};marks.set(k,x);}return x;};
  // When a specific term is selected, filter connect/decision rows to that term's date range.
  // Undated rows are always included. Team rows have no dates — for a specific term, a team
  // member only counts toward stage 5 if they also attended in that term (see stage logic below).
  // Period bounds for connect/decision rows. A specific term uses its own range;
  // year-to-date ('ALL') bounds to the UNION of the audit's term dates — these CRM
  // exports carry the full submission history (prior-year rows, and even stray
  // future-dated entries like a mis-typed "decision date"), and without a bound the
  // YTD funnel counted all of them. Term views were already bounded; this makes YTD
  // consistent. Undated rows are still always included.
  const tObj=TERM!=='ALL'&&AUDIT?(AUDIT.terms||[]).find(t=>t.key===TERM):null;
  let pStart=null,pEnd=null;
  if(tObj){pStart=tObj.startDate;pEnd=tObj.endDate;}
  else if(AUDIT){for(const t of (AUDIT.terms||[])){if(t.startDate&&(pStart==null||t.startDate<pStart))pStart=t.startDate;if(t.endDate&&(pEnd==null||t.endDate>pEnd))pEnd=t.endDate;}}
  const inPeriod=d=>!d||pStart==null||(d>=pStart&&d<=pEnd);
  for(const r of st.uploads.team.rows){const k=norm(r.name);if(!k)continue;mk(k,r.name).team=true;}
  // Grade/gender (when the CRM export carries them) let an unmatched submitter
  // still be placed in a quad below — first value seen for a name wins.
  for(const r of st.uploads.connect.rows){const k=norm(r.name);if(!k||!inPeriod(r.date))continue;const x=mk(k,r.name);x.hasConnect=true;if(r.date&&(!x.connect||r.date<x.connect))x.connect=r.date;if(r.grade!=null&&x.grade==null)x.grade=r.grade;if(r.gender&&!x.gender)x.gender=r.gender;}
  for(const r of st.uploads.decision.rows){const k=norm(r.name);if(!k||!inPeriod(r.date))continue;const x=mk(k,r.name);x.hasDecision=true;if(r.date&&(!x.decision||r.date>x.decision))x.decision=r.date;if(r.grade!=null&&x.grade==null)x.grade=r.grade;if(r.gender&&!x.gender)x.gender=r.gender;}
  const byName=new Set(students.map(s=>norm(s.fn+' '+s.ln)));
  const people=[];
  for(const s of students){
    const k=norm(s.fn+' '+s.ln),x=marks.get(k)||{};
    // Team has no per-row dates: for a specific term, only count as team if they attended
    // in that term (sA or gA > 0). For YTD (TERM==='ALL') count all team members.
    const teamActive=x.team&&(TERM==='ALL'||(s.sA>0||s.gA>0));
    // Stage 5 requires the stage-4 criterion too (gA>0) — the ladder's own methodology
    // text says "each rung counts people at that stage OR BEYOND", so a team member not
    // currently in a lifegroup isn't "beyond" stage 4 and shouldn't inflate its count.
    // Without this, "Attended a lifegroup this period" (rung 4, and the Overview's
    // "In a lifegroup" tile which is gA>0-only) diverge by exactly the number of team
    // members who aren't currently in a lifegroup.
    const stage=(teamActive&&s.gA>0)?5:s.gA>0?4:(s.sT>0&&s.sA/s.sT>=rr)?3:s.sA>0?2:(x.hasConnect||x.hasDecision)?1:0;
    const trend=trendOf(s);
    people.push({id:s.id,name:s.fn+' '+s.ln,s,caOnly:false,stage,trend,score:scoreOf(stage,s,trend),connect:x.connect||null,decision:x.decision||null,conn:!!x.hasConnect,dec:!!x.hasDecision,team:!!x.team,quad:s.quad});
  }
  for(const[k,x]of marks){
    if(byName.has(k))continue;
    // No matching platform student means no gA to check, so — unlike the loop above —
    // there's no way to confirm a Team-roster name here is currently in a lifegroup.
    // Capped at 1 rather than an unverified 5, so this can never inflate rung 4 past
    // the "In a lifegroup" tile (which only ever sums matched students). `team` stays
    // true regardless, so the person-detail Journey popup still shows them as team.
    const stage=1;
    // Quad from the connect/decision export's own grade/gender columns, when
    // present — this is the only way to place an unmatched person in a quad.
    const quad=computeQuad(x.grade,x.gender);
    people.push({id:'cax-'+h32(k),name:x.name,s:null,caOnly:true,stage,trend:'stable',score:scoreOf(stage,null,'stable'),connect:x.connect||null,decision:x.decision||null,conn:!!x.hasConnect,dec:!!x.hasDecision,team:!!x.team,quad});
  }
  const rungs=[[1,'Interacted'],[2,'Came to '+L('service')],[3,'Regular'],[4,'Attended a '+L('smallGroup').toLowerCase()+' this period'],[5,'Student team']]
    .map(([n,lb])=>({n,lb,v:people.filter(p=>p.stage>=n).length}));
  // KPIs
  const act=students.filter(s=>s.sA>0).length;
  // "In a lifegroup" = attending one THIS term (gA>0). With the term split, gT>0
  // alone means the group merely ran for them this term (they may have attended
  // only last term), so it would over-count. Matches the gA>0 used elsewhere.
  const inLG=students.filter(s=>s.gA>0).length;
  const ss=sessSeries();
  const totalSvc=students.length?students[0].sT:0;
  const avgFri=ss.length?Math.round(ss.reduce((t,x)=>t+x.v,0)/ss.length):totalSvc?Math.round(students.reduce((t,s)=>t+s.sA,0)/totalSvc):0;
  const tv=students.filter(s=>s.psT>0);
  const svcD=Math.round((rate(tv.reduce((t,s)=>t+s.sA,0),tv.reduce((t,s)=>t+s.sT,0))-rate(tv.reduce((t,s)=>t+s.psA,0),tv.reduce((t,s)=>t+s.psT,0)))*100);
  const tg=students.filter(s=>s.pgT>0);
  const grpD=Math.round((rate(tg.reduce((t,s)=>t+s.gA,0),tg.reduce((t,s)=>t+s.gT,0))-rate(tg.reduce((t,s)=>t+s.pgA,0),tg.reduce((t,s)=>t+s.pgT,0)))*100);
  let actTrend='level';
  if(ss.length>=6){
    const f3=(ss[0].v+ss[1].v+ss[2].v)/3,l3=(ss[ss.length-3].v+ss[ss.length-2].v+ss[ss.length-1].v)/3;
    actTrend=l3-f3>=5?'rising':f3-l3>=5?'declining':'level';
  }
  const decisions=people.filter(p=>p.dec).length;
  // groups = 12 grade×gender cohorts (the API exposes no named lifegroups)
  const groups=[];
  for(const gender of['female','male'])for(let gr=7;gr<=12;gr++){
    const mem=students.filter(s=>s.grade===gr&&s.gender===gender&&s.gT>0);
    const enrolled=mem.length;
    const active=mem.filter(s=>s.gA>0).length;
    const va=active?+(mem.reduce((t,s)=>t+s.gA,0)/active).toFixed(1):0;
    const breadth=enrolled?active/enrolled:0;
    const weeksRun=enrolled?Math.max(0,...mem.map(s=>s.gT)):0;
    const pv=mem.filter(s=>s.pgT>0);
    let trend='stable',trendPct=0;
    if(pv.length){
      const cur=rate(pv.reduce((t,s)=>t+s.gA,0),pv.reduce((t,s)=>t+s.gT,0));
      const prev=rate(pv.reduce((t,s)=>t+s.pgA,0),pv.reduce((t,s)=>t+s.pgT,0));
      trendPct=Math.round((cur-prev)*100);
      trend=cur-prev>=0.20?'rising':prev-cur>=0.20?'declining':'stable';
    }
    const loose=enrolled>=10&&va<3&&trend==='stable';
    groups.push({id:'co-'+gr+(gender==='female'?'f':'m'),name:'Yr '+gr+' '+(gender==='female'?'Girls':'Boys'),grade:gr,gender,mem,enrolled,active,va,breadth,weeksRun,trend,trendPct,loose});
  }
  mdl={people,rungs,groups,kpis:{act,inLG,avgFri,svcD,grpD,actTrend,decisions}};
  return mdl;
}

// ---------- shell ----------
function tabs(page){
  const T=[['ca-overview','Overview'],['ca-funnel','Funnel'],['ca-groups',L('smallGroupPlural')],['ca-people','People'],['ca-data','Data']];
  return '<div class="ca-tabs">'+T.map(([id,lb])=>'<span class="ca-tab'+(page===id?' on':'')+'" onclick="go(\''+id+'\')">'+lb+'</span>').join('')+'</div>';
}
// A human label for the loaded scope, e.g. "2026 · T2 (in progress)" or
// "2026 · Year to date". Pairs the term ordinal with its year everywhere it's
// shown (titles, hub hero) so a slice is never ambiguous across years.
function scopeLabel(){
  if(!AUDIT)return'';
  const y=AUDIT_YEAR!=null?String(AUDIT_YEAR):'';
  if(TERM==='ALL')return (y?y+' · ':'')+'Year to date';
  const t=(AUDIT.terms||[]).find(x=>x.key===TERM);
  if(!t)return y;
  const ip=(AUDIT.perTerm[t.key]||{}).inProgress;
  return (y?y+' · ':'')+'T'+t.ordinal+(ip?' (in progress)':'');
}
// Unified scope bar: year picker + period (term) picker in one place, always
// visible on the analytical tabs. Year is inline pills when there are few
// audits, a <select> once there are many. Replaces the old term-only switcher
// (which never showed the year, so cross-year views looked identical).
function scopeBar(){
  if(!AUDIT)return'';

  const yrs=AUDIT_SUMMARIES||[];
  let yearCtl;
  if(yrs.length>4){
    const opts=yrs.map(y=>'<option value="'+y.year+'"'+(y.year===AUDIT_YEAR?' selected':'')+'>'+esc(String(y.year))+'</option>').join('');
    yearCtl='<select class="ca-scope-sel" onchange="CA.setYear(this.value)">'+opts+'</select>';
  }else if(yrs.length){
    yearCtl=yrs.map(y=>'<span class="ca-chip2'+(y.year===AUDIT_YEAR?' on':'')+'" onclick="CA.setYear('+y.year+')">'+esc(String(y.year))+'</span>').join('');
  }else{
    yearCtl='<span class="ca-chip2 on">'+esc(AUDIT_YEAR!=null?String(AUDIT_YEAR):'—')+'</span>';
  }
  let termCtl='<span class="ca-chip2'+(TERM==='ALL'?' on':'')+'" onclick="CA.setTerm(\'ALL\')">Year to date</span>';
  for(const t of terms){const ip=(AUDIT.perTerm[t.key]||{}).inProgress;termCtl+='<span class="ca-chip2'+(TERM===t.key?' on':'')+'" onclick="CA.setTerm(\''+t.key+'\')">T'+t.ordinal+(ip?' • live':'')+'</span>';}
  return '<div class="ca-scope">'
    +'<div class="ca-scope-row"><span class="ca-scope-lb">Year '+helpTip('This is a frozen snapshot from your last year-to-date upload, not live data. Re-upload in the Data tab to refresh it.')+'</span><div class="ca-scope-ctl">'+yearCtl+'</div></div>'
    +'<div class="ca-scope-row"><span class="ca-scope-lb">Period</span><div class="ca-scope-ctl">'+termCtl+'</div></div>'
    +'</div>';
}
function caShell(body,page){

function exportQuad(q){
  const m=model();
  const rows=[['Name',_gradeWord(),'Gender','Phone','Reason','Score']];
  for(const p of m.people){
    if(!p.s||p.s.quad!==q)continue;
    let reason=null;
    if(p.trend==='declining')reason='Declining attendance';
    else if(p.dec&&p.s.gT===0)reason='Decision, not in a lifegroup';
    else if(p.conn&&p.s.sA===0)reason='Connected, never attended';

  const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='followup-'+q+'-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);

// Stage an uploaded file into PENDING (not localStorage). saveAudit() then POSTs
// the whole staged set to /audits, where the server computes the terms.
function upload(kind,input){
  const f=input&&input.files&&input.files[0];if(!f)return;
  const isX=/\.xlsx?$/i.test(f.name);
  const rd=new FileReader();
  rd.onload=async e=>{
    let text=e.target.result;
    if(isX){
      try{text=rowsToCsv(await readXlsx(e.target.result));}
      catch(err){toast((err&&err.message)||'Could not read that Excel file');return;}
    }
    if(kind==='service'){
      if(parseGroupCSV(text)){toast('That looks like a '+L('smallGroup')+' export — use the '+L('smallGroup')+' slot');return;}
      const rows=parseCSV(text);
      if(!rows.length){toast('Could not read that as a '+L('service')+' attendance CSV');return;}
      PENDING.service={rows};PENDING._serviceFn=f.name;
      toast(rows.length+' '+L('service')+' rows staged');rerender();return;
    }
    if(kind==='group'){
      const grp=parseGroupCSV(text);
      if(!grp||!grp.groups.length){toast('Could not read that as a lifegroup attendance CSV');return;}
      PENDING.group=grp;PENDING._groupFn=f.name;
      toast(grp.groups.length+' lifegroups staged');rerender();return;
    }
    if(kind==='flows'){
      const frows=parseFlows(text);
      if(!frows||!frows.length){toast('Could not read that file — needs the People Flow export columns (Person, Status, Date Entered, Days in Step, Administrator)');return;}
      PENDING.flows=frows;PENDING._flowsFn=f.name;
      toast(frows.length+' rows · '+frows.filter(r=>r.step>=2&&r.step<=4).length+' step 2–4 records');rerender();return;
    }
    // For connect/decision try the matrix format (date-column headers, Y/N cells) first,
    // then fall back to the lean single-date-column format.
    let rows=kind!=='team'?parseMatrixRows(text,kind):null;
    if(!rows)rows=parseRows(text);
    if(!rows||!rows.length){toast('Could not read that file — needs a Name (or First/Last Name) column');return;}
    const seen=new Map();
    for(const r of rows){
      const k=norm(r.name);if(!k)continue;
      const p=seen.get(k);
      if(!p)seen.set(k,{name:r.name,date:r.date});
      else if(kind==='connect'&&r.date&&(!p.date||r.date<p.date))p.date=r.date;
      else if(kind==='decision'&&r.date&&(!p.date||r.date>p.date))p.date=r.date;
    }
    PENDING[kind]=[...seen.values()];PENDING['_'+kind+'Fn']=f.name;
    toast(PENDING[kind].length+' '+kind+' rows staged');rerender();
  };
  if(isX)rd.readAsArrayBuffer(f);else rd.readAsText(f);
}
// POST the staged uploads as one audit; the server computes terms + per-term
// aggregates and stores one row for that year (re-save overwrites the year).
async function saveAudit(){
  if(!PENDING.service){toast('Upload the year-to-date service CSV first');return;}
  // Team/Connect/Decision/Flows are separate CRM exports that don't change every
  // time attendance is refreshed. saveAudit() replaces the WHOLE year's audit
  // row, so a slot the admin didn't re-stage this time must fall back to what's
  // already stored for the currently-loaded year — otherwise a re-upload that
  // only touches Service/Group silently wipes Team/Connect/Decision to empty,
  // which collapses the "Interacted" funnel rung down to equal "Came to Youth"
  // (stage-1-only people come solely from these overlays' hasConnect/hasDecision
  // marks and unmatched caOnly names — see model() below).
  const carry=(kind)=>PENDING[kind].length?PENDING[kind]:((AUDIT&&AUDIT.uploads&&AUDIT.uploads[kind])||[]);
  try{
    const a=await API.post('/audits',{
      service:PENDING.service,
      group:PENDING.group||{groups:[]},
      team:carry('team'),connect:carry('connect'),decision:carry('decision'),flows:carry('flows'),
    },90000);
    auditInvalidate();
    await auditList();
    await auditLoad(a.year);
    PENDING={service:null,group:null,team:[],connect:[],decision:[],flows:[]};
    toast('Audit saved for '+a.year);
    await render('ca-overview');
  }catch(e){toast((e&&e.message)||'Save failed');}
}

// Public entry point: builds the deck for whichever term is currently active,
// or for `termOverride` ('ALL' or a specific AUDIT.terms[].key) when the Data
// tab's export-term picker is used — independent of the on-screen Year/Period
// scope bar. Temporarily swaps the module's term-scoped state, runs the
// (unchanged) deck body, then restores whatever was active before, so picking
// an export term never disturbs the rest of the screen.
async function buildDeck(termOverride){
  const prior=(termOverride!=null&&termOverride!==TERM)?{term:TERM,d:D,mdl:mdl,st:st}:null;
  if(prior){TERM=termOverride;D=null;mdl=null;st=null;await load(true);}
  try{ _buildDeckBody(); }
  finally{ if(prior){TERM=prior.term;D=prior.d;mdl=prior.mdl;st=prior.st;} }
}

// ---------- router ----------
function dispatch(p){
  if(p==='ca-funnel')rFunnel();
  else if(p==='ca-groups')rGroups();
  else if(p==='ca-people')rPeople();
  else if(p==='ca-data')rData();
  else{S.page='ca-overview';rOverview();}
}
async function render(p){
  if(!S.user||!['director','admin'].includes(S.user.role)){go('home');return;}
  // Ensure the audit list is known and a year is loaded (default: most recent).
  await auditList();
  if(!AUDIT&&AUDIT_SUMMARIES&&AUDIT_SUMMARIES.length){ await auditLoad(AUDIT_SUMMARIES[0].year); }
  await load(p==='ca-overview'||!D);
  restore();mdl=null;
  dispatch(p);
}
return{render,reset,stale,seedOn,dismissWarn,setYear,setTerm,saveAudit,
  model:async()=>{await load();restore();return model();},
  fquad,gfilter,lgfilter,fopen,flowStats,_parseFlows:parseFlows,pick,upload,showPerson,showGroup,showLgRoster,exportMenu,exportQuad,buildDeck,
  pq,pstage,pquad,pmore};
})();
window.CA=CA;
/* ── CA MODULE END ── */

async function boot() {
  const token = localStorage.getItem('yap_token');
  if (token) {
    try {
      const user = await API.get('/auth/me');
      // Mid-preview, mustChangePassword must stay forced false — /auth/me reads the
      // raw DB record, which doesn't know this is a preview session (see enterPreview()).
      S.user = _previewStash ? { ...user, mustChangePassword: false } : user;
    } catch { API.setToken(null); }
  }
  restoreConnectFilters();
  restoreArFilter();
  // GET /settings is public (auth:false) so the login screen can be themed
  // pre-auth too — fetch it regardless of login state, not just once signed in.
  try { S.settings = await API.get('/settings'); } catch { S.settings = {}; }
  if (S.settings && S.settings.ministryConfig) applyTheme(S.settings.ministryConfig);
  render();
}

boot();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(() => {
      // When a new SW activates and claims this page, reload to pick up the new HTML
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
    }).catch(() => {});
  });
}
