<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Content-Security-Policy: defence-in-depth alongside per-field HTML escaping.
     'unsafe-inline' is required because the whole app is inline <script>/<style>
     with onclick handlers; the value of CSP here is blocking EXTERNAL script/
     resource loading, base-uri hijacks and form-action exfiltration. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connection">
<meta name="theme-color" content="#1a1af2">
<link rel="manifest" href="/manifest.json">
<!-- iOS "Add to Home Screen" needs a raster PNG here; it can't rasterize the SVG for the
     installed tile and falls back to a page screenshot (white/black). -->
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<title>Youth Connection</title>
<style>
/* Display face — self-hosted Space Grotesk (geometric, echoes the YS logo).
   Single latin woff2; CSP-safe (font-src 'self'). Falls back to the system stack. */
@font-face{
  font-family:'Space Grotesk';
  font-style:normal;
  font-weight:500 700;
  font-display:swap;
  src:url('/fonts/space-grotesk-latin.woff2') format('woff2');
}
:root{
  /* Brand palette — matched to the YS logo (electric ultramarine) */
  --accent:#1a1af2;--accent-dark:#1111c9;--accent-light:#ececff;
  --navy:#0a0a2e;
  --danger:#ef4444;--danger-light:#fee2e2;--warn:#f59e0b;--warn-light:#fef3c7;
  --success:#10b981;--success-light:#d1fae5;
  --ink:#1f2937;--ink-mid:#647488;--ink-faint:#94a3b8;
  --paper:#f4f7fc;--paper-card:#ffffff;--paper-dark:#e8edf4;
  --line:#e8edf4;--chip:#ececff;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(18,35,59,.10),0 2px 4px rgba(0,0,0,.05);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-display:'Space Grotesk','Segoe UI',var(--font);
  /* Type scale — 8 steps, 11px legibility floor (no UI text below 11px) */
  --t-display:34px;--t-h1:24px;--t-h2:19px;--t-title:16px;
  --t-body:15px;--t-sm:13px;--t-label:12px;--t-micro:11px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
/* Top loading bar (#nprog): a thin accent bar that animates whenever a real network
   request is in flight (driven from API's r() via _npStart/_npDone, ported from the
   camp app's #nprog). Cached GETs never reach r(), so instant navigations don't flash
   the bar. Tune colour/height in this one rule.
   `top` defaults to 0 (pre-login, no shell yet) and is overridden inline by
   _positionNprog() to sit at the bottom edge of .hdr once the shell exists — matching
   the camp app, where the bar hugs the header instead of sitting at the literal top of
   the viewport (which put it in the notch/status-bar strip and made it barely visible). */
#nprog{position:fixed;top:0;left:0;height:3px;width:0;z-index:1000;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:0 2px 2px 0;opacity:0;transition:width .18s ease,opacity .3s ease,top .15s ease;pointer-events:none;box-shadow:0 0 8px rgba(26,26,242,.55)}
#nprog.on{opacity:1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* overflow-x here (and on body/#app/.pg below) MUST be 'clip', not 'hidden'. Per the CSS
   overflow spec, pairing overflow-x:hidden with an un-set overflow-y silently promotes the
   'visible' y-axis to 'auto' (a real box can't clip one axis while truly leaving the other
   unclipped/non-scrollable). That 'auto' makes html/body/#app/.pg each their OWN scroll
   container, which broke the persistent .hdr's position:sticky (its "nearest scroll
   ancestor" became #app instead of the real window scroller, and since #app's own
   scrollTop never moves — the outer window is what actually scrolls — the header just
   scrolled away with the page on every desktop screen instead of staying pinned).
   'clip' clips horizontal overflow the same as 'hidden' but never creates a scroll
   container, so overflow-y stays 'visible' and window is the sole scroller again, per
   the "Scroll handling" architecture note in CLAUDE.md. Don't revert to 'hidden' here. */
html{font-size:16px;-webkit-text-size-adjust:100%;overflow-x:clip;touch-action:pan-x pan-y;overscroll-behavior-y:contain}
@media(min-width:768px){html{font-size:17px}}
@media(min-width:1280px){html{font-size:18px}}
/* overscroll-behavior-y:contain on the window scroller stops the native pull-to-refresh/
   rubber-band bounce from dragging the whole page up/down past the sticky header and
   fixed bottom nav (camp app hit the same "screen dragging" bug — same fix, ported here
   since this SPA scrolls the window rather than a per-screen container). */
/* min-height:100dvh (with 100vh fallback) instead of a bare 100vh: on mobile, 100vh is
   pinned to the tallest possible viewport (URL bar hidden), so as the URL bar shows/hides
   while scrolling, the fixed .bot-nav (anchored to the actual visual viewport) could end up
   momentarily out of step with the body's assumed height, reading as the bottom nav "jumping
   up" mid-scroll. dvh tracks the live viewport instead — same fix/rationale as the camp
   platform's html,body{height:100dvh}. */
body{font-family:var(--font);color:var(--ink);background:var(--paper);min-height:100vh;min-height:100dvh;overflow-x:clip;overscroll-behavior-y:contain}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:100%;overflow-x:clip}

/* Header */
.hdr{background:linear-gradient(150deg,var(--accent) 0%,var(--navy) 130%);color:#fff;padding:var(--safe-t) 16px 0;box-sizing:border-box;display:flex;flex-direction:column;align-items:stretch;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,10,46,.28)}
.hdr h1{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-meta{display:flex;align-items:center;gap:10px}
.role-badge{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;text-transform:uppercase;white-space:nowrap}
.btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;flex-shrink:0}
.btn-icon:hover{background:rgba(255,255,255,.25)}
.notif-badge{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:#dc2626;color:#fff;font-size:10px;font-weight:800;line-height:17px;text-align:center;box-shadow:0 0 0 2px var(--navy)}
@media(min-width:768px){.hdr{padding:0 28px}.hdr-top{height:56px}.hdr h1{font-size:20px}}

/* SVG icons */
.ic-n,.ic-s,.ic-lg,.ic-xs{display:inline-block;vertical-align:middle;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ic-n{width:22px;height:22px}
.ic-s{width:16px;height:16px}
.ic-lg{width:32px;height:32px}
.ic-xs{width:12px;height:12px}

/* Desktop nav — wraps to max 2 rows; labels hidden below 1024px (icon-only) */
.desk-nav{display:none}
@media(min-width:768px){.desk-nav{display:flex;flex-wrap:wrap;gap:4px;padding:4px 0 10px;max-height:120px;overflow:hidden}}
.desk-nav a{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;white-space:nowrap}
.desk-nav a.on,.desk-nav a:hover{background:rgba(255,255,255,.2);color:#fff}
.desk-nav .ic-n{width:16px;height:16px}

/* Bottom nav */
.bot-nav{display:flex;background:var(--paper-card);border-top:1px solid var(--line);padding:6px 0 calc(6px + var(--safe-b));position:fixed;left:0;right:0;bottom:0;z-index:100;box-shadow:0 -2px 8px rgba(18,35,59,.06)}
.bot-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.01em;padding:4px 2px;cursor:pointer;transition:color .15s}
.bot-nav a.on{color:var(--accent)}
.bot-nav a .ic-n{transition:color .15s}
@media(min-width:768px){.bot-nav{display:none}}

/* Page */
.pg{flex:1;padding:14px 16px calc(76px + var(--safe-b));max-width:680px;margin:0 auto;width:100%;overflow-x:clip}
@media(min-width:768px){.pg{padding:20px 24px;max-width:1000px}}

/* Cards */
.card{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700}
.card-sub{font-size:12px;color:var(--ink-mid);margin-top:2px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--paper-card);border-radius:var(--radius-sm);box-shadow:var(--shadow);border:1px solid var(--line);padding:14px;text-align:center}
.stat-v{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-.01em;color:var(--navy);line-height:1}
.stat-l{font-size:11px;font-weight:700;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--paper-dark);color:var(--ink)}.btn-secondary:hover{background:#d1d5db}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:6px}
.btn-ghost{background:transparent;color:var(--ink-mid);padding:6px 8px}.btn-ghost:hover{background:var(--paper-dark);color:var(--ink)}
.btn-full{width:100%}

/* Forms */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--ink-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fi,.fs,.ft{width:100%;padding:11px 14px;border:1.5px solid var(--paper-dark);border-radius:var(--radius-sm);font-size:15px;color:var(--ink);background:var(--paper-card);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.help-text{font-size:12px;color:var(--ink-faint);margin-top:4px}

/* List items */
.li{background:var(--paper-card);border-radius:var(--radius);border:1px solid var(--line);padding:13px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:box-shadow .15s,transform .12s}
.li:hover{box-shadow:var(--shadow-md)}.li:active{transform:scale(.985)}
.li-body{flex:1;min-width:0}
.li-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--ink-mid);margin-top:2px}
.li-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;line-height:1.5;white-space:nowrap}
.c-accent{background:var(--accent-light);color:var(--accent-dark)}
.c-neutral{background:var(--paper-dark);color:var(--ink-mid)}
.c-success{background:var(--success-light);color:#065f46}
.c-warn{background:var(--warn-light);color:#92400e}
.c-danger{background:var(--danger-light);color:#991b1b}
.quad-g79{background:#fce7f3;color:#9d174d}
.quad-b79{background:#dbeafe;color:#1e40af}
.quad-g1012{background:#f3e8ff;color:#6d28d9}
.quad-b1012{background:#d1fae5;color:#065f46}
.risk-stopped{color:#7f1d1d;background:#fee2e2}
.risk-atrisk{color:#92400e;background:#fef3c7}
.risk-declining{color:#1e3a5f;background:#dbeafe}
.risk-watch{color:#365314;background:#d9f99d}
.risk-regular{color:#065f46;background:#d1fae5}
.risk-new{color:#4c1d95;background:#ede9fe}

/* Leader chips */
.lc{display:inline-flex;align-items:center;gap:3px;padding:3px 10px 3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent-dark);font-size:12px;font-weight:600;border:1px solid rgba(37,99,235,.2);margin:2px}
.lc .rm{padding:0 2px;cursor:pointer;opacity:.6;font-size:14px;line-height:1}.lc .rm:hover{opacity:1;color:var(--danger)}

/* Progress */
.pb{height:6px;background:var(--paper-dark);border-radius:3px;overflow:hidden;margin-top:5px}
.pb-f{height:100%;border-radius:3px;transition:width .3s}
.fill-g{background:var(--success)}.fill-a{background:var(--warn)}.fill-r{background:var(--danger)}

/* Page headers */
.ph{margin-bottom:16px}
.ph-title{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.02em}
.ph-sub{font-size:14px;color:var(--ink-mid);margin-top:4px}

/* Section headers */
.sh{font-size:11px;font-weight:700;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--paper-dark)}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(--ink-mid)}
.empty-icon{width:48px;height:48px;margin:0 auto 12px;opacity:.35;display:block;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-title{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;color:var(--ink-faint);margin-top:6px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(8,14,25,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.mo{align-items:center;padding:24px}}
/* Elvanto export guide — full-screen step viewer (Import screen + Connection Audit data tab) */
.eg-wrap{position:fixed;inset:0;background:rgba(8,14,25,.62);z-index:210;display:none;align-items:center;justify-content:center;padding:12px}
.eg-wrap.show{display:flex}
.eg-card{background:var(--paper-card);border-radius:var(--radius);width:100%;max-width:760px;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden}
.eg-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px 10px;flex-shrink:0}
.eg-hd .t{font-weight:800;color:var(--ink);font-size:16px}
.eg-x{border:none;background:var(--paper-dark);color:var(--ink-mid);width:32px;height:32px;border-radius:50%;cursor:pointer;flex-shrink:0;display:grid;place-items:center}
.eg-body{padding:0 16px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;flex:1}
.eg-step{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.eg-cap{font-size:13px;color:var(--ink-mid);margin-bottom:10px;line-height:1.5}
.eg-note{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:10px 12px;font-size:12.5px;color:#92400e;margin-bottom:10px;line-height:1.5}
.eg-imgwrap{border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;cursor:zoom-in}
.eg-imgwrap img{display:block;width:100%}
.eg-imgwrap.zoom{overflow-x:auto;cursor:zoom-out;-webkit-overflow-scrolling:touch}
.eg-imgwrap.zoom img{width:220%;max-width:none}
.eg-zoomhint{font-size:11px;color:var(--ink-faint);text-align:center;margin-bottom:8px}
.eg-ft{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px calc(12px + var(--safe-b));border-top:1px solid var(--line);flex-shrink:0}
.eg-ft .btn{min-width:88px}
.eg-ft button:disabled{opacity:.35;pointer-events:none}
.eg-dots{display:flex;gap:6px}
.eg-dots i{width:8px;height:8px;border-radius:999px;background:var(--paper-dark);display:block;transition:.15s}
.eg-dots i.on{background:var(--accent);width:20px}
.mo-box{background:var(--paper-card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:94vh;overflow-y:auto;padding:18px 18px max(18px,env(safe-area-inset-bottom));animation:rise .2s}
@media(min-width:768px){.mo-box{border-radius:var(--radius)}}
.mo-handle{width:40px;height:4px;background:var(--paper-dark);border-radius:2px;margin:0 auto 16px}
.mo-title{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em;margin-bottom:16px}

/* Filters */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.fc{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--paper-dark);background:var(--paper-card);color:var(--ink-mid);cursor:pointer;transition:all .15s}
.fc.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Search */
.sbar{position:relative;margin-bottom:12px}
.sbar input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--paper-dark);border-radius:var(--radius-sm);font-size:15px;background:var(--paper-card);outline:none;transition:border-color .15s}
.sbar input:focus{border-color:var(--accent)}
.sbar .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint);pointer-events:none}
.ph-search{flex:0 1 170px;min-width:130px;padding:7px 10px;border:1.5px solid var(--paper-dark);border-radius:var(--radius-sm);font-size:14px;background:var(--paper-card);outline:none;transition:border-color .15s}
.ph-search:focus{border-color:var(--accent)}

/* Alerts */
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.al-err{background:var(--danger-light);color:#991b1b}
.al-ok{background:var(--success-light);color:#065f46}
.al-info{background:var(--accent-light);color:var(--accent-dark)}
.al-warn{background:var(--warn-light);color:#92400e}

/* Login */
.login-pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(150deg,var(--accent) 0%,var(--navy) 130%)}
.login-card{background:#fff;border-radius:var(--radius);padding:28px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .icon{display:flex;justify-content:center;margin-bottom:8px;color:var(--navy)}
.login-badge{width:74px;height:74px;border-radius:20px;background:linear-gradient(150deg,var(--accent),var(--navy));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 10px 24px rgba(26,26,242,.32)}
.login-logo h1{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.01em}
.login-logo p{font-size:13px;color:var(--ink-mid);margin-top:4px}

/* Inline action-feedback spinner (Import parsing/reading messages).
   Page-navigation loading no longer gets its own spinner placeholder — the #nprog top
   bar (now correctly positioned at the header's bottom edge) is the sole indicator for
   that, so the content area just stays put/empty until data arrives. */
.spin{width:20px;height:20px;border:2.5px solid var(--paper-dark);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Respect reduced-motion: keep the spinner (it conveys loading state) but drop
   decorative transitions/animations. */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:.001ms!important;animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}
  .spin{animation-duration:.6s!important;animation-iteration-count:infinite!important}
}

/* Toast */
#toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;pointer-events:none;opacity:0;transition:all .22s;z-index:300;white-space:nowrap;max-width:92vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:24px}}

/* Desktop table */
@media(min-width:768px){
  .dt{width:100%;border-collapse:collapse;font-size:14px}
  .dt th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--paper-dark);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:700}
  .dt td{padding:10px 12px;border-bottom:1px solid var(--paper-dark);vertical-align:middle}
  .dt tr:hover td{background:var(--paper)}
}

/* Responsive */
.mob{display:block}.desk{display:none}
@media(min-width:768px){.mob{display:none}.desk{display:block}}

/* Quad overview cards */
.qcard{background:var(--paper-card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
/* Generic collapsible: contents are rendered up-front but hidden, and toggled in
   the DOM (no page re-render). Direct-child selectors so nesting works. */
.drop > .drop-body{display:none}
.drop.open > .drop-body{display:block}
.drop-chev{display:inline-block;transition:transform .2s}
.drop.open > .drop-head .drop-chev{transform:rotate(90deg)}
.qcard.drop.open{grid-column:1/-1;max-width:480px;width:100%}
.qcard.g79{border-color:#ec4899}.qcard.b79{border-color:#3b82f6}
.qcard.g1012{border-color:#8b5cf6}.qcard.b1012{border-color:#10b981}

/* Student detail */
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--paper-dark);font-size:14px}
.detail-lbl{color:var(--ink-mid);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.detail-val{font-weight:600}

/* Tab bar */
.tbbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.tbbar::-webkit-scrollbar{display:none}
.tbbtn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink-mid);background:var(--paper-card);border:1.5px solid var(--paper-dark);cursor:pointer}
.tbbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Audit timeline */
.audit-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--paper-dark)}
.audit-entry:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.audit-body{flex:1;min-width:0}
.audit-who{font-size:12px;color:var(--ink-mid);margin-top:2px}
.audit-detail{font-size:13px;color:var(--ink-mid);margin-top:3px}

/* Destructive section */
.destructive-section{border:2px solid var(--danger);border-radius:var(--radius-sm);padding:14px;margin-top:10px}
.destructive-header{color:#991b1b;font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Lock banner */
.lock-banner{background:var(--warn-light);border:1.5px solid var(--warn);color:#92400e;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ── SCALE-READY CONNECTION CARDS ── */
.connect-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:540px){.connect-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.connect-grid{grid-template-columns:repeat(3,1fr)}}
.connect-leader{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;position:relative;transition:box-shadow .15s;min-width:0;overflow:hidden}
.connect-leader:hover{box-shadow:var(--shadow-md)}
.connect-leader-name{font-size:16px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.connect-leader-meta{font-size:12px;color:var(--ink-mid);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.connect-count-bar{height:8px;background:var(--paper-dark);border-radius:4px;overflow:hidden;margin-bottom:6px}
.connect-count-fill{height:100%;border-radius:4px;transition:width .3s}
.connect-add-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--accent-light);color:var(--accent-dark);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:background .15s;text-align:center}
.connect-add-btn:hover{background:#c7d2fe}
.connect-add-btn:disabled{opacity:.45;cursor:not-allowed}
/* A native scrollbar only flashes during an active touch drag on phones (OS-level
   overlay-scrollbar behavior that CSS can't override), so this preview draws its own
   always-visible track/thumb (sized in _syncConnectThumb) instead of relying on one. */
.connect-students-wrap{position:relative;margin-top:12px}
.connect-students{border-top:1px solid var(--paper-dark);padding:10px 10px 0 0;max-height:126px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.connect-students::-webkit-scrollbar{display:none}
.connect-students-track{position:absolute;top:11px;right:0;bottom:1px;width:3px;background:var(--paper-dark);border-radius:2px;pointer-events:none}
.connect-students-thumb{position:absolute;left:0;width:3px;background:rgba(100,116,139,.55);border-radius:2px}
.connect-stud-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--paper-dark)}
.connect-stud-row:last-child{border-bottom:none}
.connect-stud-name{flex:1;font-size:14px;font-weight:600}
.connect-stud-meta{font-size:11px;color:var(--ink-mid)}

/* ── STUDENT PICKER MODAL ── */
.mo-box.picker{max-width:640px;max-height:96vh}
/* Top-anchored, keyboard-safe picker: a flex column whose middle list scrolls so
   the search stays at the top and the Done button stays visible at the bottom.
   The box height is pinned to the visible viewport in JS (_sizePicker). */
.mo.mo-top{align-items:flex-start;padding-top:max(env(safe-area-inset-top,0px),34px)}
.mo-box.pflex{display:flex;flex-direction:column;border-radius:18px;margin:0 8px}
.mo-box.pflex .mo-handle,.mo-box.pflex .mo-title,.mo-box.pflex .picker-search,.mo-box.pflex .picker-done{flex:0 0 auto}
.mo-box.pflex #picker-list{flex:1 1 auto;min-height:0}
.picker-done{padding-top:10px;margin-top:4px;border-top:1px solid var(--paper-dark)}
.picker-search{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--accent);border-radius:var(--radius-sm);font-size:16px;outline:none;background:var(--paper-card);margin-bottom:10px}
.picker-list{overflow-y:auto;max-height:calc(96vh - 200px)}
.picker-item{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;min-height:60px}
.picker-item:hover,.picker-item:focus{background:var(--accent-light);outline:none}
.picker-item.assigned{background:var(--success-light);cursor:default}
.picker-item-name{font-size:15px;font-weight:600;color:var(--ink)}
.picker-item-meta{font-size:12px;color:var(--ink-mid);margin-top:1px}
.picker-item-right{margin-left:auto;flex-shrink:0}
.picker-section{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px;border-bottom:1px solid var(--paper-dark)}

/* ── ACCESSIBILITY ── */
.fc:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.picker-item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* ── UNDO TOAST ── */
#undo-toast{position:fixed;bottom:calc(84px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:#1e293b;color:#fff;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:500;pointer-events:all;opacity:0;transition:all .22s;z-index:301;display:flex;align-items:center;gap:12px;white-space:nowrap;max-width:92vw}
#undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#undo-toast button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
#undo-toast button:hover{background:rgba(255,255,255,.35)}
@media(min-width:768px){#undo-toast{bottom:32px}}

/* ── ROLE BADGE TOOLTIP ── */
.role-badge{position:relative;cursor:help}
.role-badge::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);right:0;background:#1e293b;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;font-weight:400;text-transform:none;letter-spacing:0;z-index:200}
.role-badge:hover::after{opacity:1}

/* ── FIRST-RUN CARD ── */
.first-run{background:linear-gradient(135deg,var(--accent-light),#eff6ff);border-radius:var(--radius);padding:20px;margin-bottom:20px;border:1px solid rgba(37,99,235,.2)}
.first-run h3{font-size:16px;font-weight:800;margin-bottom:10px;color:var(--accent-dark)}
.first-run-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.first-run-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── MY LEADERS WIDGET ── */
.my-leaders-card{background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.ml-leader-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--paper-dark)}
.ml-leader-row:last-child{border-bottom:none}
.ml-count-badge{background:var(--accent-light);color:var(--accent-dark);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;flex-shrink:0}
.ml-count-badge.warn{background:var(--warn-light);color:#92400e}

/* ── ADMIN ROLE GROUP ── */
.role-group{margin-bottom:16px}
.role-group-header{font-size:10px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.8px;padding:6px 0 8px;border-bottom:1px solid var(--paper-dark);margin-bottom:8px}

/* ── TRENDS ── */
.cchart{display:flex;align-items:flex-end;gap:3px;height:92px;margin:8px 0}
.ccol{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.ccol-val{font-size:9px;font-weight:700;color:var(--ink-mid);margin-bottom:2px;white-space:nowrap}
.ccol-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;background:var(--accent)}
.ccol-bar.lo{background:var(--warn)}.ccol-bar.cr{background:var(--danger)}
.ccol-lbl{font-size:9px;color:var(--ink-faint);margin-top:3px;white-space:nowrap}
.tbar-wrap{display:flex;flex-direction:column;gap:4px}
.tbar-row{display:flex;align-items:center;gap:8px}
.tbar-lbl{width:28px;text-align:right;color:var(--ink-mid);font-weight:700;flex:none;font-size:11px}
.tbar-track{flex:1;height:8px;background:var(--paper-dark);border-radius:4px;overflow:hidden}
.tbar-fill{height:100%;border-radius:4px;background:var(--accent)}
.tbar-fill.low{background:var(--warn)}.tbar-fill.crit{background:var(--danger)}
.tbar-val{width:36px;text-align:right;font-size:11px;font-weight:700;color:var(--ink-mid)}
.tr-up{background:var(--success-light);color:#065f46;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}
.tr-dn{background:var(--danger-light);color:#991b1b;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}
.tr-st{background:var(--paper-dark);color:var(--ink-mid);border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}
.tstat{display:grid;gap:6px;margin-top:10px}
.tstat-cell{text-align:center;padding:10px 6px;background:var(--paper);border-radius:var(--radius-sm)}
.tstat-v{font-size:1.5rem;font-weight:800;color:var(--ink);line-height:1}
.tstat-l{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.tstat-p{font-size:10px;color:var(--ink-faint);opacity:.6;margin-top:3px}

/* ── TWO-LINE NAV LABEL ── */
.ni-lbl{display:flex;flex-direction:column;align-items:center;line-height:1.15}

/* ── Reusable help tooltip (?) — hover on desktop, tap on mobile. Ported from
   the Camp Platform sister app. Use helpTip('plain text') in any markup. ── */
.htip{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1px solid var(--accent);background:var(--chip);color:var(--accent);font-size:11px;font-weight:800;line-height:1;cursor:pointer;position:relative;padding:0;font-family:inherit;vertical-align:middle;flex:0 0 auto}
.htip-pop{position:absolute;z-index:200;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:max-content;max-width:240px;background:var(--navy);color:#fff;border-radius:10px;padding:9px 11px;font-size:.74rem;line-height:1.45;font-weight:500;text-align:left;box-shadow:0 10px 28px rgba(10,10,46,.32);opacity:0;visibility:hidden;transition:opacity .12s;white-space:pre-line}
.htip-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:var(--navy)}
.htip:hover .htip-pop,.htip.open .htip-pop{opacity:1;visibility:visible}
.htip.tip-left .htip-pop{left:auto;right:0;transform:none}
.htip.tip-left .htip-pop::before{left:auto;right:6px;transform:none}

/* ── CA MODULE CSS START ── */
:root{--ca-navy:#0a0a2e;--ca-blue:#1a1af2;--ca-teal:#0ea5a4;--ca-amber:#f59e0b;--ca-rose:#e11d48;--ca-green:#16a34a;--ca-paper:#f4f7fc;--ca-card:#fff;--ca-ink:#1f2937;--ca-muted:#647488;--ca-line:#e8edf4;--ca-chip:#ececff;--ca-r:14px;--ca-rs:11px;--ca-sh:0 3px 10px rgba(10,10,46,.06);}

.ca-tile{background:var(--ca-card);border:1px solid var(--ca-line);border-radius:var(--ca-r);padding:13px 8px;min-height:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:var(--ca-sh);cursor:pointer}
.ca-tile .tic{display:flex;justify-content:center;margin-bottom:6px}.ca-tile .tic svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ca-tile .tl{font-size:.74rem;font-weight:700;color:var(--ca-navy)}

.ca-tabs{display:flex;gap:5px;overflow-x:auto;margin:0 0 12px;-webkit-overflow-scrolling:touch}
.ca-tab{flex:none;background:var(--ca-card);border:1px solid var(--ca-line);border-radius:999px;padding:7px 10px;font-size:.62rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--ca-muted);cursor:pointer}
.ca-tab.on{background:var(--ca-navy);border-color:var(--ca-navy);color:#fff}
/* Scope bar (year + period) — a filled "data scope" control, deliberately

.ca-scope{background:var(--ca-chip);border:1px solid var(--ca-line);border-radius:var(--ca-rs);padding:8px 10px;margin:0 0 12px;display:flex;flex-direction:column;gap:7px}
.ca-scope-row{display:flex;align-items:center;gap:8px}
.ca-scope-lb{flex:none;width:42px;font-size:.52rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ca-muted)}
.ca-scope-ctl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ca-chip2{flex:none;background:var(--ca-card);border:1px solid var(--ca-line);border-radius:999px;padding:4px 11px;font-size:.66rem;font-weight:700;color:var(--ca-muted);cursor:pointer;white-space:nowrap}
.ca-chip2.on{background:var(--ca-blue);border-color:var(--ca-blue);color:#fff}
.ca-scope-sel{border:1px solid var(--ca-line);border-radius:7px;padding:4px 8px;font-size:.72rem;font-weight:700;color:var(--ca-ink);background:var(--ca-card)}
.ca-ct{font-size:.78rem;font-weight:800;margin-bottom:9px}
.ca-dlt{font-size:.6rem;font-weight:800;margin-top:3px}
.ca-dlt.up{color:var(--ca-green)}.ca-dlt.dn{color:var(--ca-rose)}.ca-dlt.fl{color:var(--ca-muted)}
.ca-lrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ca-lname{width:96px;font-size:.6rem;font-weight:700;color:var(--ca-muted);text-align:right;flex:none}
.ca-lbar{flex:1;height:16px;background:var(--ca-paper);border-radius:6px;overflow:hidden}
.ca-lfill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:.56rem;font-weight:800;min-width:24px}
.ca-alr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--ca-line);cursor:pointer}
.ca-alr:last-child{border-bottom:none}
.ca-fw{display:flex;flex-direction:column;align-items:center;padding:4px 0}
.ca-fseg{border-radius:9px;color:#fff;text-align:center;padding:9px 6px 8px;box-shadow:0 4px 10px rgba(18,35,59,.18)}
.ca-fv{font-size:1.05rem;font-weight:800;line-height:1}
.ca-fn{font-size:.56rem;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ca-fpill{background:var(--ca-card);border:1px solid var(--ca-line);border-radius:999px;font-size:.56rem;font-weight:700;color:var(--ca-muted);padding:3px 10px;margin:5px 0;box-shadow:var(--ca-sh)}
.ca-fpill b{color:var(--ca-ink)}
.ca-fpill.leak{border-color:#f5b5b1;background:#fff5f5;color:#b91c1c}
.ca-fpill.leak b{color:#b91c1c}
.ca-gb{height:7px;background:var(--ca-paper);border-radius:999px;overflow:hidden;margin-top:7px}
.ca-gbf{height:100%;border-radius:999px}
.ca-fch{display:flex;gap:6px;margin:0 0 11px;align-items:center;flex-wrap:wrap}
.ca-sel{width:auto;padding:7px 10px;font-size:.72rem}
.ca-scr{font-size:.95rem;font-weight:800;color:var(--ca-navy);flex:none;text-align:center}
.ca-scr small{display:block;font-size:.5rem;font-weight:700;color:var(--ca-muted);text-transform:uppercase}
.ca-uslot{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--ca-line)}
.ca-uslot:last-child{border-bottom:none}
.ca-uic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;font-size:15px;font-weight:800}.ca-uic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ca-uic.ok{background:#e7f7ec;color:#15803d}
.ca-uic.wn{background:#fef3c7;color:#92660b}
.ca-usl{flex:1;min-width:0}
.ca-ust{font-size:.78rem;font-weight:700}

.ca-warnb{position:sticky;bottom:78px;background:#fffaf0;border:1px solid #fbd38d;border-left:4px solid var(--ca-amber);border-radius:12px;padding:9px 11px;font-size:.66rem;color:#7a5a10;display:flex;gap:8px;align-items:flex-start;box-shadow:0 6px 18px rgba(18,35,59,.14);margin-top:14px;z-index:90}

.ca-warnb .ca-wi{flex:none;font-size:.8rem;line-height:1}

@media(min-width:768px){.ca-warnb{bottom:12px}}
/* ── CA MODULE CSS END ── */

<script>
// Top loading bar (#nprog) driver — reference-counted so overlapping fetches (e.g. a
// parallel Promise.all) hold the bar until the LAST one finishes. Creeps toward 90%
// while in flight, then snaps to 100% and fades. Only real network requests call this
// (from API's r()); a Cache hit in API.get returns before ever calling r(), so cached
// navigations never flash the bar. Ported from the camp app's #nprog driver.
let _npCount = 0, _npTimer = null, _npVal = 0, _npFadeTimer = null, _npResetTimer = null;
function _npStart() {
  _npCount++;
  if (_npCount > 1) return;
  const el = document.getElementById('nprog'); if (!el) return;

// ============================================================
// API ADAPTER
// ============================================================
const API = (() => {
  // The session token is kept in localStorage (sent as a Bearer header). This is
  // an accepted risk: the XSS vector that could read it is closed by escaping all
  // user-supplied fields (see esc()) plus the page CSP. If that ever changes,
  // move to an httpOnly cookie. (See CLAUDE.md → Security notes.)
  let _t = localStorage.getItem('yap_token') || null;
  const hdr = () => ({ 'Content-Type': 'application/json', ...(_t ? { Authorization: `Bearer ${_t}` } : {}) });
  async function r(method, path, body, timeoutMs) {
    _npStart();
    const ac = new AbortController();
    const timer = setTimeout(() => ac.abort(new Error('Request timed out')), timeoutMs || 25000);
    try {
      const res = await fetch(path, { method, headers: hdr(), signal: ac.signal, ...(body !== undefined ? { body: JSON.stringify(body) } : {}) });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        const err = new Error(e.message || e.error || res.statusText || 'Request failed');
        err.status = res.status;
        throw err;
      }
      return res.json();
    } finally {
      clearTimeout(timer);
      _npDone();
    }
  }
  const _inflight = new Map();
  return {
    setToken(t) { _t = t; t ? localStorage.setItem('yap_token', t) : localStorage.removeItem('yap_token'); },
    get token() { return _t; },
    get: (p) => {
      const cached = Cache.get(p);
      if (cached !== null) return Promise.resolve(cached);
      if (_inflight.has(p)) return _inflight.get(p);
      // A 503 here is the server's own request-timeout guard (a slow/cold DB connection
      // acquisition, not a real data or permission error) — explicitly retryable, and a
      // retry right after almost always succeeds. Retry once, transparently, before
      // surfacing a failure (GET only: safe to retry since reads are idempotent).
      const promise = r('GET', p)
        .catch(err => (err.status === 503 ? r('GET', p) : Promise.reject(err)))
        .then(data => { Cache.set(p, data); _inflight.delete(p); return data; })
        .catch(err => { _inflight.delete(p); throw err; });
      _inflight.set(p, promise);
      return promise;
    },
    post: (p, b, timeoutMs) => r('POST', p, b, timeoutMs),
    patch: (p, b) => r('PATCH', p, b),
    del: (p) => r('DELETE', p),
  };
})();

// ============================================================
// DATA CACHE (30-second TTL — makes back-navigation instant)
// ============================================================
const Cache = (() => {
  const store = new Map();
  const TTL = 30_000;
  return {
    get(key) {
      const e = store.get(key);
      return (e && Date.now() - e.ts < TTL) ? e.data : null;
    },
    // Last-known value ignoring the TTL — powers stale-while-revalidate on Home so a
    // lapsed cache paints instantly instead of blocking on a (possibly cold) re-fetch.
    getStale(key) { const e = store.get(key); return e ? e.data : null; },
    set(key, data) { store.set(key, { data, ts: Date.now() }); },
    del(...keys) { for (const k of keys) { for (const sk of store.keys()) { if (sk === k || sk.startsWith(k + '/')) store.delete(sk); } } },
    clear() { store.clear(); },
  };
})();

// Format a phone number with a space after the 4th and 7th digit (e.g. 0412 345 678).
// Normalizes AU mobiles that lost their leading 0 to spreadsheet numeric coercion in

// gets "0" prefixed. Ported from the camp app's fmtPhone (public/index.html ~1275).
function fmtPhone(p) {

  if (!d) return '';
  if (d.length === 11 && d.startsWith('61')) d = '0' + d.slice(2);
  else if (d.length === 9 && d.startsWith('4')) d = '0' + d;
  if (d.length <= 4) return d;
  if (d.length <= 7) return d.slice(0, 4) + ' ' + d.slice(4);
  return d.slice(0, 4) + ' ' + d.slice(4, 7) + ' ' + d.slice(7);

}
// A student is "rising" if their service OR lifegroup rate improved by >=20
// points vs last term (needs data in both terms to judge).
function isRising(s) {
  const up = (a, t, pa, pt) => (t > 0 && pt > 0) && ((a / t) - (pa / pt) >= 0.20);
  return up(s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal)
      || up(s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal);
}
// Attended at least one service OR lifegroup in the current OR previous term.
// Students who never attended are hidden from the quick-add picker (still
// searchable) and excluded from the connected/unconnected counts.
function _hasAttended(s) {
  return (s.svcAttended > 0) || (s.grpAttended > 0) || (s.prevSvcAttended > 0) || (s.prevGrpAttended > 0);
}
// ── Dynamic per-stream qualifier (this term vs last term) ──
// 'rising'  = rate up >=20pts vs last term
// 'declining' = rate down >=20pts vs last term
// 'stopped' = attended 0 this term (>=3 sessions/weeks to judge)
// 'steady'/'none' = no qualifier.
function _streamQual(curA, curT, prevA, prevT) {
  if (curT < 1) return 'none';
  if (curT >= 3 && curA === 0) return 'stopped';
  if (prevT >= 1) {
    const d = curA / curT - prevA / prevT;
    if (d >= 0.20) return 'rising';
    if (d <= -0.20) return 'declining';
  }
  return 'steady';
}
// Overall category: stopped (neither stream this term) / mixed (one up + one
// down) / rising / declining / stable.
function attendQual(s) {
  const svcQ = _streamQual(s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal);
  const grpQ = _streamQual(s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal);
  const enough = (s.svcTotal >= 3) || (s.grpTotal >= 3);
  const stoppedBoth = enough && s.svcAttended === 0 && s.grpAttended === 0;
  let category;
  if (stoppedBoth) category = 'stopped';
  else {
    const up = svcQ === 'rising' || grpQ === 'rising';
    const down = svcQ === 'declining' || svcQ === 'stopped' || grpQ === 'declining' || grpQ === 'stopped';
    category = (up && down) ? 'mixed' : up ? 'rising' : down ? 'declining' : 'stable';
  }
  return { svcQ, grpQ, category };
}
const _QUAL_STYLE = {
  rising: ['#d1fae5', '#065f46', 'arru'],
  declining: ['#fee2e2', '#991b1b', 'arrd'],
  stopped: ['#fef3c7', '#92400e', 'alert'],
};
function _qualWord(q) { return q === 'rising' ? 'Rising' : q === 'declining' ? 'Declining' : q === 'stopped' ? 'Stopped' : ''; }
function _qualChip(label, q, iconClass) {
  const st = _QUAL_STYLE[q];
  if (!st) return '';
  const icon = iconClass ? `<svg class="${iconClass}" viewBox="0 0 24 24">${IC[st[2]]||''}</svg>` : icS(st[2]);
  return `<span class="chip" style="background:${st[0]};color:${st[1]};display:inline-flex;align-items:center;gap:3px">${icon} ${label}</span>`;
}
// Dynamic status chip(s) for the search / at-risk screens (replaces the at-risk
// chip). '' when steady.
function qualChips(s) {
  const { svcQ, grpQ, category } = attendQual(s);
  if (category === 'stopped') return _qualChip('Stopped both', 'stopped');
  let h = '';
  if (svcQ === 'rising' || svcQ === 'declining' || svcQ === 'stopped') h += _qualChip(_qualWord(svcQ) + ' service', svcQ);
  if (grpQ === 'rising' || grpQ === 'declining' || grpQ === 'stopped') h += (h ? ' ' : '') + _qualChip(_qualWord(grpQ) + ' group', grpQ);
  return h;
}
// Health screen's own tile chips: rising/declining drop the qualifier
// word entirely (the chip's arrow icon + colour already carry that meaning) and
// keep just the stream name; stopped keeps its word since there's no arrow for it.
function _arQualChips(s) {
  const { svcQ, grpQ, category } = attendQual(s);
  if (category === 'stopped') return _qualChip('Stopped both', 'stopped');
  let h = '';
  if (svcQ === 'stopped') h += _qualChip('No youths', svcQ);
  else if (svcQ === 'rising' || svcQ === 'declining') h += _qualChip('Youth', svcQ, 'ic-xs');
  if (grpQ === 'stopped') h += (h ? ' ' : '') + _qualChip('No lifegroup', grpQ);
  else if (grpQ === 'rising' || grpQ === 'declining') h += (h ? ' ' : '') + _qualChip('Lifegroup', grpQ, 'ic-xs');
  return h;
}

// "This term / last term" attendance line for service or groups.
function termRow(label, curA, curT, prevA, prevT, noDanger) {
  const cp = curT > 0 ? Math.round(curA / curT * 100) : null;
  const pp = prevT > 0 ? Math.round(prevA / prevT * 100) : null;
  return `<div style="margin-top:6px">
    <div style="font-size:10px;color:var(--ink-faint);font-weight:700;text-transform:uppercase">${label}</div>
    <div style="font-size:12px">This term: <b style="color:${cp!==null&&cp<50&&!noDanger?'var(--danger)':'var(--ink)'}">${curT>0?curA+'/'+curT+' ('+cp+'%)':'—'}</b>${prevT>0?` · <span style="color:var(--ink-faint)">Last term: ${prevA}/${prevT} (${pp}%)</span>`:''}</div>
  </div>`;
}
function riskChip(s) {
  if (!s || s === 'regular') return '';
  const m = { stopped:['Stopped','risk-stopped'], declining:['Declining','risk-declining'] };
  const [l, c] = m[s] || [s, 'c-neutral'];
  return `<span class="chip ${c}">${l}</span>`;
}
function statusChip(status) {
  return status === 'active'
    ? '<span class="chip c-success">Active</span>'
    : '<span class="chip c-neutral">Inactive</span>';
}
function svcPct(s) { return s.svcTotal > 0 ? Math.round(s.svcAttended / s.svcTotal * 100) : null; }
function pBar(pct) {
  const cls = pct >= 70 ? 'fill-g' : pct >= 40 ? 'fill-a' : 'fill-r';
  return `<div class="pb"><div class="pb-f ${cls}" style="width:${pct}%"></div></div>`;
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.getDate()+'/'+(dt.getMonth()+1)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}
function fmtDM(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.getUTCDate()+'/'+(dt.getUTCMonth()+1);
}

// Quad helpers (gender + year bracket) — mirror backend quadGenderOf/quadGradesOf
function quadGrades(q) { return (q === 'g79' || q === 'b79') ? [7, 8, 9] : (q === 'g1012' || q === 'b1012') ? [10, 11, 12] : []; }
function quadGender(q) { return (q === 'g79' || q === 'g1012') ? 'female' : (q === 'b79' || q === 'b1012') ? 'male' : null; }
// The gender a login is scoped to: quad logins from their quad; grade logins from
// the email convention (grade7g -> female, grade7b -> male). null = both (ungendered).
function _loginGender(u) {
  if (!u) return null;
  if (u.role === 'quad') return quadGender(u.quad);
  if (u.role === 'grade') {
    const local = (u.email || '').split('@')[0].toLowerCase();
    if (/^grade\s*\d+\s*g$/.test(local) || local.includes('girl')) return 'female';
    if (/^grade\s*\d+\s*b$/.test(local) || local.includes('boy') || local.includes('guy')) return 'male';
  }
  return null;
}
// " Girls" / " Boys" / "" — suffix for gendered grade/quad tile labels.
function _gsfx(gender) { return gender === 'female' ? ' Girls' : gender === 'male' ? ' Boys' : ''; }

function saveConnectFilters() {
  try {
    sessionStorage.setItem('yap_connect_filters', JSON.stringify({
      gf: [..._aS.gf],
      df: [..._aS.df],
      search: _aS.search
    }));
  } catch {}
}

function restoreConnectFilters() {
  try {
    const raw = sessionStorage.getItem('yap_connect_filters');
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (Array.isArray(saved.gf)) _aS.gf = new Set(saved.gf);
    if (Array.isArray(saved.df)) _aS.df = new Set(saved.df);
    if (typeof saved.search === 'string') _aS.search = saved.search;
  } catch {}
}

async function render() {
  if (!S.user) { renderLogin(); return; }
  if (!_shellReady) _initShell();
  _updateNavActive();
  const p = S.page;
  if (p && p.indexOf('ca-') === 0 && window.CA) { await CA.render(p); return; } /*CA-HOOK*/
  if (p==='home') await renderHome();
  else if (p==='leaders') await renderConnect();
  else if (p==='allocate') go('leaders'); // legacy route — merged into leaders
  else if (p==='my-students') await renderMyStudents();
  else if (p==='quad-view') go('leaders'); // merged into leaders
  else if (p==='my-quad') go('leaders');   // merged into leaders
  else if (p==='at-risk') await renderAtRisk();
  else if (p==='students') await renderStudents();
  else if (p==='trends') await renderTrends();
  else if (p==='import') await renderImport();
  else if (p==='birthdays') await renderUpcomingBirthdays();
  else if (p==='admin') await renderAdmin();
  else if (p==='notifications') go('home'); // PUSH-HIDDEN — was: await renderNotifications()

//  - all caches fresh  → render directly (instant)
//  - any cache lapsed but last-known data exists → paint stale, revalidate in the
//    background (stale-while-revalidate). This is what kills the "freeze for a few
//    seconds" on back-to-Home: a cold serverless start / DB reconnect now happens
//    behind an already-painted page instead of behind a spinner.
//  - nothing cached at all (first load) → spinner, then fetch.
async function renderHome() {
  const _hp = HOME_PATHS();
  const allFresh  = _hp.every(p => Cache.get(p) !== null);
  const haveStale = _hp.every(p => Cache.getStale(p) !== null);
  if (allFresh) {
    try { await _renderHomeInner(false); } catch (err) { _homeError(err); }
    return;
  }
  if (haveStale) {
    try { await _renderHomeInner(true); } catch { /* repaint comes from revalidate */ }
    _revalidateHome();
    return;
  }
  setApp(shell(''));
  try { await _renderHomeInner(false); } catch (err) { _homeError(err); }
  // Cold load self-heal: if any endpoint failed this round (e.g. a slow
  // /lifegroups/stats timed out during the serverless cold start), Home would
  // otherwise show a degraded fallback number (weekly averages computed without
  // the authoritative stats) until the user navigated away and back. Retry in the
  // background and repaint once the instance is warm — same mechanism as the
  // stale branch, so the wrong number self-corrects instead of sticking.

            }
            const qBorder = quadGender(q.quad) === 'female' ? '#ec4899' : null;
            body += _hAttTile(q.label, qStud, _hQuadAvg(trends, q.quad), { dropId: 'hq-' + q.quad, gradeRows, hideLifegroupRow: true, borderColor: qBorder });
          }
          body += '</div>';
        }
      }
      // Quad: Attendance by Grade tiles (their bracket) — each tile doubles as a
      // dropdown onto that grade's named-lifegroup breakdown (formerly a separate
      // "Lifegroups by Grade" section below; folded in here so quad only has to
      // tap one tile instead of scrolling to a second section for the same grade).

      // Quad no longer gets a separate "Lifegroups by Grade" section here — that
      // content now lives inside each Attendance-by-Grade tile's dropdown above.
      if (lgStats && ['admin', 'director'].includes(u.role)) {

        if (quads.length) {

            }
            body += '</div></div>';
          }
          body += '</div>';
        }

    }
  }

  // Admin/director/quad: follow-up sits at the bottom of the home page.
  if (u.role !== 'grade') body += '<div id="home-followup"></div>';

  setApp(shell(body));
  // Fill the follow-up container after the main paint (the div is now in the DOM).

  let h = `<div class="sh" style="display:flex;align-items:center;justify-content:space-between;font-size:13px"><span>Follow Up · ${esc(data.leader.fullName)} ${helpTip("These are students who've attended a service or lifegroup recently, but weren't here last service.")}</span>${changeBtn}</div>`;

async function _saveFollowupSmsTemplate(leaderId) {

    toast('✓ Template saved');
  } catch (e) { toast(e.message); }

// Friday that ends the Sat–Fri week containing an ISO date, formatted "D/M" (Australian day/month).
function _fridayLabel(iso) {
  const p = String(iso).slice(0, 10).split('-');
  if (p.length !== 3) return '';
  const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  if (isNaN(d.getTime())) return '';
  const off = (12 - d.getDay()) % 7; // days until this week's Friday
  d.setDate(d.getDate() + off);
  return `${d.getDate()}/${d.getMonth() + 1}`;
}

// One follow-up list as a compact card. Shows name only (grade/gender/birthday
// omitted to keep rows compact) + tap-to-call; deliberately NO at-risk/declining marker (per spec).
// `stream` ('svc'/'grp') gives the youth vs lifegroup cards a faint distinct tint
// so they're easier to tell apart at a glance; birthdays (no stream) stays plain white.
const _FOLLOWUP_TINT = { svc: 'rgba(26,26,242,.04)', grp: 'rgba(16,185,129,.05)' };
function _followupListHtml(title, items, emptyMsg, stream) {
  const bg = _FOLLOWUP_TINT[stream];
  let h = `<div class="card" style="padding:12px;margin-bottom:10px${bg ? `;background:${bg}` : ''}">
    <div style="font-size:12px;font-weight:800;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px">${title} (${items.length})</div>`;
  if (!items.length) { h += `<div style="font-size:13px;color:var(--ink-faint)">${emptyMsg}</div></div>`; return h; }
  for (const s of items) {
    const phone = s.mobile || s.parentPhone;
    // Row divider: var(--paper-dark)/#e8edf4 against a near-white (or lightly
    // tinted, see _FOLLOWUP_TINT) card background is ~1.05:1 contrast — for
    // practical purposes invisible, which is what left these rows reading as a
    // single undivided block with the name and phone "floating" far apart on a
    // wide viewport. A low-opacity dark overlay reads consistently faint-but-
    // visible on white AND on the svc/grp tints alike (unlike a fixed hex, whose
    // contrast against those different backgrounds isn't independently tunable).
    h += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(15,23,42,.12)">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${esc(s.fullName)}</div>
      </div>
      ${phone ? `<div style="font-size:13px;white-space:nowrap" onclick="event.stopPropagation()">${phoneLink(phone, s.firstName)}</div>` : ''}
    </div>`;
  }
  h += '</div>';
  return h;
}

function _urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function initPushSubscription() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const { publicKey } = await API.get('/push/vapid-key');
    if (!publicKey) return;
    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    if (existing) return;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: _urlBase64ToUint8Array(publicKey) });
    const j = sub.toJSON();
    await API.post('/push/subscribe', { endpoint: j.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth });
  } catch (e) { console.error('[push] subscribe error', e); }
}

async function submitSendNotification() {
  const raw = document.getElementById('push-target')?.value || '';
  const title = document.getElementById('push-title')?.value?.trim() || '';
  const message = document.getElementById('push-msg')?.value?.trim() || '';
  const errEl = document.getElementById('push-err');
  if (!title || !message) { errEl.innerHTML = '<div class="alert al-err" style="margin-bottom:8px">Title and message are required</div>'; return; }
  let target;
  if (raw === 'all') { target = { type: 'all' }; }
  else if (raw.startsWith('quad:')) { target = { type: 'quad', quad: raw.slice(5) }; }
  else if (raw.startsWith('grade:')) { const [,gr,gender] = raw.split(':'); target = { type: 'grade', grade: parseInt(gr,10), gender }; }
  else { errEl.innerHTML = '<div class="alert al-err" style="margin-bottom:8px">Invalid target</div>'; return; }
  try {
    const res = await API.post('/push/send', { target, title, message });
    closeModal();
    Cache.del('/push/notifications');
    if (S.page === 'notifications') renderNotifications();
    const t = document.createElement('div');
    t.className = 'alert al-ok';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    t.textContent = `Sent ${res.sent} · Failed ${res.failed}`;
    document.body.appendChild(t); setTimeout(() => t.remove(), 3500);
  } catch (e) { errEl.innerHTML = `<div class="alert al-err" style="margin-bottom:8px">${e.message}</div>`; }
}

function _pushTargetLabel(target) {
  if (!target) return '—';
  if (target.type === 'all') return 'Everyone';
  if (target.type === 'quad') return QUAD_LABELS[target.quad] || target.quad;
  if (target.type === 'grade') return `Grade ${target.grade}${_gsfx(target.gender)}`;
  return '—';
}

function _timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

    h += '<p style="color:var(--ink-faint);font-size:13px;padding:8px 0 14px">No new notifications.</p>';

    h += '<div class="sh">Sent</div>';

          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700">${esc(n.title)}</div>
              <div style="font-size:12px;color:var(--ink-mid);margin:2px 0">${esc(n.message)}</div>

            </div>
            <button class="btn btn-secondary btn-sm" style="padding:4px 8px;font-size:11px;flex-shrink:0;color:var(--danger);border-color:var(--danger)" onclick="deleteNotification('${n.id}')">Delete</button>

      }
      h += '</div>';
    } else {
      h += '<p style="color:var(--ink-faint);font-size:13px;padding:8px 0 14px">You haven\'t sent any notifications.</p>';
    }
  }

  setApp(shell(h));
  _updateNotifBadge(data);
}

// Refresh the red unread badge on the header bell = count of current (undismissed,
// unexpired) received notifications for the logged-in account.
async function _updateNotifBadge(data) {
  if (!S.user) return;
  try { if (!data) data = await API.get('/push/notifications'); }
  catch { return; }
  const count = (data && data.received ? data.received : []).length;
  const el = document.getElementById('notif-badge');
  if (!el) return;
  if (count > 0) { el.textContent = count > 99 ? '99+' : String(count); el.hidden = false; }
  else { el.hidden = true; }
}

async function dismissNotification(id) {
  try { await API.post(`/push/notifications/${id}/dismiss`, {}); Cache.del('/push/notifications'); await _updateNotifBadge(); if (S.page === 'notifications') renderNotifications(); }
  catch (e) { console.error('[push] dismiss error', e); }
}

async function deleteNotification(id) {
  try { await API.del(`/push/notifications/${id}`); Cache.del('/push/notifications'); if (S.page === 'notifications') renderNotifications(); }
  catch (e) { console.error('[push] delete error', e); }
}

// Delete a leader, then offer Undo: re-create the leader and re-connect the same
// students. Captures the leader record + its connected studentIds before deleting.
async function doDelLeader(id) {
  let leader, studentIds = [];
  try { leader = await API.get(`/leaders/${id}`); } catch {}
  studentIds = Object.entries(_aS.allocs || {}).filter(([, ids]) => (ids || []).includes(id)).map(([sid]) => sid);
  try {
    await API.del(`/leaders/${id}`);
    Cache.del('/leaders', '/connections', '/overview', '/at-risk');
    closeModal();
    renderConnect();
    showUndoToast(`Removed ${leader ? leader.fullName : 'leader'}`, async () => {
      try {
        const recreated = await API.post('/leaders', { fullName: leader.fullName, gender: leader.gender || '', grades: leader.grades || [] });
        for (const sid of studentIds) { try { await API.post('/connections', { studentId: sid, leaderId: recreated.id }); } catch {} }
        Cache.del('/leaders', '/connections', '/overview', '/at-risk');
        renderConnect();
      } catch (e) { toast('Undo failed: ' + e.message); }
    });
  } catch (e) { toast(e.message); }
}

let _aS = { students:[], leaders:[], allocs:{}, gf:new Set(), df:new Set() };
// _pickerCtx = { leaderId, leaderGender, leaderName }
let _pickerCtx = null;

const CONNECT_PATHS = ['/students', '/leaders', '/connections'];
let _connectRevalidating = false;
function _revalidateConnect() {
  if (_connectRevalidating) return;
  _connectRevalidating = true;
  Promise.all(CONNECT_PATHS.map(p => API.get(p).catch(() => null)))
    .then(() => { if (S.page === 'leaders') return renderConnect(); })
    .catch(() => {})
    .finally(() => { _connectRevalidating = false; });
}
async function renderConnect() {
  const _pg = S.page;
  const allFresh = CONNECT_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = CONNECT_PATHS.every(p => Cache.getStale(p) !== null);
  if (allFresh || haveStale) {
    await loadConnectData(p => Promise.resolve(Cache.getStale(p)));
    if (!allFresh) _revalidateConnect();
  } else {
    setApp(shell(''));
    await loadConnectData(p => API.get(p));
    if (S.page !== _pg) return;
  }
  renderConnectView();
}

async function loadConnectData(G) {
  const [students, leaders, connectsRaw] = await Promise.all([
    G('/students').catch(() => []),
    G('/leaders').catch(() => []),
    G('/connections').catch(() => []),
  ]);
  const allocs = {};
  for (const a of connectsRaw) { if (!allocs[a.studentId]) allocs[a.studentId]=[]; allocs[a.studentId].push(a.leaderId); }
  _aS.students = students; _aS.leaders = leaders; _aS.allocs = allocs;
}

function renderConnectView() {

          ${canEdit?`<button class="btn btn-ghost btn-sm" style="padding:2px 5px" title="Edit leader" onclick="showEditLeader('${l.id}')">${icS('edit')}</button>`:''}

// Size/position the custom always-visible scroll thumb for a .connect-students
// preview list against its sibling .connect-students-track/-thumb. Hides the
// track entirely when everything fits (nothing to scroll).
function _syncConnectThumb(el) {
  const track = el.nextElementSibling;
  if (!track || !track.classList.contains('connect-students-track')) return;
  const thumb = track.firstElementChild;
  const trackH = track.clientHeight;
  const viewH = el.clientHeight;
  const contentH = el.scrollHeight;
  if (contentH <= viewH + 1 || trackH <= 0) { track.style.display = 'none'; return; }
  track.style.display = '';
  const thumbH = Math.max(20, trackH * (viewH / contentH));
  const maxTop = trackH - thumbH;
  const top = maxTop * (el.scrollTop / (contentH - viewH));
  thumb.style.height = thumbH + 'px';
  thumb.style.top = top + 'px';
}

function toggleAF(type, val) {
  if (type==='g') { if (_aS.gf.has(val)) _aS.gf.delete(val); else _aS.gf.add(val); }
  else { if (_aS.df.has(val)) _aS.df.delete(val); else _aS.df.add(val); }
  saveConnectFilters(); renderConnectView();
}

// ── STUDENT PICKER MODAL (replaces tiny <select> — works at 60+ students) ──
function openStudentPicker(leaderId, leaderGender) {
  const leader = (_aS.leaders || []).find(l => l.id === leaderId);
  const leaderGrades = (leader && leader.grades) ? leader.grades : [];
  const leaderName = leader ? leader.fullName : 'Leader';
  _pickerCtx = { leaderId, leaderGender, leaderName };
  const assignedForLeader = new Set(
    _aS.students.filter(s => _aS.allocs[s.id]?.includes(leaderId)).map(s => s.id)
  );

  modal(`
    <div class="mo-title">Add Students → ${esc(leaderName)}</div>
    <div style="position:relative;margin-bottom:4px">
      <input class="picker-search" id="picker-q" placeholder="Search by name to add anyone…" oninput="filterPicker()" autofocus>
    </div>
    <div id="picker-list" class="picker-list"></div>
    <div class="picker-done" style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary btn-sm" onclick="closeModal()">Done</button>
    </div>`,
    () => { _pickerCtx = null; _teardownPickerSize(); },
    { overlayClass: 'mo-top', boxClass: 'picker pflex' }
  );

  // Full roster is searchable; the default (no search) view is narrowed to the
  // leader's own grade(s) + gender, so students with no grade/gender stay hidden
  // until explicitly searched for.
  window._pickerPool = _aS.students;
  window._pickerGrades = new Set(leaderGrades);
  window._pickerGender = leaderGender || '';
  window._pickerAssigned = assignedForLeader;
  window._pickerAllocs = _aS.allocs || {};
  window._pickerLeaders = _aS.leaders || [];
  filterPicker();

  // Pin the modal to the visible viewport so the keyboard never hides the list
  // or the Done button, and focus the search input.
  _setupPickerSize();
  setTimeout(() => { document.getElementById('picker-q')?.focus(); _sizePicker(); }, 60);
}

// Keep the picker box exactly as tall as the visible viewport (shrinks when the
// on-screen keyboard opens), so its scrollable list sits at the top and the Done
// button stays on screen.
function _sizePicker() {
  const box = document.querySelector('.mo-box.pflex');
  if (!box) return;
  // Leave ~1cm clear at the top (under the Dynamic Island / notch — the overlay's
  // padding-top handles that) and ~1cm at the bottom, and keep the box inside the
  // visible viewport so the keyboard never covers the list or the Done button.
  const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  const h = Math.round(vh - 68);
  box.style.height = h + 'px';
  box.style.maxHeight = h + 'px';
}
function _setupPickerSize() {
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', _sizePicker);
    window.visualViewport.addEventListener('scroll', _sizePicker);
  }
  window.addEventListener('resize', _sizePicker);
}
function _teardownPickerSize() {
  if (window.visualViewport) {
    window.visualViewport.removeEventListener('resize', _sizePicker);
    window.visualViewport.removeEventListener('scroll', _sizePicker);
  }
  window.removeEventListener('resize', _sizePicker);
}

function _pickByFirst(a, b) {
  return (a.firstName || '').localeCompare(b.firstName || '') || (a.lastName || '').localeCompare(b.lastName || '');
}

function filterPicker() {
  const q = (document.getElementById('picker-q')?.value || '').toLowerCase().trim();
  const pool = window._pickerPool || [];
  const assigned = window._pickerAssigned || new Set();
  const allocs = window._pickerAllocs || {};
  const thisLeader = _pickerCtx ? _pickerCtx.leaderId : null;
  const leadersById = {};
  for (const l of (window._pickerLeaders || [])) leadersById[l.id] = l;

  const leaderGender = window._pickerGender || '';
  let list = pool;
  if (q) {
    // Searching surfaces students across grades (and otherwise-hidden no-grade
    // ones), but stays WITHIN the leader's gender — a definite opposite-gender
    // student is never offered (unknown-gender youth can still be found).
    const terms = q.split(/\s+/).filter(Boolean);
    list = pool.filter(s => {
      if (leaderGender && (s.gender === 'male' || s.gender === 'female') && s.gender !== leaderGender) return false;
      const text = `${s.firstName} ${s.lastName} ${s.grade||''}`.toLowerCase();
      return terms.every(t => text.includes(t));
    });
  } else {
    // Default view: only the leader's own grade(s) + gender. Students with no
    // grade or no gender are hidden until explicitly searched.
    const grades = window._pickerGrades || new Set();
    const gender = window._pickerGender || '';
    list = pool.filter(s => {
      if (s.grade == null) return false;
      if (s.gender !== 'male' && s.gender !== 'female') return false;
      if (gender && s.gender !== gender) return false;
      if (grades.size > 0 && !grades.has(s.grade)) return false;
      // Hide students who never attended (current/prev term) unless already
      // assigned to a leader — they remain findable via search.
      if (!_hasAttended(s) && !assigned.has(s.id) && !((allocs[s.id] || []).length)) return false;
      return true;
    });
  }

  // Three buckets (top → bottom): not assigned, assigned to a DIFFERENT leader,
  // assigned to THIS leader. Someone already with another leader can still be
  // added here, so they stay addable. Each bucket is sorted by first name.
  const isThis = s => assigned.has(s.id);
  const otherLeaders = s => (allocs[s.id] || []).filter(id => id !== thisLeader);
  const notAssigned = list.filter(s => !isThis(s) && otherLeaders(s).length === 0).sort(_pickByFirst);
  const assignedElse = list.filter(s => !isThis(s) && otherLeaders(s).length > 0).sort(_pickByFirst);
  const assignedThis = list.filter(isThis).sort(_pickByFirst);

  let html = '';
  if (!list.length) {
    html = '<div style="text-align:center;padding:32px;color:var(--ink-faint)">No students found</div>';
  } else {
    if (notAssigned.length) {
      html += `<div class="picker-section">Not assigned (${notAssigned.length})</div>`;
      for (const s of notAssigned) html += pickerRow(s, false, '');
    }
    if (assignedElse.length) {
      html += `<div class="picker-section">Assigned to another leader (${assignedElse.length})</div>`;
      for (const s of assignedElse) {
        const names = otherLeaders(s).map(id => (leadersById[id]?.fullName) || 'another leader');
        html += pickerRow(s, false, 'with ' + names.join(', '));
      }
    }
    if (assignedThis.length) {
      html += `<div class="picker-section">Assigned to this leader (${assignedThis.length})</div>`;
      for (const s of assignedThis) html += pickerRow(s, true, '');
    }
  }
  const listEl = document.getElementById('picker-list');
  if (listEl) listEl.innerHTML = html;
}

function pickerRow(s, isAssigned, note) {
  const pct = svcPct(s);
  const rise = isRising(s) ? _qualChip('Rising', 'rising') : '';
  const noteHtml = note ? `<div class="picker-item-meta" style="color:var(--accent-dark)">${note}</div>` : '';
  if (isAssigned) {
    return `<div class="picker-item assigned">
      <div>
        <div class="picker-item-name" style="display:flex;align-items:center;gap:4px">${icS('check')} ${esc(s.firstName)} ${esc(s.lastName)}</div>
        <div class="picker-item-meta">Gr ${s.grade||'—'} · ${s.gender}${pct!==null?' · '+pct+'%':''}</div>
      </div>
      <div class="picker-item-right">${rise}<button onclick="remPick('${s.id}')" title="Remove from this leader" style="margin-left:8px;border:none;background:none;color:var(--danger);font-size:20px;font-weight:700;line-height:1;cursor:pointer">−</button></div>
    </div>`;
  }
  return `<button class="picker-item" onclick="addConnFromPicker('${s.id}')" aria-label="Assign ${esc(s.firstName)} ${esc(s.lastName)}">

      <div class="picker-item-meta">Gr ${s.grade||'—'} · ${s.gender}${pct!==null?' · '+pct+'%':''}</div>
      ${noteHtml}
    </div>
    <div class="picker-item-right">${rise}<span style="color:var(--accent);font-size:18px;margin-left:8px">+</span></div>
  </button>`;
}

function tLvF(type, val) {

// Next on/after-`today` occurrence of a birthday (month+day; birth year ignored).
// Returns a Date at local midnight, or null for missing/invalid input. A Feb-29
// birthday in a non-leap year rolls to Mar 1 (JS Date normalisation) — acceptable.
function _nextBirthday(dob, today) {
  if (!dob) return null;
  const p = String(dob).slice(0, 10).split('-');
  if (p.length !== 3) return null;
  const month = Number(p[1]), day = Number(p[2]);
  if (!month || !day) return null;
  const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  let when = new Date(base.getFullYear(), month - 1, day);
  if (when < base) when = new Date(base.getFullYear() + 1, month - 1, day);
  return when;
}
// Display parts for an upcoming-birthday Date. Fixed name arrays (no locale dep).
function _fmtUpcoming(date) {
  const WD = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const FULL = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  return { weekday: WD[date.getDay()], day: date.getDate(), month: MON[date.getMonth()], monthName: FULL[date.getMonth()] };
}
const BIRTHDAYS_PATHS = ['/students', '/leaders', '/connections'];
