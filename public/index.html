          };
          body += '<div class="sh">Connection by Grade ' + helpTip('Only counts students who attended a service or lifegroup this term or last. Students who have never attended are not counted as unconnected.') + '</div><div class="card" style="padding:12px">';
          body += `<div style="display:flex;align-items:center;gap:12px;padding-bottom:4px;font-size:10px;font-weight:800;color:var(--ink-faint);text-transform:uppercase">
            <div style="width:54px"></div><div style="flex:1;text-align:center">♀ Girls</div><div style="flex:1;text-align:center">♂ Boys</div></div>`;
          for (const gr of grades) {
            const girls = sc.filter(s => s.grade === gr && s.gender === 'female');
            const boys = sc.filter(s => s.grade === gr && s.gender === 'male');
            body += `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--paper-dark)">
              <div style="width:54px;font-size:13px;font-weight:700">Gr ${gr}</div>
              ${half(girls)}${half(boys)}
            </div>`;
          }
          body += '</div>';
        }
      } else if (u.role === 'quad' && stats.byGrade) {
        const vg = stats.byGrade.filter(g => g.totalStudents > 0);
        if (vg.length) {
          body += '<div class="sh">Connection by Grade ' + helpTip('Only counts students who attended a service or lifegroup this term or last. Students who have never attended are not counted as unconnected.') + '</div><div class="card" style="padding:12px">';
          for (const g of vg) {
            const pct = g.totalStudents > 0 ? Math.round(g.connectedStudents / g.totalStudents * 100) : 0;
            body += `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--paper-dark)">
              <div style="width:60px;font-size:13px;font-weight:700">Gr ${g.grade}${_gsfx(_loginGender(u))}</div>

            </div>`;
          }
          body += '</div>';
        }
      }

      // Director/Admin: Youth By Quad — tap to expand per-grade rows. Youth-only
      // (no Lifegroups row/columns): the separate "Lifegroups by Quad" section
      // below already covers that, so showing it here too was redundant.
      if (['admin', 'director'].includes(u.role)) {
        const vq = (stats.byQuad || []).filter(q => q.totalStudents > 0);
        if (vq.length) {
          body += '<div class="sh">' + L('service') + ' By Quad</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
          for (const q of vq) {
            const qStud = sc.filter(s => s.quad === q.quad);
            // Gendered per-grade rows, rendered up-front (hidden until expanded).
            let gradeRows = '';
            for (const gr of _hQuadGrades(q.quad)) {
              const gradeStuds = qStud.filter(s => s.grade === gr);
              gradeRows += _hGradeMini('Yr ' + gr + _gsfx(quadGender(q.quad)), gradeStuds, _hGradeSvcAvg(gradeStuds));
            }
            const qBorder = quadGender(q.quad) === 'female' ? '#ec4899' : null;
            body += _hAttTile(q.label, qStud, _hQuadAvg(trends, q.quad), { dropId: 'hq-' + q.quad, gradeRows, hideLifegroupRow: true, borderColor: qBorder });
          }
          body += '</div>';
        }
      }
      // Quad: Attendance by Grade tiles (their bracket) — each tile doubles as a
      // dropdown onto that grade's named-lifegroup breakdown (formerly a separate
      // "Lifegroups by Grade" section below; folded in here so quad only has to
      // tap one tile instead of scrolling to a second section for the same grade).
      if (u.role === 'quad') {
        body += '<div class="sh">Attendance by Grade</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
        for (const gr of _hQuadGrades(u.quad)) {
          const gLg = lifegroupsOn ? _lgGrade(gr) : null;
          const attOpts = { grpAvgWk: gLg ? gLg.current.avgPerWeek : 0, hideLifegroupRow: !lifegroupsOn };
          if (gLg) {
            attOpts.dropId = 'hlg-' + gr;

          }
          body += _hAttTile('Yr ' + gr + _gsfx(_loginGender(u)), sc.filter(s => s.grade === gr), _hGradeAvg(trends, gr), attOpts);
        }
        body += '</div>';
      }
      // ── Lifegroup Attendance (current term only on Home) ──
      // average = individuals attending a lifegroup each week the scope ran.
      // Quad no longer gets a separate "Lifegroups by Grade" section here — that
      // content now lives inside each Attendance-by-Grade tile's dropdown above.
      if (lifegroupsOn && lgStats && ['admin', 'director'].includes(u.role)) {
        const quads = (lgStats.byQuad || []).filter(q => q.current.uniqueAttenders > 0 || q.current.members > 0);
        if (quads.length) {
          body += '<div class="sh">' + L('smallGroupPlural') + ' by Quad</div><div style="margin-bottom:16px">';
          for (const q of quads) {
            const qid = 'hlq-' + q.quad;
            body += `<div class="card drop" id="${qid}" style="margin-bottom:8px;padding:11px">
              <div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('${qid}')">
                <span class="drop-chev" style="font-size:12px;color:var(--ink-faint);font-weight:800">›</span>
                <div style="flex:1;font-size:13px;font-weight:700">${q.label}</div>
                <span style="font-size:12px;font-weight:700;color:var(--ink-mid)">${q.current.uniqueAttenders} seen · ${q.current.avgPerWeek} weekly</span>
              </div><div class="drop-body">`;
            for (const gr of _hQuadGrades(q.quad)) {
              const g = (q.grades || []).find(x => x.grade === gr);
              if (g) body += _lgGradeBlock(g, false, _gsfx(quadGender(q.quad)), 'hlqg-' + q.quad + '-' + gr);
            }
            body += '</div></div>';
          }
          body += '</div>';
        }
      }
    }
  }

  // Admin/director/quad: follow-up sits at the bottom of the home page.
  if (u.role !== 'grade') body += '<div id="home-followup"></div>';

  setApp(shell(body));
  // Fill the follow-up container after the main paint (the div is now in the DOM).
  renderHomeFollowup();
}

  const acts = navItems().filter(i => i.id !== 'home');

// Render the weekly follow-up into #home-followup. If no leader identity is set,
// show a self-identify picker first (Recommendation 2 + 3).
async function renderHomeFollowup() {
  const host = document.getElementById('home-followup');
  if (!host) return;
  const mine = getMyLeaderId();

  // No identity yet → offer a picker built from the leaders in scope.
  if (!mine) {
    let leaders = [];
    try { leaders = await API.get('/leaders'); } catch {}
    if (!leaders.length) { host.innerHTML = ''; return; }
    const opts = leaders.map(l => `<option value="${l.id}">${esc(l.fullName)}</option>`).join('');
    host.innerHTML = `<div class="sh" style="font-size:13px">Follow Up ${helpTip("These are students who've attended a service or lifegroup recently, but weren't here last service.")}</div>
      <div class="card" style="padding:14px">
        <div style="font-size:13px;color:var(--ink-mid);margin-bottom:8px">Tell us who you are to see your students to follow up with this week.</div>
        <select class="fs" id="home-leader-pick" onchange="chooseHomeLeader()"><option value="">— Choose your name —</option>${opts}</select>
      </div>`;
    return;
  }

  let data;
  try { data = await API.get(`/connections/leader/${mine}/followup`); }
  catch { host.innerHTML = ''; return; }
  if (!data) { host.innerHTML = ''; return; }

  // A junior-leader login is bound to its own leader record — no "Not you?".
  const changeBtn = (S.user && S.user.role === 'leader') ? '' : `<button class="btn btn-secondary btn-sm" onclick="setMyLeaderId(null);renderHomeFollowup()">Not you?</button>`;
  // Each "not seen" list reflects the most recent session/week — label it with the
  // service day that ends that week so the leader knows which week they're chasing up.
  // serviceDayOfWeek (§5, phase 6b) drives both the word and _fridayLabel()'s date math.
  const svcTitle = 'Not Seen Last ' + _serviceDayName() + (data.latestSvcDate ? ` (${_fridayLabel(data.latestSvcDate)})` : '');
  const grpTitle = 'Not At A ' + L('smallGroup') + ' Last Week' + (data.latestGrpDate ? ` (ending ${_fridayLabel(data.latestGrpDate)})` : '');
  let h = `<div class="sh" style="display:flex;align-items:center;justify-content:space-between;font-size:13px"><span>Follow Up · ${esc(data.leader.fullName)} ${helpTip("These are students who've attended a service or lifegroup recently, but weren't here last service.")}</span>${changeBtn}</div>`;
  // _homeBirthdaysCtx: null suppresses the card (admin/director); an array is
  // the grade/quad-scoped list; undefined falls back to the leader-scoped
  // `data.birthdays` (role='leader'). See its doc comment near _revalidateHome.
  if (_homeBirthdaysCtx !== null) {
    const birthdays = _homeBirthdaysCtx !== undefined ? _homeBirthdaysCtx : data.birthdays;
    h += _followupListHtml('Birthdays this week', birthdays, 'No birthdays this week');
  }
  h += _followupListHtml(svcTitle, data.notSeenService, data.latestSvcDate ? 'Everyone was seen' : 'No service data yet', 'svc');
  h += _followupListHtml(grpTitle, data.notSeenGroup, data.latestGrpDate ? 'Everyone was seen' : 'No lifegroup data yet', 'grp');
  h += _smsTemplateBoxHtml(data.leader.id, data.leader.smsTemplate, 'fu-sms-tpl');
  host.innerHTML = h;
}

// Shared "Custom Message Template" editor card — used on Home's Follow Up
// section and at the top of My Students once a leader is selected, so a
// leader doesn't have to go back to Home just to edit their template.
function _smsTemplateBoxHtml(leaderId, smsTemplate, elId) {
  return `<div class="card" style="padding:12px;margin-bottom:10px">
    <div style="font-size:12px;font-weight:800;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;display:flex;align-items:center;gap:5px">Custom Message Template ${helpTip('Adds a "Message Custom" option next to Call and Message on the tap-to-call sheet for any student’s number. Use <first name> anywhere you want their first name inserted.')}</div>
    <textarea class="fi" id="${elId}" rows="2" style="width:100%;box-sizing:border-box;resize:vertical" placeholder="e.g. Hey <first name>, so good to see you this week!">${esc(smsTemplate || '')}</textarea>
    <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="_saveSmsTemplate('${leaderId}','${elId}')">Save</button>
  </div>`;
}

async function _saveSmsTemplate(leaderId, elId) {
  const el = document.getElementById(elId || 'fu-sms-tpl');
  const val = el ? el.value.trim() : '';
  try {
    await API.patch(`/leaders/${leaderId}/sms-template`, { smsTemplate: val || null });
    Cache.del('/leaders');
    await API.get('/leaders'); // refetch now so _myCustomSmsTemplate()'s synchronous Cache.getStale read sees the new template immediately, not just after the next natural /leaders fetch
    toast('✓ Template saved');
  } catch (e) { toast(e.message); }
}

// The service day that ends the week containing an ISO date, formatted "D/M"
// (Australian day/month). Generalised from Friday to structure.serviceDayOfWeek
// (§5, phase 6b); default 5 → the old Friday-ending behaviour, byte-identical.
function _fridayLabel(iso) {
  const p = String(iso).slice(0, 10).split('-');
  if (p.length !== 3) return '';
  const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  if (isNaN(d.getTime())) return '';
  const off = (_serviceDow() - d.getDay() + 7) % 7; // days until this week's service day
  d.setDate(d.getDate() + off);
  return `${d.getDate()}/${d.getMonth() + 1}`;
}

// One follow-up list as a compact card. Shows name only (grade/gender/birthday
// omitted to keep rows compact) + tap-to-call; deliberately NO at-risk/declining marker (per spec).
// `stream` ('svc'/'grp') gives the youth vs lifegroup cards a faint distinct tint
// so they're easier to tell apart at a glance; birthdays (no stream) stays plain white.
const _FOLLOWUP_TINT = { svc: 'rgba(26,26,242,.04)', grp: 'rgba(16,185,129,.05)' };
function _followupListHtml(title, items, emptyMsg, stream) {
  const bg = _FOLLOWUP_TINT[stream];
  let h = `<div class="card" style="padding:12px;margin-bottom:10px${bg ? `;background:${bg}` : ''}">
    <div style="font-size:12px;font-weight:800;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px">${title} (${items.length})</div>`;
  if (!items.length) { h += `<div style="font-size:13px;color:var(--ink-faint)">${emptyMsg}</div></div>`; return h; }
  for (const s of items) {
    const phone = s.mobile || s.parentPhone;
    // Row divider: var(--paper-dark)/#e8edf4 against a near-white (or lightly
    // tinted, see _FOLLOWUP_TINT) card background is ~1.05:1 contrast — for
    // practical purposes invisible, which is what left these rows reading as a
    // single undivided block with the name and phone "floating" far apart on a
    // wide viewport. A low-opacity dark overlay reads consistently faint-but-
    // visible on white AND on the svc/grp tints alike (unlike a fixed hex, whose
    // contrast against those different backgrounds isn't independently tunable).
    h += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(15,23,42,.12)">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${esc(s.fullName)}</div>
      </div>
      ${phone ? `<div style="font-size:13px;white-space:nowrap" onclick="event.stopPropagation()">${phoneLink(phone, s.firstName, !s.mobile && !!s.parentPhone)}</div>` : ''}
    </div>`;
  }
  h += '</div>';
  return h;
}

function showAddLeader() {
  const u = S.user;
  const allowedGrades = u.role === 'quad' ? quadGrades(u.quad) : _gradeList();
  const gcbs = allowedGrades.map(g =>
    `<label style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><input type="checkbox" value="${g}" class="gcb" ${u.role==='grade'&&userGrades(u).includes(g)?'checked disabled':''}> Grade ${g}</label>`
  ).join('');

    <div class="mo-title">Add Leader</div>

    ${u.role!=='grade'?`<div class="fg"><label class="fl">Grade Focus${u.role==='quad'?' (your bracket)':' (leave blank = all)'}</label>${gcbs}</div>`:'<p style="font-size:12px;color:var(--ink-mid);margin-bottom:12px">Leader will be scoped to your grade automatically</p>'}
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="submitAddLeader()">Add Leader</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

async function submitAddLeader() {
  const name = document.getElementById('ln')?.value?.trim();
  const gender = document.getElementById('lg')?.value || null;
  const grades = [...(document.querySelectorAll('.gcb:checked')||[])].map(el => parseInt(el.value,10));
  const errEl = document.getElementById('le');
  if (!name) { errEl.innerHTML='<div class="alert al-err">Name is required</div>'; return; }

    await API.post('/leaders', { fullName:name, gender, grades });

  } catch (e) { errEl.innerHTML=`<div class="alert al-err">${e.message}</div>`; }
}

async function showEditLeader(id) {
  let l; try { l = await API.get(`/leaders/${id}`); } catch { toast('Not found'); return; }
  const u = S.user;
  // Grade/quad logins can broaden which OTHER grades a leader covers, so they
  // can see and connect students from those grades too — not just their own
  // default bracket. Gender stays locked for them regardless (see below).
  const canBroadenGrades = u.role === 'grade' || u.role === 'quad';
  const allowedGrades = _gradeList();
  const gcbs = allowedGrades.map(g =>
    `<label style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><input type="checkbox" value="${g}" class="gcb" ${l.grades?.includes(g)?'checked':''}> Grade ${g}</label>`
  ).join('');
  const lockGender = canBroadenGrades;
  const genderLabel = l.gender==='female'?'Female':l.gender==='male'?'Male':'Any';
  const genderField = lockGender
    ? `<div class="fg"><label class="fl">Gender</label><select class="fs" id="lg" disabled><option selected>${genderLabel}</option></select><p style="font-size:11px;color:var(--ink-mid);margin-top:3px">Gender can't be changed here</p></div>`
    : `<div class="fg"><label class="fl">Gender</label><select class="fs" id="lg">
      <option value="" ${!l.gender?'selected':''}>Any</option>
      <option value="female" ${l.gender==='female'?'selected':''}>Female</option>
      <option value="male" ${l.gender==='male'?'selected':''}>Male</option>
    </select></div>`;
  modal(`
    <div class="mo-title">Edit Leader</div>
    <div id="le"></div>
    <div class="fg"><label class="fl">Full Name</label><input class="fi" id="ln" value="${esc(l.fullName)}"></div>
    ${genderField}
    <div class="fg"><label class="fl">Grade Focus</label>${gcbs}</div>
    <div class="fg"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="checkbox" id="la" ${l.active?'checked':''}> Active</label></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="submitEditLeader('${id}')">Save</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;color:var(--danger)" onclick="closeModal();confirmDelLeader('${id}','${esc(l.fullName).replace(/'/g,"\\'")}')">${icS('trash')} Remove leader</button>`);
}

async function submitEditLeader(id) {
  const fullName = document.getElementById('ln')?.value?.trim();
  const genderEl = document.getElementById('lg');
  const genderLocked = !!genderEl?.disabled;
  const grades = [...(document.querySelectorAll('.gcb:checked')||[])].map(el => parseInt(el.value,10));
  const active = document.getElementById('la')?.checked ?? true;
  const errEl = document.getElementById('le');
  if (!fullName) { errEl.innerHTML='<div class="alert al-err">Name required</div>'; return; }
  try {
    if (genderLocked) {
      // Grade/quad self-broadening: grades go through the dedicated endpoint,
      // which works regardless of leader ownership. Name/active are best-effort
      // through the general endpoint — silently skipped if this leader isn't
      // one you own, since broadening grades is the point here, not renaming
      // someone else's leader.
      await API.patch(`/leaders/${id}/grades`, { grades });
      try { await API.patch(`/leaders/${id}`, { fullName, active }); } catch {}
    } else {
      const gender = genderEl?.value || null;
      await API.patch(`/leaders/${id}`, { fullName, gender, grades, active });
    }
    Cache.del('/leaders', '/overview');
    closeModal(); toast('Leader updated'); await renderConnect();
  } catch (e) { errEl.innerHTML=`<div class="alert al-err">${e.message}</div>`; }
}

function confirmDelLeader(id, name) {
  // How many students are currently connected to this leader (blast radius)?
  const affected = Object.values(_aS.allocs || {}).filter(ids => (ids || []).includes(id));
  const n = affected.length;
  modal(`<div class="mo-title">Remove leader?</div>
    <p style="color:var(--ink-mid);margin-bottom:20px"><strong>${esc(name)}</strong> will be removed${n ? ` and <strong>${n} student${n!==1?'s':''}</strong> disconnected` : ''}.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger" style="flex:1" onclick="doDelLeader('${id}')">Remove</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`);
}

// Delete a leader, then offer Undo: re-create the leader and re-connect the same
// students. Captures the leader record + its connected studentIds before deleting.
async function doDelLeader(id) {
  let leader, studentIds = [];
  try { leader = await API.get(`/leaders/${id}`); } catch {}
  studentIds = Object.entries(_aS.allocs || {}).filter(([, ids]) => (ids || []).includes(id)).map(([sid]) => sid);
  try {
    await API.del(`/leaders/${id}`);
    Cache.del('/leaders', '/connections', '/overview', '/at-risk');
    closeModal();
    renderConnect();
    showUndoToast(`Removed ${leader ? leader.fullName : 'leader'}`, async () => {
      try {
        const recreated = await API.post('/leaders', { fullName: leader.fullName, gender: leader.gender || '', grades: leader.grades || [] });
        for (const sid of studentIds) { try { await API.post('/connections', { studentId: sid, leaderId: recreated.id }); } catch {} }
        Cache.del('/leaders', '/connections', '/overview', '/at-risk');
        renderConnect();
      } catch (e) { toast('Undo failed: ' + e.message); }
    });
  } catch (e) { toast(e.message); }
}

// ============================================================
// CONNECT  (leader-centric card view — scales to 60+ students)
// ============================================================
let _aS = { students:[], leaders:[], allocs:{}, gf:new Set(), df:new Set() };
// _pickerCtx = { leaderId, leaderGender, leaderName }
let _pickerCtx = null;

// crossGrade=1 variants — see student.service.ts's list() comment: this screen needs
// to see students/connections outside the actor's own grade/bracket so a leader whose
// grades were self-service broadened can actually be connected to that other grade.
const CONNECT_PATHS = ['/students?crossGrade=1', '/leaders', '/connections?crossGrade=1'];
let _connectRevalidating = false;
function _revalidateConnect() {
  if (_connectRevalidating) return;
  _connectRevalidating = true;
  API.batch(CONNECT_PATHS)
    .then(() => { if (S.page === 'leaders') return renderConnect(); })
    .catch(() => {})
    .finally(() => { _connectRevalidating = false; });
}
async function renderConnect() {
  const _pg = S.page;
  const allFresh = CONNECT_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = CONNECT_PATHS.every(p => Cache.getStale(p) !== null);
  if (allFresh || haveStale) {
    await loadConnectData(p => Promise.resolve(Cache.getStale(p)));
    if (!allFresh) _revalidateConnect();
  } else {
    setApp(shell(''));
    await loadConnectData(p => API.get(p));
    if (S.page !== _pg) return;
  }
  renderConnectView();
}

async function loadConnectData(G) {
  const [students, leaders, connectsRaw] = await Promise.all([
    G('/students?crossGrade=1').catch(() => []),
    G('/leaders').catch(() => []),
    G('/connections?crossGrade=1').catch(() => []),
  ]);
  const allocs = {};
  for (const a of connectsRaw) { if (!allocs[a.studentId]) allocs[a.studentId]=[]; allocs[a.studentId].push(a.leaderId); }
  _aS.students = students; _aS.leaders = leaders; _aS.allocs = allocs;
}

function renderConnectView() {
  const { students, leaders, allocs, gf, df } = _aS;
  const u = S.user;
  const canEdit = true;

  // Filter leaders by grade/gender chips (applied to the leader cards shown)
  let visLeaders = leaders;
  if (gf.size) visLeaders = visLeaders.filter(l => l.grades?.some(g => gf.has(g)));
  if (df.size) visLeaders = visLeaders.filter(l => !l.gender || df.has(l.gender));

  // Counts — only students who have attended count toward connected/total; those
  // who never attended (current/prev term) aren't treated as "unconnected".
  // `students` is fetched with crossGrade=1 (see CONNECT_PATHS) so the leader cards
  // and Add Students picker can surface other-grade/other-bracket same-gender
  // students to connect — but Total/Connected/Pending and the "Students not
  // Connected" dropdown should reflect only the login's OWN remit (own grade for
  // a grade login, own quad bracket for a quad login), or they double-count
  // students who only show up here because of that widening. director/admin have
  // no narrower remit than the full fetch, so they're unfiltered.
  const _ownGrades = new Set(userGrades(u));
  const inOwnScope = s => u.role === 'quad' ? s.quad === u.quad
    : (u.role === 'grade') ? _ownGrades.has(s.grade)
    : true;
  // The grade/gender filter chips above (gf/df) narrow which leader cards show;
  // apply the same filter to the student's OWN grade/gender so Total/Connected/
  // Pending and "Students not Connected" track the active filter too, instead of
  // always reflecting the login's full unfiltered remit.
  const inChipFilter = s => (!gf.size || gf.has(s.grade)) && (!df.size || df.has(s.gender));
  const connectedStudentIds = new Set(Object.keys(allocs).filter(id => allocs[id].length > 0));
  const connectable = students.filter(_hasAttended).filter(inOwnScope).filter(inChipFilter);
  const totalStudents = connectable.length;
  const connectedCount = connectable.filter(s => connectedStudentIds.has(s.id)).length;

  // Filters are scoped to the login: grade logins get none (they only see their
  // grade's leaders); quad logins get a grade filter for their bracket but no
  // gender filter (leaders are already their gender); director/admin get both.
  const fGrades = u.role === 'quad' ? quadGrades(u.quad)
    : ['director','admin'].includes(u.role) ? _gradeList() : [];
  const showGender = ['director','admin'].includes(u.role);
  const gChips = fGrades.map(g =>
    `<button class="fc ${gf.has(g)?'on':''}" onclick="toggleAF('g',${g})" aria-pressed="${gf.has(g)}">${g}</button>`
  ).join('');
  const dChips = showGender ? ['male','female'].map(g =>
    `<button class="fc ${df.has(g)?'on':''}" onclick="toggleAF('d','${g}')" aria-pressed="${df.has(g)}">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`
  ).join('') : '';

  // Grade ascending first, then alphabetical within the grade — matters for
  // quad/director/admin logins whose "Students not Connected" list spans
  // multiple grades; a no-op ordering for grade logins since connectable is
  // already scoped to a single grade there.
  const unallocated = connectable.filter(s => !connectedStudentIds.has(s.id))
    .sort((a, b) => (a.grade || 0) - (b.grade || 0) || _pickByFirst(a, b));
  const unallocList = unallocated.length
    ? unallocated.map(s => `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-top:1px solid var(--paper-dark);font-size:13px">
        <div>${esc(s.firstName)} ${esc(s.lastName)} <span style="color:var(--ink-mid);font-size:11px">Gr ${s.grade || '—'} · ${s.gender}</span></div>
        <button class="btn btn-ghost btn-sm" style="padding:4px 6px;background:#eef0fb;color:var(--accent-dark);flex:none" onclick="showStudentDetail('${s.id}')" aria-label="View profile for ${esc(s.firstName)} ${esc(s.lastName)}">Profile</button>
      </div>`).join('')
    : `<div style="font-size:13px;color:var(--ink-faint);padding:6px 0">Everyone is allocated!</div>`;
  const unallocDrop = `<div class="card drop" id="connect-unalloc" style="margin-bottom:12px">
    <div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('connect-unalloc')">
      <span class="drop-chev" style="font-size:12px;color:var(--ink-faint);font-weight:800">›</span>
      <div style="flex:1;font-size:13px;font-weight:700">Students not Connected (${unallocated.length})</div>
    </div>
    <div class="drop-body">${unallocList}</div>
  </div>`;

  let body = `
    <div class="ph">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div class="ph-title">Connect Setup ${helpTip('Search and connect are scoped to your grade and gender. You can add students from other grades, but only ones matching your gender.')}</div>
        <div style="display:flex;gap:6px">
          ${canEdit?`<button class="btn btn-primary btn-sm" onclick="showAddLeader()">+ Add Leader</button>`:''}
          <button class="btn btn-secondary btn-sm" onclick="exportConnectCSV()" aria-label="Export connections to Excel">Export Excel</button>
          <button class="btn btn-secondary btn-sm" onclick="showChangeOwnPassword()" aria-label="Change your password">Reset Password</button>
        </div>
      </div>
      <div class="ph-sub">${connectedCount}/${totalStudents} students connected · ${visLeaders.length} leader${visLeaders.length!==1?'s':''}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px">
      <div class="stat"><div class="stat-v">${totalStudents}</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--success)">${connectedCount}</div><div class="stat-l">Connected</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--warn)">${Math.max(0, totalStudents - connectedCount)}</div><div class="stat-l">Pending</div></div>
    </div>
    ${unallocDrop}
    ${gChips ? `<div class="filter-row" role="group" aria-label="Filter by grade">
      <span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Grade:</span>${gChips}
    </div>` : ''}
    ${dChips ? `<div class="filter-row" role="group" aria-label="Filter by gender">
      <span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}
    </div>` : ''}`;

  if (!visLeaders.length) {
    body += `<div class="empty">${icEmpty('users')}<div class="empty-title">No leaders match filters</div><div class="empty-sub">Clear filters or add leaders first</div></div>`;
  } else {
    body += '<div class="connect-grid">';
    for (const l of visLeaders) {
      const assignedStudents = students.filter(s => allocs[s.id]?.includes(l.id)).sort(_pickByFirst);
      const n = assignedStudents.length;

      // Preview is capped to a ~3-row scroll window (.connect-students max-height);
      // all assigned students render into it so a drag/scroll reveals the rest,
      // rather than truncating with a "+N more" link.
      let studentRows = '';
      for (const s of assignedStudents) {
        studentRows += `<div class="connect-stud-row">
          <div style="flex:1;min-width:0">
            <div class="connect-stud-name">${esc(s.firstName)} ${esc(s.lastName)}</div>
            <div class="connect-stud-meta">Gr ${s.grade||'—'} · ${s.gender}</div>
          </div>
          <button class="btn btn-ghost btn-sm" style="padding:4px 6px;background:#eef0fb;color:var(--accent-dark)" onclick="event.stopPropagation();showStudentDetail('${s.id}')" aria-label="View profile for ${esc(s.firstName)} ${esc(s.lastName)}">Profile</button>
          ${canEdit?`<button class="btn btn-ghost btn-sm" style="padding:4px 6px;color:var(--danger)" onclick="event.stopPropagation();removeConnectWithUndo('${s.id}','${l.id}')" aria-label="Disconnect ${esc(s.firstName)} ${esc(s.lastName)} from ${esc(l.fullName)}">×</button>`:''}
        </div>`;
      }

      const gi = l.gender==='female'?icS('genderF'):l.gender==='male'?icS('genderM'):'';
      const nm = l.fullName.replace(/'/g,"\\'");
      body += `<div class="connect-leader">
        <div style="display:flex;align-items:flex-start;gap:6px">
          <div class="connect-leader-name" style="flex:1;display:flex;align-items:center;gap:4px">${gi?`<span style="display:inline-flex;flex:none">${gi}</span>`:''}${esc(l.fullName)}</div>
          ${canEdit?`<button class="btn btn-ghost btn-sm" style="padding:2px 5px" title="Edit leader" onclick="showEditLeader('${l.id}')">${icS('edit')}</button>`:''}
        </div>
        <div class="connect-leader-meta" style="display:flex;justify-content:space-between;align-items:baseline;gap:6px;white-space:normal;overflow:visible;text-overflow:clip">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">Gr ${l.grades?.join(', ')||'All'} · ${l.gender||'any gender'}</span>
          <span style="flex:none;white-space:nowrap"><b>${n}</b> student${n!==1?'s':''}</span>
        </div>
        ${canEdit?`<button class="connect-add-btn" onclick="openStudentPicker('${l.id}','${l.gender||''}')">+ Add Students</button>`:''}
        ${assignedStudents.length?`<div class="connect-students-wrap"><div class="connect-students" onscroll="_syncConnectThumb(this)">${studentRows}</div><div class="connect-students-track"><div class="connect-students-thumb"></div></div></div>`:''}
      </div>`;
    }
    body += '</div>';
  }

  setApp(shell(body));
  // Native touch scrollbars only flash during an active drag, so the custom
  // track/thumb above is what actually stays visible at rest — size/position
  // it once now that the rows are laid out (and again on real scroll events).
  document.querySelectorAll('.connect-students').forEach(_syncConnectThumb);
}

// Size/position the custom always-visible scroll thumb for a .connect-students
// preview list against its sibling .connect-students-track/-thumb. Hides the
// track entirely when everything fits (nothing to scroll).
function _syncConnectThumb(el) {
  const track = el.nextElementSibling;
  if (!track || !track.classList.contains('connect-students-track')) return;
  const thumb = track.firstElementChild;
  const trackH = track.clientHeight;
  const viewH = el.clientHeight;
  const contentH = el.scrollHeight;
  if (contentH <= viewH + 1 || trackH <= 0) { track.style.display = 'none'; return; }
  track.style.display = '';
  const thumbH = Math.max(20, trackH * (viewH / contentH));
  const maxTop = trackH - thumbH;
  const top = maxTop * (el.scrollTop / (contentH - viewH));
  thumb.style.height = thumbH + 'px';
  thumb.style.top = top + 'px';
}

function toggleAF(type, val) {
  if (type==='g') { if (_aS.gf.has(val)) _aS.gf.delete(val); else _aS.gf.add(val); }
  else { if (_aS.df.has(val)) _aS.df.delete(val); else _aS.df.add(val); }
  saveConnectFilters(); renderConnectView();
}

// ── STUDENT PICKER MODAL (replaces tiny <select> — works at 60+ students) ──
function openStudentPicker(leaderId, leaderGender) {
  const leader = (_aS.leaders || []).find(l => l.id === leaderId);
  const leaderGrades = (leader && leader.grades) ? leader.grades : [];
  const leaderName = leader ? leader.fullName : 'Leader';
  _pickerCtx = { leaderId, leaderGender, leaderName };
  const assignedForLeader = new Set(
    _aS.students.filter(s => _aS.allocs[s.id]?.includes(leaderId)).map(s => s.id)
  );

  modal(`
    <div class="mo-title">Add Students → ${esc(leaderName)}</div>
    <div style="position:relative;margin-bottom:4px">
      <input class="picker-search" id="picker-q" placeholder="Search by name to add anyone…" oninput="filterPicker()" autofocus>
    </div>
    <div id="picker-list" class="picker-list"></div>
    <div class="picker-done" style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary btn-sm" onclick="closeModal()">Done</button>
    </div>`,
    () => { _pickerCtx = null; _teardownPickerSize(); pickerSyncBg(); },
    { overlayClass: 'mo-top', boxClass: 'picker pflex' }
  );

  // Full roster is searchable; the default (no search) view is narrowed to the
  // leader's own grade(s) + gender, so students with no grade/gender stay hidden
  // until explicitly searched for.
  window._pickerPool = _aS.students;
  window._pickerGrades = new Set(leaderGrades);
  window._pickerGender = leaderGender || '';
  window._pickerAssigned = assignedForLeader;
  window._pickerAllocs = _aS.allocs || {};
  // The logged-in login's own grade(s) — used only to sort each bucket below so a
  // broadened leader (see updateGrades) still sees their home grade first, with the
  // other grade(s) they were broadened into further down the same list.
  const mu = S.user || {};
  window._pickerOwnGrades = new Set(
    mu.role === 'grade' ? userGrades(mu)
    : mu.role === 'quad' ? quadGrades(mu.quad)
    : []
  );
  window._pickerLeaders = _aS.leaders || [];
  filterPicker();

  // Pin the modal to the visible viewport so the keyboard never hides the list
  // or the Done button, and focus the search input.
  _setupPickerSize();
  setTimeout(() => { document.getElementById('picker-q')?.focus(); _sizePicker(); }, 60);
}

// Keep the picker box exactly as tall as the visible viewport (shrinks when the
// on-screen keyboard opens), so its scrollable list sits at the top and the Done
// button stays on screen.
function _sizePicker() {
  const box = document.querySelector('.mo-box.pflex');
  if (!box) return;
  // Leave ~1cm clear at the top (under the Dynamic Island / notch — the overlay's
  // padding-top handles that) and ~1cm at the bottom, and keep the box inside the

function _pickByFirst(a, b) {
  return (a.firstName || '').localeCompare(b.firstName || '') || (a.lastName || '').localeCompare(b.lastName || '');
}

// Same order as _pickByFirst, but students in the logged-in login's own grade(s)
// sort before everyone else within the bucket — so a leader broadened into a second
// grade still sees their home grade first, with the extra grade further down.
function _pickByOwnGradeFirst(a, b) {
  const own = window._pickerOwnGrades;
  if (own && own.size) {
    const ao = own.has(a.grade) ? 0 : 1;
    const bo = own.has(b.grade) ? 0 : 1;
    if (ao !== bo) return ao - bo;
  }
  return _pickByFirst(a, b);
}

function filterPicker() {
  const q = (document.getElementById('picker-q')?.value || '').toLowerCase().trim();
  const pool = window._pickerPool || [];
  const assigned = window._pickerAssigned || new Set();
  const allocs = window._pickerAllocs || {};
  const thisLeader = _pickerCtx ? _pickerCtx.leaderId : null;
  const leadersById = {};
  for (const l of (window._pickerLeaders || [])) leadersById[l.id] = l;

  const leaderGender = window._pickerGender || '';
  let list = pool;
  if (q) {
    // Searching surfaces students across grades (and otherwise-hidden no-grade
    // ones), but stays WITHIN the leader's gender — a definite opposite-gender
    // student is never offered (unknown-gender youth can still be found).
    const terms = q.split(/\s+/).filter(Boolean);
    list = pool.filter(s => {
      if (leaderGender && (s.gender === 'male' || s.gender === 'female') && s.gender !== leaderGender) return false;
      const text = `${s.firstName} ${s.lastName} ${s.grade||''}`.toLowerCase();
      return terms.every(t => text.includes(t));
    });
  } else {
    // Default view: only the leader's own grade(s) + gender. Students with no
    // grade or no gender are hidden until explicitly searched.
    const grades = window._pickerGrades || new Set();
    const gender = window._pickerGender || '';
    list = pool.filter(s => {
      if (s.grade == null) return false;
      if (s.gender !== 'male' && s.gender !== 'female') return false;
      if (gender && s.gender !== gender) return false;
      if (grades.size > 0 && !grades.has(s.grade)) return false;
      // Hide students who never attended (current/prev term) unless already
      // assigned to a leader — they remain findable via search.
      if (!_hasAttended(s) && !assigned.has(s.id) && !((allocs[s.id] || []).length)) return false;
      return true;
    });
  }

  // Three buckets (top → bottom): not assigned, assigned to a DIFFERENT leader,
  // assigned to THIS leader. Someone already with another leader can still be
  // added here, so they stay addable. Each bucket is sorted by first name, with
  // the logged-in login's own grade(s) surfaced first (see _pickByOwnGradeFirst).
  const isThis = s => assigned.has(s.id);
  const otherLeaders = s => (allocs[s.id] || []).filter(id => id !== thisLeader);
  const notAssigned = list.filter(s => !isThis(s) && otherLeaders(s).length === 0).sort(_pickByOwnGradeFirst);
  const assignedElse = list.filter(s => !isThis(s) && otherLeaders(s).length > 0).sort(_pickByOwnGradeFirst);
  const assignedThis = list.filter(isThis).sort(_pickByOwnGradeFirst);

  let html = '';
  if (!list.length) {
    html = '<div style="text-align:center;padding:32px;color:var(--ink-faint)">No students found</div>';
  } else {
    if (notAssigned.length) {
      html += `<div class="picker-section">Not assigned (${notAssigned.length})</div>`;
      for (const s of notAssigned) html += pickerRow(s, false, '');
    }
    if (assignedElse.length) {
      html += `<div class="picker-section">Assigned to another leader (${assignedElse.length})</div>`;
      for (const s of assignedElse) {
        const names = otherLeaders(s).map(id => (leadersById[id]?.fullName) || 'another leader');
        html += pickerRow(s, false, 'with ' + names.join(', '));
      }
    }
    if (assignedThis.length) {
      html += `<div class="picker-section">Assigned to this leader (${assignedThis.length})</div>`;
      for (const s of assignedThis) html += pickerRow(s, true, '');
    }
  }
  const listEl = document.getElementById('picker-list');
  if (listEl) listEl.innerHTML = html;
}

function pickerRow(s, isAssigned, note) {

  const noteHtml = note ? `<div class="picker-item-meta" style="color:var(--accent-dark)">${note}</div>` : '';

// Next on/after-`today` occurrence of a birthday (month+day; birth year ignored).
// Returns a Date at local midnight, or null for missing/invalid input. A Feb-29
// birthday in a non-leap year rolls to Mar 1 (JS Date normalisation) — acceptable.
function _nextBirthday(dob, today) {
  if (!dob) return null;
  const p = String(dob).slice(0, 10).split('-');
  if (p.length !== 3) return null;
  const month = Number(p[1]), day = Number(p[2]);
  if (!month || !day) return null;
  const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  let when = new Date(base.getFullYear(), month - 1, day);
  if (when < base) when = new Date(base.getFullYear() + 1, month - 1, day);
  return when;
}
// Display parts for an upcoming-birthday Date. Fixed name arrays (no locale dep).
function _fmtUpcoming(date) {
  const WD = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const FULL = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  return { weekday: WD[date.getDay()], day: date.getDate(), month: MON[date.getMonth()], monthName: FULL[date.getMonth()] };
}
const BIRTHDAYS_PATHS = ['/students', '/leaders', '/connections'];

async function renderUpcomingBirthdays() {
  const u = S.user;

  const allFresh = BIRTHDAYS_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = BIRTHDAYS_PATHS.every(p => Cache.getStale(p) !== null);
  let students = [], leaders = [], conns = [];
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    leaders = Cache.getStale('/leaders') || [];

    if (!allFresh) _revalidateBirthdays();
  } else {
    setApp(shell(''));
    try { [students, leaders, conns] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/leaders').catch(() => []),

    ]); } catch {}
    if (S.page !== _pg) return;
  }
  const leaderName = {}; for (const l of (leaders || [])) leaderName[l.id] = l.fullName;
  const leadersByStudent = {};
  for (const a of (conns || [])) { (leadersByStudent[a.studentId] = leadersByStudent[a.studentId] || []).push(leaderName[a.leaderId] || 'Unknown'); }

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const cap = new Date(today.getFullYear(), today.getMonth() + 2, today.getDate());

  // Grade/gender dropdown filters — admin/director only (they see the whole
  // ministry list here; grade/quad logins are already scoped server-side).
  const showBdayFilters = ['admin', 'director'].includes(u.role);
  let scopedStudents = students || [];
  if (showBdayFilters) {
    if (_bdayFilter.grade) scopedStudents = scopedStudents.filter(s => s.grade === _bdayFilter.grade);
    if (_bdayFilter.gender) scopedStudents = scopedStudents.filter(s => s.gender === _bdayFilter.gender);
  }

  // Everyone in scope with a birthday between today and +2 months, soonest first.
  const upcoming = [];
  for (const s of scopedStudents) {
    const when = _nextBirthday(s.dateOfBirth, today);
    if (when && when <= cap) upcoming.push({ s, when });
  }
  upcoming.sort((a, b) => a.when - b.when);

  let body = `<div class="ph"><div class="ph-title">Upcoming Birthdays</div><div class="ph-sub">Next 2 months</div></div>`;
  if (showBdayFilters) {
    body += `<div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="fs" style="flex:1" onchange="setBdayFilter('grade', this.value ? Number(this.value) : null)">

  if (!upcoming.length) {
    body += `<div class="empty">${icEmpty('cake')}<div class="empty-title">No birthdays in the next 2 months</div></div>`;
    setApp(shell(body));
    return;
  }

  // Group rows under a month header (window spans at most two/three month names).
  let curKey = '';
  for (const { s, when } of upcoming) {
    const f = _fmtUpcoming(when);
    const key = when.getFullYear() + '-' + when.getMonth();
    if (key !== curKey) { curKey = key; body += `<div class="sh">${f.monthName}</div>`; }
    const birthYear = Number(String(s.dateOfBirth).slice(0, 4));
    const turns = birthYear > 1900 ? when.getFullYear() - birthYear : null;
    body += `<div class="li" style="position:relative;align-items:flex-start">
      <div class="li-body">

          ${turns != null ? `<div class="li-sub">Turns ${turns}</div>` : ''}
        </div>
        ${(leadersByStudent[s.id] || []).length
          ? `<div style="font-size:12px;margin-top:4px;color:var(--accent-dark);font-weight:600;display:flex;align-items:center;gap:5px">${icS('users')}<span>${leadersByStudent[s.id].map(esc).join(', ')}</span></div>`
          : `<div style="font-size:12px;margin-top:4px;color:var(--ink-faint)">No leader connected</div>`}
        ${s.mobile ? `<div style="font-size:12px;margin-top:4px;color:var(--ink-mid)" onclick="event.stopPropagation()"><span style="font-weight:600">Mobile:</span> ${phoneLink(s.mobile, s.firstName)}</div>` : ''}
      </div>
      <div style="position:absolute;top:13px;right:13px;text-align:right">
        <div style="font-weight:800;font-size:14px">${f.day} ${f.month}</div>
        <div style="font-size:11px;color:var(--ink-faint)">${f.weekday}</div>
      </div>
    </div>`;
  }
  setApp(shell(body));
}

// Builds one row per leader (name/grade/gender only) followed by that leader's
// connected students (own grade/gender, not the leader's), via the vendored SheetJS
// writer — reuses _ensureXlsx()/XLSX, the same lazy-loaded build used to read Excel
// imports elsewhere. Rows arrive pre-sorted by leader then student name, so a leader
// header is emitted whenever the leader name changes.
async function exportConnectCSV() {
  try {
    const { rows } = await API.get('/connections/export');
    await _ensureXlsx();
    const header = ['Leader / Student', _gradeWord(), 'Gender', 'Health', L('service') + ' %', L('smallGroup') + ' %', 'Date of Birth', 'Mobile', 'Parent Mobile'];
    const aoa = [header];
    const leaderRowIdx = new Set();
    let lastLeader = null;
    for (const r of rows) {
      if (r.leaderName !== lastLeader) {
        aoa.push([r.leaderName, r.leaderGrade, r.leaderGender || '', '', '', '', '', '', '']);
        leaderRowIdx.add(aoa.length - 1);
        lastLeader = r.leaderName;
      }
      aoa.push([r.studentName, r.studentGrade ?? '', r.studentGender, r.health || '', r.svcPct, r.grpPct, r.dateOfBirth || '', r.mobile || '', r.parentPhone || '']);
    }
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{ wch: 18 }, { wch: 16 }, { wch: 9 }, { wch: 11 }, { wch: 9 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const addr = XLSX.utils.encode_cell({ r: R, c: C });
        if (!ws[addr]) continue;
        if (R === 0) ws[addr].s = { font: { bold: true }, fill: { fgColor: { rgb: 'DDDDDD' } } };
        else if (leaderRowIdx.has(R)) ws[addr].s = { font: { bold: true }, fill: { fgColor: { rgb: 'EFEFEF' } } };
      }
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Connections');
    XLSX.writeFile(wb, `connections-${new Date().toISOString().slice(0, 10)}.xlsx`);
    toast(`Exported ${rows.length} rows`);
  } catch (e) { toast('Export failed: ' + e.message); }
}

// Renders the categorised section cards for the given (grade/gender-filtered) student
// list, applying the current name filter on top. Split out from renderAtRisk so a
// keystroke in the name filter can patch just this markup, not the whole page — that
// keeps focus/caret in the input (see studSearch for the same pattern on Student Search).
function _arSectionsHtml(scoped, u) {
  const term = _arNameFilter.trim().toLowerCase();
  let filtered = scoped;
  if (term) {
    filtered = scoped.filter(s => {
      const fn = (s.firstName||'').toLowerCase();
      const ln = (s.lastName||'').toLowerCase();
      return fn.includes(term) || ln.includes(term) || `${fn} ${ln}`.trim().includes(term);
    });
  }

  const sections = { rising:[], mixed:[], declining:[], stopped:[], stable:[] };
  for (const s of filtered) { const cat = attendQual(s).category; if (sections[cat]) sections[cat].push(s); }
  for (const k of Object.keys(sections)) sections[k].sort((a,b)=>(a.firstName||'').localeCompare(b.firstName||''));

  let body = '';
  let any = false;
  for (const [key, label, col, ic] of AR_SEC) {
    const items = sections[key];
    if (!items.length) continue;
    any = true;
    const open = !!term;
    let cards = '';
    for (const s of items) {
      const _arPhone = s.mobile || s.parentPhone;
      cards += `
        <div class="li" style="position:relative;align-items:flex-start;padding:11px 40px 11px 11px;margin-bottom:4px">

            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">

              ${u.role !== 'grade' ? quadChip(s.quad) : ''}
            </div>
            <div class="li-sub" style="margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span>Gr ${s.grade||'—'} · ${s.gender}</span>
              ${_arQualChips(s)}
            </div>
            ${termRow(L('service'), s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal, true)}
            ${(s.grpTotal>0||s.prevGrpTotal>0)?termRow(L('smallGroup'), s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal, true):''}
            ${_arPhone ? `<div style="margin-top:4px;font-size:13px">${!s.mobile && s.parentPhone ? '<span style="font-weight:600">Parent: </span>' : ''}${phoneLink(_arPhone, s.firstName, !s.mobile && !!s.parentPhone)}</div>` : ''}
          </div>
          <button class="btn btn-ghost btn-sm" style="position:absolute;bottom:8px;right:8px;padding:4px" onclick="showStudentDetail('${s.id}')" title="View profile" aria-label="View profile for ${esc(s.firstName)} ${esc(s.lastName)}">${icS('id')}</button>
        </div>`;
    }
    body += `<div class="card" style="margin-bottom:12px;border-left:4px solid ${col}">
      <div onclick="toggleArSection('${key}')" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 16px;user-select:none">
        <span id="ar-chev-${key}" style="display:inline-flex;color:var(--ink-mid)">${icS(open?'chevd':'chevr')}</span>
        <strong style="color:${col};display:inline-flex;align-items:center;gap:4px">${icS(ic)} ${label}</strong>
        <span class="badge" style="margin-left:auto">${items.length}</span>
      </div>
      <div id="ar-body-${key}" style="display:${open?'':'none'};padding:0 12px 12px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px">${cards}</div>
      </div>
    </div>`;
  }
  if (!any) {
    body = term
      ? `<div class="empty">${icEmpty('xmark')}<div class="empty-title">No students match "${esc(_arNameFilter.trim())}"</div><div class="empty-sub">Try a different name, or clear the search</div></div>`
      : `<div class="empty">${icEmpty('check')}<div class="empty-title">Nothing flagged</div><div class="empty-sub">Attendance looks healthy this term</div></div>`;
  }
  return body;
}

function toggleArSection(status) {

function setArFilter(key, val) {

// On keystroke, patch ONLY the results container — the input element stays in the
// DOM so focus/caret position is preserved (same pattern as studSearch).
function setArNameFilter(v) {

// STUDENTS
// ============================================================
let _sS = { students:[], leaderNames:new Set(), search:'', gf:new Set(), df:new Set(), sort:{key:'', dir:1} };
// Sort keys for the desktop Student Search table. Youth/Lifegroup sort by
// this-term % only (last-term is a comparison, not sorted on); Status sorts
// worst-first (stopped/declining ahead of stable/rising) so a click surfaces
// students needing attention.
const _STUD_STATUS_ORDER = { stopped:0, declining:1, mixed:2, stable:3, rising:4 };
const _STUD_SORT_KEYS = {
  name: s => `${s.firstName} ${s.lastName}`.trim().toLowerCase(),
  gr: s => s.grade == null ? -1 : s.grade,
  gender: s => (s.gender || '').toLowerCase(),
  dob: s => s.dateOfBirth || '',
  youth: s => s.svcTotal > 0 ? s.svcAttended / s.svcTotal : -1,
  lifegroup: s => s.grpTotal > 0 ? s.grpAttended / s.grpTotal : -1,
  status: s => { const c = _STUD_STATUS_ORDER[attendQual(s).category]; return c == null ? 3 : c; },
};
function _sortedStudents(vis) {
  const { key, dir } = _sS.sort;
  const f = _STUD_SORT_KEYS[key];
  if (!f) return vis;
  return vis.slice().sort((a, b) => { const av = f(a), bv = f(b); return av < bv ? -dir : av > bv ? dir : 0; });
}
function _sortArrow(key) { return _sS.sort.key === key ? (_sS.sort.dir === 1 ? ' ▲' : ' ▼') : ''; }
function sortStud(key) {
  _sS.sort = { key, dir: _sS.sort.key === key ? -_sS.sort.dir : 1 };
  const res = document.getElementById('stu-results');
  if (res) res.innerHTML = _studentResultsHtml(_visStudents());
}

const STUDENTS_PATHS = ['/students', '/leaders'];
let _studentsRevalidating = false;
function _revalidateStudents() {
  if (_studentsRevalidating) return;
  _studentsRevalidating = true;
  API.batch(STUDENTS_PATHS)
    .then(() => { if (S.page === 'students') return renderStudents(); })
    .catch(() => {})
    .finally(() => { _studentsRevalidating = false; });
}
async function renderStudents() {
  const _pg = S.page;
  // Leaders are fetched alongside students so they can be hidden from the search
  // (a person who both leads and appears in the service export shows up as a
  // student row otherwise). Both paths now gate the spinner (previously only
  // /students did, even though /leaders was fetched too).
  const allFresh = STUDENTS_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = STUDENTS_PATHS.every(p => Cache.getStale(p) !== null);
  let students, leaders;
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    leaders = Cache.getStale('/leaders') || [];
    if (!allFresh) _revalidateStudents();
  } else {
    setApp(shell(''));
    [students, leaders] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/leaders').catch(() => []),
    ]);
    if (S.page !== _pg) return;
  }
  _sS.students = students || [];
  _sS.leaderNames = new Set((leaders || []).map(l => (l.fullName || '').trim().toLowerCase()).filter(Boolean));
  renderStudentView();
}

// The students that pass the leader filter + grade/gender chips + name search.
// Names carrying a leader-role suffix in the attendance export — mirrors the
// importer's LEADER_RE so "(Leader)" AND "(Assistant leader)" are both hidden.
const _ROLE_SUFFIX_RE = /\(\s*(?:assistant\s+)?leaders?\s*\)/i;
function _visStudents() {
  const { students, leaderNames, search, gf, df } = _sS;
  let vis = students.filter(s => {
    const full = `${s.firstName} ${s.lastName}`.trim();
    if (_ROLE_SUFFIX_RE.test(full)) return false;
    return !leaderNames.has(full.toLowerCase());
  });
  if (gf.size) vis = vis.filter(s => gf.has(s.grade));
  if (df.size) vis = vis.filter(s => df.has(s.gender));
  if (search) { const q = search.toLowerCase(); vis = vis.filter(s => `${s.firstName} ${s.lastName}`.toLowerCase().includes(q)); }
  return vis;
}

// Just the results list (mobile cards + desktop table) — re-rendered on every
// keystroke WITHOUT rebuilding the search input, so the cursor never jumps.
function _studentResultsHtml(vis) {
  if (!vis.length) return `<div class="empty">${icEmpty('id')}<div class="empty-title">No students found</div></div>`;
  const sorted = _sortedStudents(vis);
  let h = '<div class="mob">';
  for (const s of sorted) {
    const pct = svcPct(s);
    h += `<div class="li" onclick="showStudentDetail('${s.id}')" style="cursor:pointer">
      <div class="li-body">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="li-title">${esc(s.firstName)} ${esc(s.lastName)}</span>
          ${qualChips(s)}
        </div>
        <div class="li-sub">Gr ${s.grade||'—'} · ${s.gender}${fmtBday(s.dateOfBirth) ? ' · ' + fmtBday(s.dateOfBirth) : ''}</div>
        ${termRow(L('service'), s.svcAttended, s.svcTotal, s.prevSvcAttended, s.prevSvcTotal)}
        ${(s.grpTotal>0||s.prevGrpTotal>0)?termRow(L('smallGroup'), s.grpAttended, s.grpTotal, s.prevGrpAttended, s.prevGrpTotal):''}
      </div>
      <div class="li-right" style="color:var(--ink-faint)">›</div>
    </div>`;
  }
  h += '</div>';
  const sh = (key, label) => `<th onclick="sortStud('${key}')" style="cursor:pointer;user-select:none;white-space:nowrap">${label}${_sortArrow(key)}</th>`;
  h += `<div class="desk"><table class="dt"><thead><tr>${sh('name','Name')}${sh('gr','Gr')}${sh('gender','Gender')}${sh('dob','DOB')}${sh('youth',L('service')+' (this / last)')}${sh('lifegroup',L('smallGroup')+' (this / last)')}${sh('status','Status')}<th></th></tr></thead><tbody>`;
  for (const s of sorted) {
    const pct = svcPct(s);
    const psvc = s.prevSvcTotal > 0 ? Math.round(s.prevSvcAttended / s.prevSvcTotal * 100) + '%' : '—';
    const gp = s.grpTotal > 0 ? Math.round(s.grpAttended / s.grpTotal * 100) + '%' : '—';
    const pgp = s.prevGrpTotal > 0 ? Math.round(s.prevGrpAttended / s.prevGrpTotal * 100) + '%' : '—';
    h += `<tr>
      <td><strong>${esc(s.firstName)} ${esc(s.lastName)}</strong></td>
      <td>${s.grade||'—'}</td><td>${s.gender}</td>
      <td>${fmtBday(s.dateOfBirth) || '—'}</td>
      <td>${pct!==null?pct+'%':'—'} <span style="color:var(--ink-faint)">/ ${psvc}</span></td>
      <td>${gp} <span style="color:var(--ink-faint)">/ ${pgp}</span></td>
      <td>${qualChips(s) || '<span style="color:var(--ink-faint)">—</span>'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="showStudentDetail('${s.id}')">View →</button></td>
    </tr>`;
  }
  h += '</tbody></table></div>';
  return h;
}

function renderStudentView() {
  const { search, gf, df } = _sS;
  const totalSearchable = _sS.students.filter(s => !_sS.leaderNames.has(`${s.firstName} ${s.lastName}`.trim().toLowerCase())).length;
  const vis = _visStudents();

  const u = S.user;
  const ssGrades = u.role==='grade' ? [] : u.role==='quad'
    ? (u.quad==='g79'||u.quad==='b79'?[7,8,9]:[10,11,12])
    : _gradeList();
  const ssGenders = ['director','admin'].includes(u.role) ? ['male','female'] : [];
  const gChips = ssGrades.map(g => `<button class="fc ${gf.has(g)?'on':''}" onclick="toggleSF('g',${g})">${g}</button>`).join('');
  const dChips = ssGenders.map(g => `<button class="fc ${df.has(g)?'on':''}" onclick="toggleSF('d','${g}')">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`).join('');

  let body = `
    <div class="ph"><div class="ph-title">Student Search</div><div class="ph-sub"><span id="stu-count">${vis.length} of ${totalSearchable}</span></div></div>
    <div class="sbar"><input id="stu-search" type="text" placeholder="Search by name…" value="${search.replace(/"/g,'&quot;')}" oninput="studSearch(this.value)"></div>`;
  if (ssGrades.length) body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Grade:</span>${gChips}</div>`;
  if (ssGenders.length) body += `<div class="filter-row"><span style="font-size:11px;font-weight:700;color:var(--ink-mid)">Gender:</span>${dChips}</div>`;
  body += `<div id="stu-results">${_studentResultsHtml(vis)}</div>`;

  setApp(shell(body));

function toggleSF(type, val) {
  if (type==='g') { if (_sS.gf.has(val)) _sS.gf.delete(val); else _sS.gf.add(val); }
  else { if (_sS.df.has(val)) _sS.df.delete(val); else _sS.df.add(val); }
  renderStudentView();
}

// On keystroke, update ONLY the results list + count — the input element stays

// TRENDS
// ============================================================
function colChart(sessions, maxH) {
  const max = Math.max(1, ...sessions.map(s => s.pct));
  return '<div class="cchart">' + sessions.map(s => {
    const h = s.pct ? Math.round(s.pct / max * (maxH || 56)) + 4 : 4;
    const cls = s.pct >= 70 ? '' : s.pct < 40 ? 'cr' : 'lo';
    const val = (s.att != null) ? s.att : '';
    return `<div class="ccol"><div class="ccol-val">${val}</div><div class="ccol-bar ${cls}" style="height:${h}px"></div><div class="ccol-lbl">${fmtDM(s.date||'')}</div></div>`;
  }).join('') + '</div>';
}
function hbarTr(label, pct, disp) {
  const shown = disp !== undefined ? disp : pct + '%';
  return `<div class="tbar-row"><div class="tbar-lbl">${label}</div><div class="tbar-track"><div class="tbar-fill ${pct<40?'crit':pct<70?'low':''}" style="width:${pct}%"></div></div><div class="tbar-val">${shown}</div></div>`;
}
function trendBadge(dir) {
  if (dir === 'up') return `<span class="tr-up" style="display:inline-flex;align-items:center;gap:2px">${icS('arru')} Improving</span>`;
  if (dir === 'down') return `<span class="tr-dn" style="display:inline-flex;align-items:center;gap:2px">${icS('arrd')} Declining</span>`;
  return `<span class="tr-st" style="display:inline-flex;align-items:center;gap:2px">${icS('arrr')} Stable</span>`;
}
function trendDir(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  if (v.length < 4) return 'stable';
  const h1 = v.slice(0, Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/Math.floor(v.length/2);
  const h2 = v.slice(Math.floor(v.length/2)).reduce((s,x)=>s+x.pct,0)/(v.length-Math.floor(v.length/2));
  if (h2-h1 > 4) return 'up'; if (h1-h2 > 4) return 'down'; return 'stable';
}
function avgAtt(sessions) {
  const v = sessions.filter(s => s.tot > 0);
  return v.length ? Math.round(v.reduce((s,x)=>s+x.att,0)/v.length) : 0;
}
function statCard(nums, labels, prevs) {
  const cols = nums.length;
  const fz = cols >= 3 ? '1.2rem' : '1.5rem';
  return `<div class="tstat" style="grid-template-columns:repeat(${cols},1fr)">` +
    nums.map((n,i) => `<div class="tstat-cell"><div class="tstat-v" style="font-size:${fz}">${n}</div><div class="tstat-l">${labels[i]}</div>${prevs&&prevs[i]?`<div class="tstat-p">${prevs[i]}</div>`:''}</div>`).join('') +
    '</div>';
}

// Breadth bar: how many enrolled attended at least once (demo: grpBar)
function grpBar(uniq, enrolled) {
  const p = enrolled ? Math.round(uniq / enrolled * 100) : 0;
  return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-mid);margin-bottom:3px"><span>${uniq} of ${enrolled} enrolled attended at least once</span><span>${p}%</span></div><div class="pb"><div class="pb-f ${p>=75?'fill-g':p>=50?'fill-a':'fill-r'}" style="width:${p}%"></div></div></div>`;
}
// Compact trend arrow for at-risk prev-term comparison
function trendArrow(dir) {
  if (dir === 'up') return `<span style="color:var(--success);display:inline-flex">${icS('arru')}</span>`;
  if (dir === 'down') return `<span style="color:var(--danger);display:inline-flex">${icS('arrd')}</span>`;
  return '';
}

// Service attendance aggregate for a student subset. `prev=true` reads the
// previous-term fields. weekly = total attendances ÷ valid weeks in the term
// (== the server's per-session average), uniq = distinct attenders.
function _svcAgg(list, prev) {
  const att = list.reduce((a, s) => a + (prev ? s.prevSvcAttended : s.svcAttended), 0);
  const tot = list.reduce((m, s) => Math.max(m, (prev ? s.prevSvcTotal : s.svcTotal)), 0);
  const uniq = list.filter(s => (prev ? s.prevSvcAttended : s.svcAttended) > 0).length;
  return { uniq, avg: tot > 0 ? Math.round(att / tot) : 0, weeks: tot };
}
function _svcPrevSub(p) { return p.weeks > 0 ? ['prev: ' + p.uniq, 'prev: ' + p.avg] : null; }

// ── Lifegroup-stats render helpers (used by Trends Lifegroups tab + Home) ──
// `showPrev` toggles the muted previous-term line (Trends shows it; Home doesn't).
function _lgAggBits(a) {
  if (!a) return '<span style="color:var(--ink-faint)">no data</span>';
  return `<b style="color:var(--ink)">${a.uniqueAttenders}</b> seen · <b style="color:var(--ink)">${a.avgPerWeek}</b> weekly · <b style="color:var(--ink)">${a.weeksRan}</b> wk${a.weeksRan===1?'':'s'}`;
}
function _lgPrevBits(a) {
  if (!a || a.weeksRan === 0) return '';
  return `<div style="font-size:11px;color:var(--ink-faint);margin-top:1px">prev term: ${a.uniqueAttenders} seen · ${a.avgPerWeek} weekly · ${a.weeksRan} wk${a.weeksRan===1?'':'s'}</div>`;
}
// One lifegroup detail row (per-grade dropdown content).
function _lgGroupRow(lg, showPrev) {
  return `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px 20px">
    <div style="font-size:13px;font-weight:600;margin-bottom:2px">${esc(lg.name)}</div>
    <div style="font-size:12px;color:var(--ink-mid)">${_lgAggBits(lg.current)}</div>
    ${showPrev ? _lgPrevBits(lg.previous) : ''}
  </div>`;
}
// A grade block as a pre-rendered collapsible (.drop). `id` must be unique on the
// page; the lifegroups are rendered hidden and toggled in-DOM (no re-render).
function _lgGradeBlock(g, showPrev, gsfx, id) {
  gsfx = gsfx || '';
  let h = `<div class="drop" id="${id}">
    <div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 0;border-top:1px solid var(--paper-dark)" onclick="_drop('${id}')">
      <span class="drop-chev" style="font-size:12px">›</span>
      <div style="flex:1;font-size:13px;font-weight:700">Year ${g.grade}${gsfx}</div>
      <span style="font-size:12px;color:var(--ink-mid)">${g.current.uniqueAttenders} seen · ${g.current.avgPerWeek} weekly</span>
    </div>`;
  if (showPrev && (g.previous.uniqueAttenders > 0 || g.previous.members > 0)) h += `<div style="font-size:11px;color:var(--ink-faint);padding:0 0 4px 20px">prev term: ${g.previous.uniqueAttenders} seen · ${g.previous.avgPerWeek} weekly</div>`;
  h += `<div class="drop-body">`;
  if (g.lifegroups && g.lifegroups.length) for (const lg of g.lifegroups) h += _lgGroupRow(lg, showPrev);
  else h += `<div style="font-size:12px;color:var(--ink-faint);padding:4px 0 6px 20px">No lifegroups ran this term</div>`;
  h += `</div></div>`;
  return h;
}
// Same content as _lgGradeBlock but WITHOUT its own collapsible wrapper — for
// nesting a grade's lifegroups directly inside an already-collapsible parent
// (e.g. Trends' per-quad drop) so opening the parent goes straight to the
// lifegroups instead of requiring a second click on a nested grade drop.
function _lgGradeInline(g, showPrev, gsfx) {
  gsfx = gsfx || '';
  let h = `<div style="padding:7px 0;border-top:1px solid var(--paper-dark)">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;font-size:13px;font-weight:700">Year ${g.grade}${gsfx}</div>
      <span style="font-size:12px;color:var(--ink-mid)">${g.current.uniqueAttenders} seen · ${g.current.avgPerWeek} weekly</span>
    </div>`;
  if (showPrev && (g.previous.uniqueAttenders > 0 || g.previous.members > 0)) h += `<div style="font-size:11px;color:var(--ink-faint);padding:0 0 4px 0">prev term: ${g.previous.uniqueAttenders} seen · ${g.previous.avgPerWeek} weekly</div>`;
  if (g.lifegroups && g.lifegroups.length) for (const lg of g.lifegroups) h += _lgGroupRow(lg, showPrev);
  else h += `<div style="font-size:12px;color:var(--ink-faint);padding:4px 0 6px 0">No lifegroups ran this term</div>`;
  h += `</div>`;
  return h;
}

const TREND_PATHS = ['/students', '/overview', '/trends', '/lifegroups/stats'];
let _trendsRevalidating = false;
function _revalidateTrends() {
  if (_trendsRevalidating) return;
  _trendsRevalidating = true;
  API.batch(TREND_PATHS)
    .then(() => { if (S.page === 'trends') return renderTrends(); })
    .catch(() => {})
    .finally(() => { _trendsRevalidating = false; });
}
async function renderTrends() {
  const u = S.user;
  const _pg = S.page;
  // Stale-while-revalidate (same approach as Home): if every endpoint has a
  // last-known value, paint instantly from cache and refresh behind the page —
  // this kills the multi-second freeze when a cold serverless start makes the
  // heavy /trends + /lifegroups/stats fetches slow. Only spinner on a true cold load.
  const allFresh = TREND_PATHS.every(p => Cache.get(p) !== null);
  const haveStale = TREND_PATHS.every(p => Cache.getStale(p) !== null);
  let students, overview, trends, lgStats;
  if (allFresh || haveStale) {
    students = Cache.getStale('/students') || [];
    overview = Cache.getStale('/overview');
    trends   = Cache.getStale('/trends');
    lgStats  = Cache.getStale('/lifegroups/stats');
    if (!allFresh) _revalidateTrends();
  } else {
    if (!_allCached('/students')) setApp(shell(''));
    [students, overview, trends, lgStats] = await Promise.all([
      API.get('/students').catch(() => []),
      API.get('/overview').catch(() => null),
      API.get('/trends').catch(() => null),
      API.get('/lifegroups/stats').catch(() => null),
    ]);
    if (S.page !== _pg) return; // navigated away while awaiting — don't overwrite the new page
    // Cold-load self-heal: retry any endpoint that failed (e.g. a timed-out
    // /lifegroups/stats) so Trends doesn't sit on degraded numbers.
    if (TREND_PATHS.some(p => Cache.get(p) === null)) _revalidateTrends();
  }

  const canExport = ['quad','director','admin'].includes(u.role);
  const QUAD_LABELS_LOCAL = { g79:'Girls Yr 7–9', b79:'Boys Yr 7–9', g1012:'Girls Yr 10–12', b1012:'Boys Yr 10–12' };

  // Compute per-grade stats from students
  function gradeStats(sc) {
    return _gradeList().map(gr => {
      const gs = sc.filter(s => s.grade === gr);
      const tot = gs.reduce((s,x)=>s+x.svcTotal,0);
      const att = gs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPctGr = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = gs.filter(s=>s.svcAttended>0).length;
      return { grade:gr, count:gs.length, svcPct:svcPctGr, uniq, att, tot };
    });
  }
  function quadStats(sc) {
    return ['g79','b79','g1012','b1012'].map(q => {
      const qs = sc.filter(s => s.quad === q);
      const tot = qs.reduce((s,x)=>s+x.svcTotal,0);
      const att = qs.reduce((s,x)=>s+x.svcAttended,0);
      const svcPct = tot > 0 ? Math.round(att/tot*100) : 0;
      const uniq = qs.filter(s=>s.svcAttended>0).length;
      return { quad:q, label:QUAD_LABELS_LOCAL[q], count:qs.length, svcPct, uniq, att, tot };
    });
  }

  const byGrade = gradeStats(students);
  const byQuad = quadStats(students);
  const totalUniq = students.filter(s=>s.svcAttended>0).length;
  const totalTot = students.reduce((s,x)=>s+x.svcTotal,0);
  const totalAtt = students.reduce((s,x)=>s+x.svcAttended,0);
  const totalAvgPct = totalTot > 0 ? Math.round(totalAtt/totalTot*100) : 0;
  const totalAvgSess = students.length ? Math.round(totalAtt/students.length) : 0;

  const QUAD_COLORS = { g79:'#ec4899', b79:'#3b82f6', g1012:'#8b5cf6', b1012:'#10b981' };

  let body = `<div class="ph"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div><div class="ph-title">Attendance Trends</div><div class="ph-sub">${L('service')} &amp; ${L('smallGroup').toLowerCase()} overview</div></div>
    ${canExport?'<button class="btn btn-secondary btn-sm" onclick="exportTrendsCSV()">Export CSV</button>':''}
  </div></div>`;

  // Tab bar — the Lifegroups tab only exists when modules.lifegroups is on.
  const lifegroupsOn = !(S.settings && S.settings.ministryConfig && S.settings.ministryConfig.modules && S.settings.ministryConfig.modules.lifegroups === false);
  if (!lifegroupsOn && _trTab === 'grp') _trTab = 'svc';
  body += `<div class="tbbar">
    <button class="tbbtn ${_trTab==='svc'?'on':''}" onclick="_trTab='svc';renderTrends()">${esc(_serviceDayName() + 's')}</button>
    ${lifegroupsOn ? `<button class="tbbtn ${_trTab==='grp'?'on':''}" onclick="_trTab='grp';renderTrends()">${L('smallGroupPlural')}</button>` : ''}

  // Term label for the "this term" sub-heading (uses the trends term range).
  const _curTerm = trends && trends.terms && trends.terms.current;
  const _termNote = _curTerm ? `${fmtDM(_curTerm.startDate)} – ${fmtDM(_curTerm.endDate)}` : 'this term';

  if (_trTab === 'svc') {
    // Ministry-wide overview — director/admin only. Grade logins go straight to
    // their own grade's numbers below (the ministry-wide block was redundant
    // context for a single-grade login and just added scroll); quad logins get
    // their own scoped quad+by-grade section further down (matching how the
    // Lifegroups tab already scopes quad server-side), so this whole-ministry
    // block would otherwise leak ministry-wide data to a quad account.
    if (['director', 'admin'].includes(u.role)) {
      const mn = (trends && trends.ministry) || {};
      body += `<div class="sh">Ministry Overview</div><div class="card">`;
      body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:8px">Whole-ministry service attendance · this term (${_termNote})</div>`;
      body += statCard([mn.uniqueAttenders || 0, Math.round(mn.averageAttendance || 0)], ['Seen', 'Weekly'],
        (mn.prevSeenAttenders || mn.prevAverageAttendance) ? ['prev: ' + (mn.prevSeenAttenders||0), 'prev: ' + (mn.prevAverageAttendance||0)] : null);
      body += '</div>';

      // Weekly attendance chart — one bar per valid CURRENT-TERM service (whole ministry)
      if (trends && trends.ministry && Array.isArray(trends.ministry.sessions)) {

          body += colChart(chartSess, 56);
          body += '</div>';
        } else {
          body += `<div class="sh">Weekly Attendance</div><div class="card"><div style="font-size:13px;color:var(--ink-faint)">No valid services in the current term yet.</div></div>`;
        }
      }
    }

    if (u.role === 'grade') {
      const _og = new Set(userGrades(u));
      const gl = students.filter(s => _og.has(s.grade));
      const c = _svcAgg(gl, false), p = _svcAgg(gl, true);
      body += `<div class="sh">${gradeBadgeLabel(u)}${_gsfx(_loginGender(u))}</div><div class="card">`;

      body += '</div>';
      // Weekly attendance bar graph for this login's grade(s) (gender-scoped

      const gvalid = _mergeGradeSessions(trends, userGrades(u)).filter(s => !s.isOutlier);
      if (gvalid.length) {
        const peak = Math.max(1, ...gvalid.map(s => s.totalAttended));

        body += `<div class="sh">Weekly Attendance</div><div class="card">`;
        body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:10px">${gvalid.length} valid services this term</div>`;
        body += colChart(cs, 56);
        body += '</div>';
      }
    } else if (u.role === 'quad') {
      const ql = students.filter(s => s.quad === u.quad);
      const c = _svcAgg(ql, false), p = _svcAgg(ql, true);
      body += `<div class="sh">${QUAD_LABELS_LOCAL[u.quad]||u.quad}</div><div class="card">`;
      body += statCard([c.uniq, c.avg], ['Seen','Weekly'], _svcPrevSub(p));
      body += '<div class="sh" style="margin-top:10px">By Grade</div>';
      const grades = u.quad==='g79'||u.quad==='b79' ? [7,8,9] : [10,11,12];
      for (const gr of grades) {
        const gl2 = students.filter(s => s.grade === gr);
        if (!gl2.length) continue;
        const gc = _svcAgg(gl2, false), gp = _svcAgg(gl2, true);
        body += `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px 20px">
          <div style="font-size:13px;font-weight:600">Year ${gr}${_gsfx(_loginGender(u))}</div>
          <div style="font-size:12px;color:var(--ink-mid)"><b style="color:var(--ink)">${gc.uniq}</b> seen · <b style="color:var(--ink)">${gc.avg}</b> weekly</div>
          ${gp.weeks>0?`<div style="font-size:11px;color:var(--ink-faint)">prev term: ${gp.uniq} seen · ${gp.avg} weekly</div>`:''}
        </div>`;

    } else {
      // Director / admin: collapsible quad cards (current + previous term)

      for (const q of byQuad) {

        const qid = 'tfq-' + q.quad;

        body += `<div class="drop-head" style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_drop('${qid}')">
          <span class="drop-chev" style="font-size:12px">›</span>
          <div style="flex:1;font-weight:700;font-size:14px">${q.label}</div>

        </div>`;
        if (p.weeks>0) body += `<div style="font-size:11px;color:var(--ink-faint);padding-left:20px;margin-top:2px">prev term: ${p.uniq} seen · ${p.avg} weekly</div>`;
        body += `<div class="drop-body">`;
        {

          for (const gr of grades) {
            const gl2 = students.filter(s => s.grade === gr && s.quad === q.quad);
            if (!gl2.length) continue;
            const gc = _svcAgg(gl2, false), gp = _svcAgg(gl2, true);
            body += `<div style="border-top:1px solid var(--paper-dark);padding:7px 0 5px">
                <div style="font-size:13px;font-weight:600;padding-left:20px;margin-bottom:2px">Year ${gr}${_gsfx(quadGender(q.quad))}</div>
                <div style="padding-left:20px;font-size:12px;color:var(--ink-mid)"><b style="color:var(--ink)">${gc.uniq}</b> seen · <b style="color:var(--ink)">${gc.avg}</b> weekly${gp.weeks>0?` <span style="color:var(--ink-faint)">(prev ${gp.uniq} · ${gp.avg})</span>`:''}</div>
              </div>`;
          }
        }
        body += '</div></div>';
      }

  } else {
    // ── Lifegroups tab — quad → grade → lifegroup, current + previous term. ──
    // All numbers come from /lifegroups/stats: average = individuals attending a

    if (!lgStats) {
      body += `<div class="card"><div style="color:var(--ink-faint);font-size:13px">${L('smallGroup')} stats unavailable.</div></div>`;
    } else {
      const oc = lgStats.overall.current, op = lgStats.overall.previous;

        // Grade-only: mirror the Fridays tab's own layout — "Grade X Boys" stat

        // here — that's already shown per-group in the breakout below.
        body += `<div class="sh">${gradeBadgeLabel(u)}${_gsfx(_loginGender(u))}</div><div class="card">`;
        body += statCard([oc.uniqueAttenders, oc.avgPerWeek], ['Seen','Weekly'],
          op.weeksRan>0 ? ['prev: '+op.uniqueAttenders, 'prev: '+op.avgPerWeek] : null);
        body += '</div>';
        const gwk = (lgStats.overall.weekly || []).filter(w => w.attended != null);
        if (gwk.length) {
          const gpeakW = Math.max(1, ...gwk.map(w => w.attended));
          const gwkSess = gwk.map(w => ({ date: w.weekStart, pct: Math.round(w.attended / gpeakW * 100), att: w.attended, tot: w.attended }));
          body += `<div class="sh">Weekly Attendance</div><div class="card">`;
          body += colChart(gwkSess, 56);
          body += '</div>';
        }
      } else {
        body += `<div class="sh">Overview</div><div class="card">`;
        body += `<div style="font-size:12px;color:var(--ink-mid);margin-bottom:8px">Individuals attending a lifegroup · this term</div>`;
        body += statCard([oc.uniqueAttenders, oc.avgPerWeek], ['Seen','Weekly'],
          op.weeksRan>0 ? ['prev: '+op.uniqueAttenders, 'prev: '+op.avgPerWeek] : null);
        body += `<div style="font-size:11px;color:var(--ink-faint);margin-top:6px">${oc.weeksRan} week${oc.weeksRan===1?'':'s'} ran this term${op.weeksRan>0?' · '+op.weeksRan+' previous':''}</div>`;
        // Weekly lifegroup attendance chart (current term) — bar = individuals that week
